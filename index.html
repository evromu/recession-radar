const PX=[u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,u=>u];
function clamp(v){return Math.max(0,Math.min(100,v))}
function sigmoid(x,mid,k){return 100/(1+Math.exp(-k*(x-mid)))}

/* ═══════════════════════════════════════════
   METHODOLOGY v3 — FINAL
   
   RECESSION SCORE = 75% Leading + 25% Confirming
   Leading: YC×45% + Credit×35% + Claims×20%
   + Post-inversion steepening bonus (+25pts)
   + Interaction bonus (+10pts when YC&Credit both >50)
   Confirming: Sahm×60% + Mfg×40%
   
   MARKET: 4 independent triggers (no composite)
   VIX, CAPE, EPU, Sentiment
   
   CONTEXT: LEI, Fed BS, CPI, M2, GDP
═══════════════════════════════════════════ */

const S=[
 // ── LEADING (75% of recession score) ──
 {k:"yc",f:"T10Y2Y",n:"Yield Curve",s:"10Y − 2Y Spread · Post-inversion bonus",u:"%",tier:"leading",w:.45,btColor:"#42A5F5",
  desc:"Best single recession predictor. NY Fed's #1 input. Scored continuously PLUS a +25pt post-inversion steepening bonus when the curve has un-inverted within the past 18 months — the actual danger window.",
  th:"Continuous: +1.5% (0) to −0.5% (100). Post-inversion bonus: +25pts when recently un-inverted.",
  hi:"8/8 recessions since 1970. Un-inversion is when to worry, not inversion itself. Weight: 45% of Leading.",
  pre08:-0.19,pre20:0.04,pre01:-0.52,
  ev:v=>v==null?"unknown":v<-.3?"stress":v<0?"warning":v<.2?"caution":v<.5?"watch":"clear",
  sc:v=>v==null?null:clamp((1.5-v)/2*100)},
 {k:"cr",f:"BAMLH0A0HYM2",n:"Credit Spreads",s:"ICE BofA High Yield OAS",u:"%",tier:"leading",w:.35,btColor:"#26C6DA",
  desc:"Yield premium on risky bonds. Bond market sees stress before stocks. When YC and Credit both flash simultaneously, hit rate is essentially 100%.",
  th:"< 3.5% Normal | 3.5–5% Elevated | 5–8% Stress | > 8% Crisis",
  hi:"2nd best leading indicator. Part of the YC+Credit interaction bonus. Weight: 35% of Leading.",
  pre08:7.96,pre20:3.57,pre01:6.45,
  ev:v=>v==null?"unknown":v>8?"stress":v>5?"warning":v>3.5?"caution":"clear",
  sc:v=>v==null?null:clamp((v-3)/7*100)},
 {k:"ic",f:"ICSA",n:"Jobless Claims",s:"Initial Claims / CLF Ratio",u:"",tier:"leading",w:.20,btColor:"#66BB6A",
  desc:"Weekly first-time unemployment filings normalized against Civilian Labor Force. Fastest labor indicator but noisier than YC and Credit. Strong when trending.",
  th:"Ratio: < 1.3 Healthy | 1.3–1.6 Normal | 1.6–2.0 Elevated | > 2.0 Warning",
  hi:"Weekly frequency is uniquely valuable. Weight: 20% of Leading.",
  pre08:346,pre20:282,pre01:305,
  ev:v=>v==null?"unknown":v>350?"stress":v>300?"warning":v>260?"caution":v>220?"watch":"clear",
  divK:true,hasCLF:true,sc:null},

 // ── CONFIRMING (25% of recession score) ──
 {k:"sa",f:"SAHMREALTIME",n:"Sahm Rule",s:"Unemployment Rate Momentum",u:" pp",tier:"confirming",w:.60,btColor:"#AB47BC",
  desc:"Highest conviction recession indicator. 3-month avg unemployment vs 12-month low. At 0.50pp = recession is happening. Fires later than leading tier but almost never wrong.",
  th:"≥ 0.50 Recession | 0.30–0.50 Approaching | < 0.15 Clear",
  hi:"Only 2 false positives in 70+ years. Weight: 60% of Confirming.",
  pre08:0.53,pre20:0.5,pre01:0.3,
  ev:v=>v==null?"unknown":v>=.5?"stress":v>=.3?"warning":v>=.15?"caution":"clear",
  sc:v=>v==null?null:clamp(v/0.6*100)},
 {k:"mf",f:"MANEMP",n:"Mfg Employment",s:"Manufacturing Jobs (ISM proxy)",u:"K",tr:1,tier:"confirming",w:.40,btColor:"#EC407A",
  desc:"Manufacturing contracts before broader economy. 3-month change captures trend. ~8% of GDP now (was 20%+) but still captures global trade sensitivity.",
  th:"3-mo change: losses > 50K = Stress | losses = Caution | gains = Clear",
  hi:"Preceded every recession since 1948. Weight: 40% of Confirming.",
  ev:(v,t)=>t==null?"unknown":t<-50?"stress":t<-20?"warning":t<0?"caution":t<20?"watch":"clear",sc:null},

 // ── MARKET (independent triggers, NOT in recession score) ──
 {k:"vx",f:"VIXCLS",n:"VIX",s:"Sigmoid scoring · 5yr rolling z-score",u:"",tier:"market",btColor:"#EF5350",isSigmoid:true,
  desc:"Expected 30-day S&P volatility. Sigmoid scoring (midpoint 25, k=0.25) captures nonlinear danger. VIX 15→20 is noise, 25→35 is regime change. Buy on capitulation, reduce on sustained elevation.",
  th:"Sigmoid: 50% at VIX 25 | 85% at 30 | 95% at 35. Triggers: > 40 BUY | > 30 SELL",
  hi:"VIX > 40 marked buying opportunities (2008, 2020, 2022).",pre08:23.0,pre20:14.0,pre01:25.5,
  ev:v=>v==null?"unknown":v>35?"stress":v>30?"warning":v>25?"caution":v>20?"watch":"clear",
  sc:v=>v==null?null:sigmoid(v,25,.25),buyTrigger:v=>v>40,sellTrigger:v=>v>30},
 {k:"cape",f:"_CAPE_",n:"Shiller CAPE",s:"Absolute thresholds (no normalization)",u:"x",isCape:true,tier:"market",btColor:"#FFA726",
  desc:"S&P 500 price ÷ 10yr inflation-adjusted earnings. Absolute thresholds preserved — a CAPE of 30 means 30x earnings regardless of recent averages. Measures downside risk, not timing.",
  th:"< 18 BUY (cheap) | 18–25 Fair-Elevated | > 35 SELL (extreme)",
  hi:"Median: 16. No normalization by design.",pre08:27.3,pre20:31.3,pre01:44.2,
  ev:v=>v==null?"unknown":v>38?"stress":v>30?"warning":v>25?"caution":v>20?"watch":"clear",
  sc:v=>v==null?null:clamp((v-15)/25*100),buyTrigger:v=>v<18,sellTrigger:v=>v>35},
 {k:"epu",f:"USEPUINDXD",n:"Policy Uncertainty",s:"EPU Index · SD-normalized (sell-side)",u:"σ",tier:"market",btColor:"#7E57C2",isSD:true,
  desc:"Economic Policy Uncertainty — proxy for geopolitical risk. Too many false positives for recession scoring (250+ in 2018 trade wars, no recession). Useful as a sell-side stress signal. 1 SD = elevated, 2 SD = extreme.",
  th:"< 1σ Normal | 1–1.5σ Elevated | > 2σ Extreme (200+). Sell trigger: > 200",
  hi:"Spiked >4σ COVID, ~3σ 2008. High false positive rate precludes recession scoring.",pre08:137,pre20:186,pre01:134,
  ev:v=>v==null?"unknown":v>250?"stress":v>180?"warning":v>130?"caution":v>100?"watch":"clear",
  sc:v=>v==null?null:clamp(((v-110)/50)/2*100),sellTrigger:v=>v>200},
 {k:"co",f:"UMCSENT",n:"Consumer Sentiment",s:"Contrarian buy signal (inverted)",u:"",tier:"market",btColor:"#FF7043",
  desc:"Moved from Confirming due to noise — hit 50 in 2022 (below 2008 levels) with no recession. Now used as a contrarian buy signal: extreme pessimism often marks market bottoms because it overshoots reality.",
  th:"< 55 BUY (extreme pessimism) | 55–70 Caution | > 80 Healthy. Buy trigger only — no sell.",
  hi:"2022 false positive disqualified it from recession scoring. Contrarian buy at extremes.",pre08:63.0,pre20:101.0,pre01:94.7,
  ev:v=>v==null?"unknown":v<55?"stress":v<60?"warning":v<70?"caution":v<80?"watch":"clear",
  sc:v=>v==null?null:clamp((95-v)/45*100),buyTrigger:v=>v<55},
];

const CTX=[
 {f:"USSLIND",n:"Leading Index (LEI)",desc:"Philly Fed composite. Removed from scoring — overlaps with YC, Claims, Credit.",fmt:v=>v.toFixed(2)+"%",link:"USSLIND"},
 {f:"WALCL",n:"Fed Balance Sheet",desc:"Rising=QE (liquidity injection), Falling=QT (tightening).",fmt:v=>"$"+(v/1e6).toFixed(2)+"T",link:"WALCL",
  dir:d=>{if(!d||d.length<2)return null;return parseFloat(d[d.length-1].value)>parseFloat(d[d.length-2].value)?"QE":"QT"}},
 {f:"CPIAUCSL",n:"CPI (YoY)",desc:"Drives Fed rate decisions.",isYoY:true,link:"CPIAUCSL",
  fmt:(v,d)=>{if(!d||d.length<13)return"—";const c=parseFloat(d[d.length-1].value),y=parseFloat(d[d.length-13]?.value);return c&&y?((c-y)/y*100).toFixed(1)+"%":"—"},
  dir:d=>{if(!d||d.length<14)return null;const c=parseFloat(d[d.length-1].value),y=parseFloat(d[d.length-13]?.value),cp=parseFloat(d[d.length-2].value),yp=parseFloat(d[d.length-14]?.value);if(!c||!y||!cp||!yp)return null;return((c-y)/y)>((cp-yp)/yp)?"RISING":"FALLING"}},
 {f:"WM2NS",n:"M2 Money Supply",desc:"Broad money. Contraction historically very rare and bearish.",fmt:v=>"$"+(v/1000).toFixed(1)+"T",link:"WM2NS",
  dir:d=>{if(!d||d.length<2)return null;return parseFloat(d[d.length-1].value)>parseFloat(d[d.length-2].value)?"EXPANDING":"CONTRACTING"}},
 {f:"A191RL1Q225SBEA",n:"Real GDP (QoQ)",desc:"Two consecutive negative = technical recession.",fmt:v=>v.toFixed(1)+"%",link:"A191RL1Q225SBEA",
  dir:d=>{if(!d||d.length<1)return null;return parseFloat(d[d.length-1].value)>0?"GROWTH":"CONTRACTION"}},
];

const TIERS={leading:{label:"LEADING",color:"#42A5F5",desc:"75% of recession score · Detects before it starts"},confirming:{label:"CONFIRMING",color:"#AB47BC",desc:"25% of recession score · Validates with high conviction"},market:{label:"MARKET SIGNALS",color:"#FFA726",desc:"Independent buy/sell triggers · Not in recession score"}};
const MK=[{f:"SP500",n:"S&P 500",p:"",d:0,pk:true},{f:"NASDAQCOM",n:"NASDAQ",p:"",d:0,pk:true},{f:"DCOILBRENTEU",n:"Brent Oil",p:"$",d:2},{f:"DGS10",n:"10Y Yield",p:"",x:"%",d:2},{f:"DFF",n:"Fed Funds",p:"",x:"%",d:2},{f:"DTWEXBGS",n:"DXY Dollar",p:"",d:1}];
const ST={clear:{c:"#00E676",bg:"rgba(0,230,118,.07)",b:"rgba(0,230,118,.22)",l:"CLEAR"},watch:{c:"#78909C",bg:"rgba(120,144,156,.06)",b:"rgba(120,144,156,.18)",l:"WATCH"},caution:{c:"#FFC107",bg:"rgba(255,193,7,.07)",b:"rgba(255,193,7,.22)",l:"CAUTION"},warning:{c:"#FF9100",bg:"rgba(255,145,0,.07)",b:"rgba(255,145,0,.22)",l:"WARNING"},stress:{c:"#FF1744",bg:"rgba(255,23,68,.07)",b:"rgba(255,23,68,.22)",l:"STRESS"},unknown:{c:"#555",bg:"rgba(85,85,85,.05)",b:"rgba(85,85,85,.15)",l:"—"}};
const LV=[{x:1,l:"GREEN",s:"Full Offense",c:"#00E676",st:"Buy pullbacks aggressively. Full equity exposure."},{x:3,l:"YELLOW",s:"Caution",c:"#FFC107",st:"Tighten stops. Reduce size. Build cash."},{x:5,l:"ORANGE",s:"Defensive",c:"#FF9100",st:"Cash 20–30%. Sell speculative. Favor dividends."},{x:99,l:"RED",s:"Preservation",c:"#FF1744",st:"Cash 40–50%. Exit leverage. Hedge."}];
const defaultOv=()=>({score:true,leading:false,confirming:false,market:false,spx:true,yc:false,cr:false,ic:false,sa:false,mf:false,vx:false,cape:false,epu:false,co:false});

let st={key:localStorage.getItem("rr14")||null,d:{},mk:{},mkF:{},ss:{},ex:{},ld:false,err:null,upd:null,px:0,al:{ycUD:null,ycInv:false,sahmD:null,sahmPk:null},cape:null,autoRef:null,clfRaw:null,claims4wk:null,clfRatio:null,ctx:{},vixRolling:null,postInvBonus:false,
 bt:{open:false,loading:false,loaded:false,data:null,err:null,ov:defaultOv()}};

async function ff(sid,key,lim=24,freq=""){let base=`https://api.stlouisfed.org/fred/series/observations?series_id=${sid}&api_key=${key}&file_type=json&sort_order=desc&limit=${lim}`;
 if(freq)base+=`&frequency=${freq}&aggregation_method=eop`;const ord=[st.px,...[0,1,2].filter(i=>i!==st.px)];
 for(const i of ord){try{const r=await fetch(PX[i](base),{signal:AbortSignal.timeout(15000)});if(!r.ok)continue;const txt=await r.text();let j;try{j=JSON.parse(txt)}catch{continue}
  if(j.observations){st.px=i;return j.observations.filter(o=>o.value!==".").reverse()}if(j.contents){try{const p=JSON.parse(j.contents);if(p.observations){st.px=i;return p.observations.filter(o=>o.value!==".").reverse()}}catch{}}}catch{continue}}throw new Error(sid)}

async function fetchCAPE(){const urls=["https://www.multpl.com/shiller-pe","https://www.multpl.com/shiller-pe/table/by-month"];
 for(const url of urls){const ord=[st.px,...[0,1,2].filter(i=>i!==st.px)];for(const i of ord){try{const r=await fetch(PX[i](url),{signal:AbortSignal.timeout(12000)});if(!r.ok)continue;const h=await r.text();
  for(const p of[/Current\s+Shiller\s+PE[^0-9]*([\d]{1,2}\.[\d]{1,2})/i,/<td[^>]*>(?:Apr|Mar|Feb|Jan|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[^<]*<\/td>\s*<td[^>]*>\s*([\d]+\.[\d]+)/i,/([\d]{2}\.[\d]{2})\s*<\/td>/]){const m=h.match(p);if(m&&m[1]){const v=parseFloat(m[1]);if(v>5&&v<100){st.cape=v;return}}}}catch{continue}}}st.cape=null}
async function fetchCAPEHist(){try{const url="https://www.multpl.com/shiller-pe/table/by-month";const ord=[st.px,...[0,1,2].filter(i=>i!==st.px)];
 for(const i of ord){try{const r=await fetch(PX[i](url),{signal:AbortSignal.timeout(15000)});if(!r.ok)continue;const h=await r.text();const rows=[];
  const re=/<tr[^>]*>\s*<td[^>]*>([^<]+)<\/td>\s*<td[^>]*>([\d.]+)<\/td>/gi;let m;while((m=re.exec(h))!==null){const d=new Date(m[1].trim());const v=parseFloat(m[2]);if(!isNaN(d)&&v>3)rows.push({month:d.toISOString().substring(0,7),value:v})}
  if(rows.length>12)return rows}catch{continue}}}catch{}return[]}

async function fetchCLF(){try{const clf=await ff("CLF16OV",st.key,3);if(clf.length){st.clfRaw=parseFloat(clf[clf.length-1].value);const claims=st.d.ic||[];
 if(claims.length>=4&&st.clfRaw){const l4=claims.slice(-4).map(d=>parseFloat(d.value)).filter(x=>!isNaN(x));st.claims4wk=l4.reduce((a,b)=>a+b,0)/l4.length;st.clfRatio=st.claims4wk/st.clfRaw}}}catch{}}

function calcVixRolling(){const vd=st.d.vx||[];const vals=vd.map(d=>parseFloat(d.value)).filter(x=>!isNaN(x));
 if(vals.length<60)return;const mean=vals.reduce((a,b)=>a+b,0)/vals.length;
 const sd=Math.sqrt(vals.map(v=>(v-mean)**2).reduce((a,b)=>a+b,0)/vals.length);
 st.vixRolling={mean:mean.toFixed(1),sd:sd.toFixed(1),z:((vals[vals.length-1]-mean)/sd).toFixed(2)}}

function analyzeYC(d){if(!d||d.length<5)return{ycUD:null,ycInv:false};let ud=null,inv=false;
 for(let i=0;i<d.length;i++){const v=parseFloat(d[i].value);if(isNaN(v))continue;if(v<0)inv=true;else if(inv&&!ud)ud=d[i].date}return{ycUD:ud,ycInv:inv}}
function analyzeSahm(d){if(!d||d.length<3)return{sahmD:null,sahmPk:null};let td=null,pk=0;
 for(let i=0;i<d.length;i++){const v=parseFloat(d[i].value);if(isNaN(v))continue;if(v>pk)pk=v;if(v>=.5&&!td)td=d[i].date}return{sahmD:td,sahmPk:pk}}
function peakPct(d){if(!d||d.length<10)return null;const v=d.map(x=>parseFloat(x.value)).filter(x=>!isNaN(x));if(v.length<10)return null;
 return(((v[v.length-1]-Math.max(...v))/Math.max(...v))*100).toFixed(1)}

/* Check if YC un-inverted within past 18 months */
function checkPostInversion(){
 const ad=st.al;if(!ad.ycUD||!ad.ycInv)return false;
 const mo=Math.round((new Date()-new Date(ad.ycUD+"T00:00:00"))/(1000*60*60*24*30.44));
 return mo>=0&&mo<=18}

/* ═══ WEIGHTED COMPOSITE WITH BONUSES ═══ */
function calcComposite(){
 // Leading scores
 const ycObs=st.d.yc||[];const ycLat=ycObs.length?parseFloat(ycObs[ycObs.length-1].value):null;
 let ycScore=ycLat!=null?clamp((1.5-ycLat)/2*100):null;
 // Post-inversion bonus: +25pts if un-inverted within 18 months
 st.postInvBonus=checkPostInversion();

 // Interaction bonus: +10pts when YC AND Credit both >50

 if(ycScore!=null&&crScore!=null&&ycScore>50&&crScore>50){interactionBonus=true;if(avgL!=null)avgL=Math.min(100,avgL+10)}

 // Confirming

 // Recession = 75% Leading + 25% Confirming

async function loadBacktest(){st.bt.loading=true;st.bt.err=null;render();
 try{const ids={yc:"T10Y2Y",sa:"SAHMREALTIME",cr:"BAMLH0A0HYM2",mf:"MANEMP",co:"UMCSENT",vx:"VIXCLS",ic:"ICSA",clf:"CLF16OV",rec:"USREC",spx:"SP500",epu:"USEPUINDXM"};
  const raw={};for(const[k,id] of Object.entries(ids)){try{raw[k]=await ff(id,st.key,500,"m")}catch{raw[k]=[]}}
  const cH=await fetchCAPEHist();const cI={};cH.forEach(c=>{cI[c.month]=c.value});
  const allD=new Set();for(const obs of Object.values(raw))obs.forEach(o=>allD.add(o.date.substring(0,7)));Object.keys(cI).forEach(m=>allD.add(m));
  const months=[...allD].sort();const idx={};for(const[k,obs] of Object.entries(raw)){idx[k]={};obs.forEach(o=>{idx[k][o.date.substring(0,7)]=parseFloat(o.value)})}

  // Track YC inversion state for post-inversion bonus in backtest
  let ycWasInverted=false,ycUninvertMonth=null;

  const comp=[];
  for(const m of months){const indS={};
   // Track YC inversion/un-inversion
   const ycV=idx.yc[m];
   if(ycV!=null&&!isNaN(ycV)){
    if(ycV<0)ycWasInverted=true;
    else if(ycWasInverted&&!ycUninvertMonth){ycUninvertMonth=m}
   }
   // Check if within 18 months of un-inversion
   let postInv=false;
   if(ycUninvertMonth){
    const um=new Date(ycUninvertMonth+"-01"),cm=new Date(m+"-01");
    const diff=(cm-um)/(1000*60*60*24*30.44);
    if(diff>=0&&diff<=18)postInv=true;
    if(diff>18){ycWasInverted=false;ycUninvertMonth=null}// Reset after window expires
   }

   // Leading (weighted)
   const lead=[];
   if(ycV!=null&&!isNaN(ycV)){let s=clamp((1.5-ycV)/2*100);if(postInv)s=Math.min(100,s+25);lead.push({w:.45,s});indS.yc=s}
   if(idx.cr[m]!=null&&!isNaN(idx.cr[m])){const s=clamp((idx.cr[m]-3)/7*100);lead.push({w:.35,s});indS.cr=s}
   if(idx.ic[m]!=null&&idx.clf[m]!=null&&idx.clf[m]>0){const s=clamp((idx.ic[m]/idx.clf[m]-0.8)/2.5*100);lead.push({w:.20,s});indS.ic=s}
   const lT=lead.reduce((a,b)=>a+b.w,0);let aL=lT>0?lead.reduce((a,b)=>a+b.w*b.s,0)/lT:null;

   // Interaction bonus
   if(indS.yc!=null&&indS.cr!=null&&indS.yc>50&&indS.cr>50&&aL!=null)aL=Math.min(100,aL+10);

   // Confirming (weighted)
   const conf=[];
   if(idx.sa[m]!=null&&!isNaN(idx.sa[m])){const s=clamp(idx.sa[m]/0.6*100);conf.push({w:.60,s});indS.sa=s}
   const mfK=months.filter(x=>x<=m).slice(-4);
   if(mfK.length>=4){const v0=idx.mf[mfK[0]],v3=idx.mf[mfK[3]];if(v0!=null&&v3!=null){const s=clamp((50-(v3-v0))/150*100);conf.push({w:.40,s});indS.mf=s}}
   const cT=conf.reduce((a,b)=>a+b.w,0);const aC=cT>0?conf.reduce((a,b)=>a+b.w*b.s,0)/cT:null;

   // Market (for overlay display)
   if(idx.vx[m]!=null&&!isNaN(idx.vx[m]))indS.vx=sigmoid(idx.vx[m],25,.25);
   if(cI[m]!=null)indS.cape=clamp((cI[m]-15)/25*100);
   if(idx.epu&&idx.epu[m]!=null)indS.epu=clamp(((idx.epu[m]-110)/50)/2*100);
   if(idx.co[m]!=null&&!isNaN(idx.co[m]))indS.co=clamp((95-idx.co[m])/45*100);
   const mktScores=[indS.vx,indS.cape].filter(v=>v!=null);
   const aM=mktScores.length?mktScores.reduce((a,b)=>a+b,0)/mktScores.length:null;

   let rec=null;if(aL!=null&&aC!=null)rec=aL*.75+aC*.25;else if(aL!=null)rec=aL;
   comp.push({month:m,score:rec,leading:aL,confirming:aC,market:aM,recession:idx.rec[m]===1,spx:idx.spx[m]||null,...indS})}
  st.bt.data=comp.filter(c=>c.score!=null);st.bt.loaded=true;
 }catch(e){st.bt.err="Failed: "+e.message}st.bt.loading=false;render()}

 <div style="display:flex;align-items:center;gap:12px"><span class="h" style="font-size:32px;font-weight:800;color:${lv.c};line-height:1">${lv.l}</span><span style="font-size:13px;color:var(--t3);border-left:1px solid #2A2825;padding-left:12px">${lv.s}</span></div></div>
 <div style="display:flex;gap:12px;flex-wrap:wrap">
 ${comp.recession!=null?`<div style="text-align:center"><div class="m" style="font-size:22px;font-weight:800;color:${comp.recession>75?"var(--st)":comp.recession>50?"var(--wn)":comp.recession>25?"var(--ca)":"var(--cl)"}">${comp.recession.toFixed(0)}</div><div class="m" style="font-size:7px;color:var(--t4)">RECESSION</div></div>`:""}
 ${comp.leading!=null?`<div style="text-align:center"><div class="m" style="font-size:16px;font-weight:700;color:#42A5F5">${comp.leading.toFixed(0)}</div><div class="m" style="font-size:7px;color:var(--t4)">LEAD ×75%</div></div>`:""}
 ${comp.confirming!=null?`<div style="text-align:center"><div class="m" style="font-size:16px;font-weight:700;color:#AB47BC">${comp.confirming.toFixed(0)}</div><div class="m" style="font-size:7px;color:var(--t4)">CONF ×25%</div></div>`:""}
 </div></div>
 ${bonuses.length?`<div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">${bonuses.map(b=>`<span class="bonus-badge">⚡ ${b}</span>`).join("")}</div>`:""}
 <div style="margin-top:12px;padding:10px 12px;background:${lv.c}0C;border-radius:8px;border:1px solid ${lv.c}15">
 <span class="m" style="font-size:9px;color:${lv.c}">STRATEGY</span>
 <p style="font-size:12px;color:var(--t2);margin-top:4px;line-height:1.5">${lv.st}</p></div></div>`}

/* ═══ MARKET SIGNAL PANEL (4 independent triggers) ═══ */
function sigPanel(){
 const vD=st.d.vx||[];const vix=vD.length?parseFloat(vD[vD.length-1].value):null;
 const coD=st.d.co||[];const sent=coD.length?parseFloat(coD[coD.length-1].value):null;
 const epuD=st.d.epu||[];const epu=epuD.length?parseFloat(epuD[epuD.length-1].value):null;

 const buys=[],sells=[];
 if(vix!=null&&vix>40)buys.push("VIX > 40 (capitulation)");
 if(st.cape!=null&&st.cape<18)buys.push("CAPE < 18 (cheap)");
 if(sent!=null&&sent<55)buys.push("Sentiment < 55 (extreme pessimism)");
 if(vix!=null&&vix>30&&!(vix>40))sells.push("VIX > 30 (sustained stress)");
 if(st.cape!=null&&st.cape>35)sells.push("CAPE > 35 (extreme valuation)");
 if(epu!=null&&epu>200)sells.push("EPU > 200 (policy crisis)");

 return`<div class="sig-grid">
  <div class="sig-card" style="background:${buys.length?"rgba(0,230,118,.08)":"rgba(85,85,85,.04)"};border:1px solid ${buys.length?"rgba(0,230,118,.25)":"var(--bd)"}">
   <div class="m" style="font-size:9px;color:${buys.length?"var(--cl)":"var(--t4)"};margin-bottom:6px">BUY SIGNALS</div>
   ${buys.length?buys.map(b=>`<div style="font-size:11px;color:var(--cl);margin-bottom:3px">✓ ${b}</div>`).join(""):`<div style="font-size:11px;color:var(--t4)">None active</div>`}
   <div class="m" style="font-size:8px;color:var(--t5);margin-top:6px">VIX > 40 | CAPE < 18 | Sentiment < 55</div>
  </div>
  <div class="sig-card" style="background:${sells.length?"rgba(255,23,68,.08)":"rgba(85,85,85,.04)"};border:1px solid ${sells.length?"rgba(255,23,68,.25)":"var(--bd)"}">
   <div class="m" style="font-size:9px;color:${sells.length?"var(--st)":"var(--t4)"};margin-bottom:6px">SELL / REDUCE</div>
   ${sells.length?sells.map(b=>`<div style="font-size:11px;color:var(--st);margin-bottom:3px">⚠ ${b}</div>`).join(""):`<div style="font-size:11px;color:var(--t4)">None active</div>`}
   <div class="m" style="font-size:8px;color:var(--t5);margin-top:6px">VIX > 30 | CAPE > 35 | EPU > 200</div>
  </div></div>`}

function dynAlert(){const ad=st.al;const sahmD=st.d.sa||[],ycD=st.d.yc||[];
 const sv=sahmD.length?parseFloat(sahmD[sahmD.length-1].value):null;
 const both=ad.ycUD&&ad.sahmD,either=ad.ycUD||ad.sahmD;
 let bdr="rgba(144,164,174,.15)",bgc="rgba(144,164,174,.04)",ic="var(--wa)",ttl="PATTERN ANALYSIS";
 if(both){bdr="rgba(255,145,0,.2)";bgc="rgba(255,145,0,.05)";ic="var(--wn)";ttl="⚡ DUAL INDICATOR ALERT"}
 else if(either){bdr="rgba(255,193,7,.2)";bgc="rgba(255,193,7,.05)";ic="var(--ca)";ttl="PATTERN ALERT"}
 let ms=[];
 if(ad.ycInv&&ad.ycUD){const mo=mAgo(ad.ycUD),rem=mo!=null?18-mo:null;
  ms.push(`<strong style="color:var(--ca)">YC un-inverted ${fD(ad.ycUD)}</strong> (${mo} mo). ${rem!=null&&rem>0?`Window: ${rem} mo. Post-inversion bonus ACTIVE (+25pts).`:"Window passed."}`)}
 if(ad.sahmD)ms.push(`<strong style="color:var(--ca)">Sahm triggered ${fD(ad.sahmD)}</strong>. Now: ${sv!=null?sv.toFixed(2):"?"}. ${sv!=null&&sv<.5?"Retreated.":"Active."}`);
 if(st.clfRatio!=null)ms.push(`Claims/CLF: <strong>${st.clfRatio.toFixed(2)}</strong>`);
 if(both)ms.push(`<span style="color:var(--wn)">Both fired — preceded every recession since 1970.</span>`);
 if(!ms.length)ms.push("No active pattern alerts.");
 return`<div class="ab" style="background:${bgc};border:1px solid ${bdr}"><div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><span style="font-size:13px">⚠</span><span class="m" style="font-size:10px;font-weight:700;color:${ic};letter-spacing:.08em">${ttl}</span></div>
 ${ms.map(m=>`<p style="font-size:12px;color:#999;line-height:1.6;margin-bottom:4px">${m}</p>`).join("")}</div>`}

function mktB(){return`<div class="mg">${MK.map(m=>{const d=st.mk[m.f],full=st.mkF[m.f];const v=d?.length?parseFloat(d[d.length-1].value):null;const p=d?.length>1?parseFloat(d[d.length-2].value):null;
 const ch=v&&p?((v-p)/p*100).toFixed(2):null;const up=ch?parseFloat(ch)>=0:true;let pp=null,ppC="var(--t4)";
 if(m.pk&&full?.length>10){pp=peakPct(full);if(pp!=null){const pv=parseFloat(pp);ppC=pv<=-15?"var(--st)":pv<=-10?"var(--wn)":pv<=-5?"var(--ca)":"var(--cl)"}}
 return`<div class="mc"><div class="m" style="font-size:8px;color:var(--t4)">${m.n}</div><div class="m" style="font-size:14px;font-weight:700;margin-top:3px">${v!=null?`${m.p||""}${v.toFixed(m.d)}${m.x||""}`:"—"}</div>
 ${ch?`<div class="m" style="font-size:9px;color:${up?"var(--cl)":"var(--st)"};margin-top:2px">${up?"▲":"▼"} ${Math.abs(parseFloat(ch))}%</div>`:""}
 ${pp!=null?`<div class="m" style="font-size:8px;color:${ppC};margin-top:1px">${parseFloat(pp)>=0?"At peak":pp+"% from peak"}</div>`:""}</div>`}).join("")}</div>`}

function ctxPanel(){return`<div style="margin-bottom:20px">
 <div class="m" style="font-size:9px;color:var(--t4);letter-spacing:.1em;margin-bottom:10px">CONTEXT · REFERENCE ONLY</div>
 <div class="mp-grid">${CTX.map(c=>{const d=st.ctx[c.f]||[];const lat=d.length?parseFloat(d[d.length-1].value):null;
  const dir=c.dir?c.dir(d):null;let dispVal="—";if(c.isYoY)dispVal=c.fmt(lat,d);else if(lat!=null)dispVal=c.fmt(lat);
  const dirC=!dir?null:dir==="QE"||dir==="EXPANDING"||dir==="GROWTH"||dir==="FALLING"?"var(--cl)":"var(--st)";
  const dirBg=!dir?null:dirC==="var(--cl)"?"rgba(0,230,118,.1)":"rgba(255,23,68,.1)";
  return`<div class="mp-card"><div class="m" style="font-size:8px;color:var(--t4)">${c.n}</div>
  <div class="m" style="font-size:15px;font-weight:700;margin-top:4px">${dispVal}</div>
  ${dir?`<div class="mp-dir" style="background:${dirBg};color:${dirC};margin-top:4px">${dir}</div>`:""}
  <div style="font-size:9px;color:var(--t5);margin-top:3px">${c.desc.split('.')[0]}.</div>
  <div class="m" style="font-size:8px;color:var(--t5);margin-top:2px"><a href="https://fred.stlouisfed.org/series/${c.link}" target="_blank">${c.link} →</a></div></div>`}).join("")}</div></div>`}

function renderTier(tier){const t=TIERS[tier];const items=S.filter(s=>s.tier===tier);
 return`<div style="margin-bottom:8px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
 <div style="width:3px;height:14px;border-radius:2px;background:${t.color}"></div>
 <span class="m" style="font-size:10px;font-weight:700;color:${t.color};letter-spacing:.08em">${t.label}</span>
 <span class="m" style="font-size:9px;color:var(--t4)">${t.desc}</span></div>
 <div style="display:flex;flex-direction:column;gap:10px">${items.map(s=>card(s)).join("")}</div></div>`}

function card(s){const d=st.d[s.k]||[],status=st.ss[s.k]||"unknown",cfg=ST[status]||ST.unknown;
 const show=d.slice(-24);const lat=d.length?d[d.length-1]:null;const val=lat?parseFloat(lat.value):null;const op=st.ex[s.k];
 let disp="—",sub="";
 if(s.isCape&&st.cape)disp=st.cape.toFixed(1);
 else if(s.tr&&d.length>=3){const r=d.slice(-3).map(x=>parseFloat(x.value)).filter(x=>!isNaN(x));if(r.length>=2){const c=((r[r.length-1]-r[0])/1000).toFixed(0);disp=`${c>0?"+":""}${c}K`}}
 else if(s.divK&&val!=null&&!isNaN(val))disp=(val/1000).toFixed(0);
 else if(val!=null&&!isNaN(val))disp=val.toFixed(2);
 // EPU σ display
 if(s.isSD&&val!=null){const z=((val-110)/50);sub=`<div class="m" style="font-size:10px;color:${z>1.5?"var(--wn)":z>1?"var(--ca)":"var(--t3)"};margin-top:4px">${z.toFixed(2)}σ above mean (μ=110, σ=50)</div>`}
 // VIX sigmoid + rolling
 if(s.isSigmoid&&val!=null){const sig=sigmoid(val,25,.25).toFixed(0);const rz=st.vixRolling;
  sub=`<div style="margin-top:8px;padding:8px 10px;background:rgba(0,0,0,.25);border-radius:6px">
   <div style="display:flex;justify-content:space-between"><div><div class="m" style="font-size:8px;color:var(--t4)">SIGMOID SCORE</div>
   <div class="m" style="font-size:16px;font-weight:800;color:${sig>80?"var(--st)":sig>50?"var(--wn)":"var(--t2)"};margin-top:2px">${sig}<span style="font-size:10px;opacity:.5">/100</span></div></div>
   ${rz?`<div style="text-align:right"><div class="m" style="font-size:8px;color:var(--t4)">5YR ROLLING Z</div>
   <div class="m" style="font-size:16px;font-weight:800;color:${parseFloat(rz.z)>1.5?"var(--st)":parseFloat(rz.z)>1?"var(--wn)":"var(--t2)"};margin-top:2px">${rz.z}σ</div>
   <div class="m" style="font-size:8px;color:var(--t5)">μ=${rz.mean} σ=${rz.sd}</div></div>`:""}</div></div>`}
 // CLF ratio
 if(s.hasCLF&&st.clfRatio!=null){const rc=st.clfRatio>2.0?"var(--st)":st.clfRatio>1.6?"var(--wn)":st.clfRatio>1.3?"var(--ca)":"var(--cl)";
  sub+=`<div style="margin-top:8px;padding:8px 10px;background:rgba(0,0,0,.25);border-radius:6px">
   <div style="display:flex;justify-content:space-between"><div><div class="m" style="font-size:8px;color:var(--t4)">CLAIMS / CLF</div>
   <div class="m" style="font-size:18px;font-weight:800;color:${rc};margin-top:2px">${st.clfRatio.toFixed(2)}</div></div>
   <div style="text-align:right"><div class="m" style="font-size:8px;color:var(--t4)">4-WK MA</div><div class="m" style="font-size:12px;color:var(--t2);margin-top:2px">${st.claims4wk?Math.round(st.claims4wk).toLocaleString():"-"}</div>
   <div class="m" style="font-size:8px;color:var(--t4)">CLF: ${st.clfRaw?st.clfRaw.toLocaleString()+"K":"-"}</div></div></div>
   <div class="m" style="font-size:8px;color:var(--t5);margin-top:4px"><a href="https://fred.stlouisfed.org/series/CLF16OV" target="_blank">CLF16OV →</a> · <a href="https://fred.stlouisfed.org/series/ICSA" target="_blank">ICSA →</a></div></div>`}
 const wtBar=s.w?`<div class="wt-bar" style="width:${s.w*100}%;background:${TIERS[s.tier].color};opacity:.4"></div>`:"";
 let hcomp="";
 if(op&&(s.pre08!=null||s.pre20!=null)){hcomp=`<div class="db"><div class="m" style="font-size:9px;color:var(--t4);margin-bottom:6px">PRE-RECESSION</div><div class="hcomp">
  ${s.pre01!=null?`<div class="hcomp-cell"><div class="m" style="font-size:8px;color:var(--t4)">2001</div><div class="m" style="font-size:12px;color:var(--t2);margin-top:2px">${s.pre01}</div></div>`:""}
  ${s.pre08!=null?`<div class="hcomp-cell"><div class="m" style="font-size:8px;color:var(--t4)">2008</div><div class="m" style="font-size:12px;color:var(--t2);margin-top:2px">${s.pre08}</div></div>`:""}
  ${s.pre20!=null?`<div class="hcomp-cell"><div class="m" style="font-size:8px;color:var(--t4)">2020</div><div class="m" style="font-size:12px;color:var(--t2);margin-top:2px">${s.pre20}</div></div>`:""}
  </div></div>`}
 return`<div class="card" data-ck="${s.k}" style="background:${cfg.bg};border:1px solid ${cfg.b}">
 <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
 <div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">${dot(status)}<span class="m" style="font-size:10px;font-weight:700;letter-spacing:.1em;color:${cfg.c}">${cfg.l}</span>
  ${s.w?`<span class="m" style="font-size:8px;color:var(--t5)">${(s.w*100).toFixed(0)}%</span>`:""}</div>
 <h3 class="h" style="font-size:17px;font-weight:700;margin-bottom:2px">${s.n}</h3><p class="m" style="font-size:10px;color:#666">${s.s}</p>${wtBar}</div>
 <div style="text-align:right"><div class="m" style="font-size:26px;font-weight:800;color:${cfg.c};line-height:1.1">${disp}<span style="font-size:11px;opacity:.5">${s.u}</span></div>
 <div class="m" style="font-size:9px;color:var(--t4);margin-top:4px">${lat?.date||""}</div></div></div>
 ${s.isCape||s.isSigmoid?"":spark(show,cfg.c)}${sub}
 ${op?`<div style="margin-top:14px;padding-top:14px;border-top:1px solid ${cfg.b}"><div class="desc">${s.desc}</div>
 <div class="db"><div class="m" style="font-size:9px;color:var(--t4)">THRESHOLDS</div><p class="m" style="font-size:11px;color:#888;margin-top:4px;line-height:1.7">${s.th}</p></div>
 <div class="db"><div class="m" style="font-size:9px;color:var(--t4)">TRACK RECORD & WEIGHT</div><p class="m" style="font-size:11px;color:#888;margin-top:4px;line-height:1.7">${s.hi}</p></div>
 ${hcomp}<p class="m" style="font-size:9px;color:var(--t5);margin-top:6px">${s.isCape?`<a href="https://www.multpl.com/shiller-pe" target="_blank">multpl.com →</a>`:`FRED: ${s.f} · <a href="https://fred.stlouisfed.org/series/${s.f}" target="_blank">FRED →</a>`}</p></div>`:""}
 <div class="m" style="font-size:9px;color:var(--t5);text-align:right;margin-top:6px">${op?"▲":"▼"}</div></div>`}

function btSection(){const ov=st.bt.ov;
 return`<div class="bt-wrap"><div class="bt-hdr" onclick="toggleBT()"><div><div class="h" style="font-size:15px;font-weight:700">📊 Composite Backtest</div>
  <p class="m" style="font-size:9px;color:var(--t4);margin-top:2px">Weighted score vs NBER recessions · includes bonuses</p></div>
  <span class="m" style="font-size:12px;color:var(--t4)">${st.bt.open?"▲":"▼"}</span></div>
 ${st.bt.open?`<div class="bt-body">
  ${st.bt.loading?`<div style="text-align:center;padding:30px 0"><div class="lp" style="font-size:24px">📊</div><p class="m" style="font-size:11px;color:#666;margin-top:10px">Loading historical data...</p></div>`:
   st.bt.err?`<p class="m" style="color:var(--st)">${st.bt.err}</p>`:
   st.bt.loaded?`
    <div style="margin-bottom:10px"><div class="m" style="font-size:8px;color:var(--t4);margin-bottom:6px">OVERLAYS</div>
     <div style="display:flex;gap:5px;flex-wrap:wrap">${tgBtn("score","Recession","#FFC107")} ${tgBtn("spx","S&P 500","#64B5F6")} ${tgBtn("leading","Leading","#42A5F5")} ${tgBtn("confirming","Confirming","#AB47BC")} ${tgBtn("market","Market","#FFA726")}</div>
     <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:6px">${S.map(s=>tgBtn(s.k,s.n.split(" ")[0],s.btColor)).join("")}</div></div>
    ${renderBTChart()}
    <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
     <div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:rgba(255,255,255,.08)"></div><span class="m" style="font-size:8px;color:var(--t4)">NBER Recession</span></div></div>
    <p class="m" style="font-size:8px;color:var(--t5);margin-top:8px">75% Leading (YC×.45 + Credit×.35 + Claims×.20) + 25% Confirming (Sahm×.60 + Mfg×.40). +25pt post-inversion bonus. +10pt YC×Credit interaction. VIX sigmoid. Market tier as overlay.</p>
   `:`<button onclick="loadBacktest()" class="m" style="width:100%;padding:12px;background:rgba(255,193,7,.1);border:1px solid rgba(255,193,7,.2);border-radius:8px;color:var(--ca);font-size:11px;font-weight:700;cursor:pointer">LOAD HISTORICAL BACKTEST</button>`}
 </div>`:""}</div>`}

function leg(){return`<div class="lg"><div class="m" style="font-size:9px;color:var(--t4);margin-bottom:10px">METHODOLOGY v3</div>
 <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:12px">
 ${Object.entries(TIERS).map(([k,t])=>`<div style="display:flex;align-items:center;gap:8px"><div style="width:3px;height:12px;border-radius:2px;background:${t.color}"></div><span class="m" style="font-size:9px;color:${t.color}">${t.label}</span><span class="m" style="font-size:9px;color:var(--t4)">${t.desc}</span></div>`).join("")}
 <div style="display:flex;align-items:center;gap:8px"><div style="width:3px;height:12px;border-radius:2px;background:var(--t4)"></div><span class="m" style="font-size:9px;color:var(--t4)">CONTEXT</span><span class="m" style="font-size:9px;color:var(--t5)">LEI, Fed BS, CPI, M2, GDP</span></div></div>
 <div style="display:flex;flex-wrap:wrap;gap:8px 16px;margin-bottom:10px">${Object.entries(ST).filter(([k])=>k!=="unknown").map(([k,v])=>`<div style="display:flex;align-items:center;gap:5px">${dot(k,7)}<span class="m" style="font-size:10px;color:${v.c}">${v.l}</span></div>`).join("")}</div>
 <div class="m" style="font-size:8px;color:var(--t5);line-height:1.6">
 <strong style="color:var(--t4)">Recession Score</strong> = 75% Leading (YC×45% + Credit×35% + Claims×20%) + 25% Confirming (Sahm×60% + Mfg×40%)<br>
 <strong style="color:var(--t4)">Bonuses:</strong> +25pt post-inversion steepening (YC un-inverted within 18mo) · +10pt interaction (YC & Credit both >50)<br>
 <strong style="color:var(--t4)">Market:</strong> 4 independent triggers. VIX: sigmoid(mid=25,k=0.25). CAPE: absolute. EPU: SD(μ=110,σ=50). Sentiment: contrarian buy.<br>
 <strong style="color:var(--t4)">Context:</strong> LEI removed from scoring (overlaps YC+Claims+Credit). Shown as reference.<br>
 <a href="https://fred.stlouisfed.org" target="_blank" style="color:var(--t4)">fred.stlouisfed.org</a> · <a href="https://www.matteoiacoviello.com/gpr.htm" target="_blank" style="color:var(--t4)">GPR Index</a> · Not financial advice.</div></div>`}

function toggleAR(){if(st.autoRef){clearInterval(st.autoRef);st.autoRef=null}else{st.autoRef=setInterval(()=>loadAll(),4*60*60*1000)}render()}
function toggleBT(){st.bt.open=!st.bt.open;render()}
function togOv(k){st.bt.ov[k]=!st.bt.ov[k];render()}
function rst(){st.key=null;st.d={};st.mk={};st.mkF={};st.ss={};st.ex={};st.ctx={};st.bt={open:false,loading:false,loaded:false,data:null,err:null,ov:defaultOv()};if(st.autoRef)clearInterval(st.autoRef);st.autoRef=null;localStorage.removeItem("rr14");render()}
render();if(st.key)loadAll();
</script>
