<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Recession Radar">
<meta name="theme-color" content="#0E0D0B">
<title>Recession Radar</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0E0D0B;--sf:rgba(14,13,11,.8);--bd:#1E1D1A;--tx:#E8E6E3;--t2:#AAA;--t3:#777;--t4:#555;--t5:#333;--cl:#00E676;--wa:#90A4AE;--ca:#FFC107;--wn:#FF9100;--st:#FF1744}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;-webkit-text-size-adjust:100%}
.m{font-family:'JetBrains Mono','Fira Code',monospace}.h{font-family:'Space Grotesk',sans-serif}.c{max-width:720px;margin:0 auto;padding:16px 16px 60px}
.card{border-radius:12px;padding:18px 20px;cursor:pointer;transition:border-color .25s;-webkit-tap-highlight-color:transparent}
.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.mc{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:10px 12px}
.ga{background:linear-gradient(135deg,rgba(14,13,11,.95),rgba(22,20,17,.95));border-radius:14px;padding:24px 20px;margin-bottom:20px;position:relative;overflow:hidden}
.gb{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--cl),var(--ca),var(--wn),var(--st));opacity:.45}
.ab{border-radius:10px;padding:14px 16px;margin-bottom:20px}.db{background:rgba(0,0,0,.3);border-radius:8px;padding:10px 12px;margin-bottom:7px}
.lg{margin-top:24px;padding:14px 16px;background:var(--sf);border:1px solid var(--bd);border-radius:10px}
.dt{display:inline-block;border-radius:50%;flex-shrink:0}
.si{width:100%;padding:12px 14px;background:var(--bg);border:1px solid #333;border-radius:8px;color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:14px;outline:none;-webkit-appearance:none}.si:focus{border-color:var(--ca)}
.sb{width:100%;padding:14px;border:none;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.06em;cursor:pointer;-webkit-appearance:none}
.sa{background:var(--ca);color:var(--bg)}.sd{background:#333;color:#666;cursor:default}
@keyframes p{0%,100%{opacity:.4}50%{opacity:1}}.lp{animation:p 1.5s ease-in-out infinite}
.err-box{background:rgba(255,23,68,.07);border:1px solid rgba(255,23,68,.18);border-radius:8px;padding:10px 14px;margin-bottom:16px}
a{color:var(--ca)}
.hcomp{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}.hcomp-cell{background:rgba(0,0,0,.2);border-radius:6px;padding:6px 8px;text-align:center}
.ar-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:9px;letter-spacing:.05em}
@media(max-width:500px){.mg{grid-template-columns:repeat(2,1fr)}.card{padding:14px 16px}.ga{padding:18px 14px}.hcomp{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const PX=[u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,u=>u];

/* ═══ INDICATORS (9 total — added CAPE) ═══ */
const S=[
 {k:"yc",f:"T10Y2Y",n:"Yield Curve",s:"10Y − 2Y Treasury Spread",u:"%",
  th:"< −0.3 Inverted (Stress) | 0–0.2 Flat (Caution) | > 0.5 Normal",
  hi:"Predicted 8/8 recessions since 1970. Recession arrives after un-inversion.",
  pre08:-0.19,pre20:0.04,pre01:-0.52,
  ev:v=>v==null?"unknown":v<-.3?"stress":v<0?"warning":v<.2?"caution":v<.5?"watch":"clear"},
 {k:"sa",f:"SAHMREALTIME",n:"Sahm Rule",s:"Unemployment Rate Momentum",u:" pp",
  th:"≥ 0.50 Recession signal | 0.30–0.50 Approaching | < 0.15 Clear",
  hi:"Triggered every recession since 1950. Only 2 false positives since 1959.",
  pre08:0.53,pre20:0.5,pre01:0.3,
  ev:v=>v==null?"unknown":v>=.5?"stress":v>=.3?"warning":v>=.15?"caution":"clear"},
 {k:"cr",f:"BAMLH0A0HYM2",n:"Credit Spreads",s:"ICE BofA High Yield OAS",u:"%",
  th:"< 3.5% Normal | 3.5–5% Elevated | 5–8% Stress | > 8% Crisis",
  hi:"Hit 10%+ in 2008 and Mar 2020. Credit leads equities by weeks.",
  pre08:7.96,pre20:3.57,pre01:6.45,
  ev:v=>v==null?"unknown":v>8?"stress":v>5?"warning":v>3.5?"caution":"clear"},
 {k:"li",f:"USSLIND",n:"Leading Index",s:"Philly Fed Leading Index",u:"%",
  th:"< −2 Stress | −0.5 to −2 Warning | 0 to −0.5 Caution | > 1 Strong",
  hi:"Negative readings preceded every recession in 50 years.",
  pre08:-1.21,pre20:0.28,pre01:-0.88,
  ev:v=>v==null?"unknown":v<-2?"stress":v<-.5?"warning":v<0?"caution":v<1?"watch":"clear"},
 {k:"mf",f:"MANEMP",n:"Mfg Employment",s:"Manufacturing Jobs (ISM proxy)",u:"K",tr:1,
  th:"3-mo change: losses > 50K = Stress | losses = Caution | gains = Clear",
  hi:"Mfg job losses preceded every recession since 1948.",
  ev:(v,t)=>t==null?"unknown":t<-50?"stress":t<-20?"warning":t<0?"caution":t<20?"watch":"clear"},
 {k:"co",f:"UMCSENT",n:"Consumer Sentiment",s:"Univ. of Michigan Index",u:"",
  th:"< 55 Stress | 55–60 Warning | 60–70 Caution | 70–80 Watch | > 80 Healthy",
  hi:"Sharp declines preceded consumer spending pullbacks and recessions.",
  pre08:63.0,pre20:101.0,pre01:94.7,
  ev:v=>v==null?"unknown":v<55?"stress":v<60?"warning":v<70?"caution":v<80?"watch":"clear"},
 {k:"vx",f:"VIXCLS",n:"VIX",s:"CBOE Volatility Index",u:"",
  th:"< 15 Complacent | 15–20 Normal | 20–25 Watch | 25–30 Caution | > 30 Warning | > 35 Stress",
  hi:"VIX > 30 preceded every major selloff in 20 years.",
  pre08:23.0,pre20:14.0,pre01:25.5,
  ev:v=>v==null?"unknown":v>35?"stress":v>30?"warning":v>25?"caution":v>20?"watch":"clear"},
 {k:"ic",f:"ICSA",n:"Jobless Claims",s:"Initial Claims (Weekly)",u:"K",
  th:"< 220K Healthy | 220–260K Normal | 260–300K Elevated | > 300K Warning | > 350K Stress",
  hi:"Weekly leading indicator. Sustained rise above 260K = labor market cracking.",
  pre08:346,pre20:282,pre01:305,
  ev:v=>v==null?"unknown":v>350?"stress":v>300?"warning":v>260?"caution":v>220?"watch":"clear",
  divK:true},
 {k:"cape",f:"_CAPE_",n:"Shiller CAPE",s:"Cyclically Adjusted P/E (P/E 10)",u:"x",isCape:true,
  th:"< 15 Undervalued | 15–20 Fair | 20–25 Elevated | 25–30 Expensive | 30–38 Very Expensive | > 38 Extreme",
  hi:"Median: 16.0 | Pre-2000: 44.2 | Pre-2008: 27.3 | Pre-2020: 31.3. High CAPE = further to fall in a crash.",
  pre08:27.3,pre20:31.3,pre01:44.2,
  ev:v=>v==null?"unknown":v>38?"stress":v>30?"warning":v>25?"caution":v>20?"watch":"clear"},
];

/* ═══ MARKET CONTEXT (6 cells — no Gold, DXY is back) ═══ */
const MK=[
 {f:"SP500",n:"S&P 500",p:"",d:0,pk:true},
 {f:"NASDAQCOM",n:"NASDAQ",p:"",d:0,pk:true},
 {f:"DCOILBRENTEU",n:"Brent Oil",p:"$",d:2},
 {f:"DGS10",n:"10Y Yield",p:"",x:"%",d:2},
 {f:"DFF",n:"Fed Funds",p:"",x:"%",d:2},
 {f:"DTWEXBGS",n:"DXY Dollar",p:"",d:1},
];

const ST={
 clear:{c:"#00E676",bg:"rgba(0,230,118,.07)",b:"rgba(0,230,118,.22)",l:"CLEAR"},
 watch:{c:"#90A4AE",bg:"rgba(144,164,174,.06)",b:"rgba(144,164,174,.18)",l:"NORMAL"},
 caution:{c:"#FFC107",bg:"rgba(255,193,7,.07)",b:"rgba(255,193,7,.22)",l:"CAUTION"},
 warning:{c:"#FF9100",bg:"rgba(255,145,0,.07)",b:"rgba(255,145,0,.22)",l:"WARNING"},
 stress:{c:"#FF1744",bg:"rgba(255,23,68,.07)",b:"rgba(255,23,68,.22)",l:"STRESS"},
 unknown:{c:"#555",bg:"rgba(85,85,85,.05)",b:"rgba(85,85,85,.15)",l:"—"},
};
const LV=[
 {x:1,l:"GREEN",s:"Full Offense",c:"#00E676",st:"Buy pullbacks aggressively. Full equity exposure. Lean into growth."},
 {x:3,l:"YELLOW",s:"Proceed with Caution",c:"#FFC107",st:"Tighten stops. Reduce position sizes. Build cash from profits. Favor quality."},
 {x:5,l:"ORANGE",s:"Defensive Mode",c:"#FF9100",st:"Raise cash to 20–30%. Sell speculative positions. Favor dividends & defensives."},
 {x:99,l:"RED",s:"Capital Preservation",c:"#FF1744",st:"Raise cash 40–50%. Exit leverage. Hedge. Survive first, profit later."},
];

let st={key:localStorage.getItem("rr7")||null,d:{},mk:{},mkF:{},ss:{},ex:{},ld:false,err:null,upd:null,px:0,
 al:{ycUD:null,ycInv:false,sahmD:null,sahmPk:null},cape:null,autoRef:null};

/* ── FRED Fetch ── */
async function ff(sid,key,lim=24){
 const base=`https://api.stlouisfed.org/fred/series/observations?series_id=${sid}&api_key=${key}&file_type=json&sort_order=desc&limit=${lim}`;
 const ord=[st.px,...[0,1,2].filter(i=>i!==st.px)];
 for(const i of ord){
  try{const r=await fetch(PX[i](base),{signal:AbortSignal.timeout(15000)});if(!r.ok)continue;
   const txt=await r.text();let j;try{j=JSON.parse(txt)}catch{continue}
   if(j.observations){st.px=i;return j.observations.filter(o=>o.value!==".").reverse()}
   if(j.contents){try{const p=JSON.parse(j.contents);if(p.observations){st.px=i;return p.observations.filter(o=>o.value!==".").reverse()}}catch{}}
  }catch{continue}}
 throw new Error(sid);
}

/* ── CAPE Fetch from multpl.com ── */
async function fetchCAPE(){
 const urls=["https://www.multpl.com/shiller-pe","https://www.multpl.com/shiller-pe/table/by-month"];
 for(const url of urls){
  const ord=[st.px,...[0,1,2].filter(i=>i!==st.px)];
  for(const i of ord){
   try{
    const r=await fetch(PX[i](url),{signal:AbortSignal.timeout(12000)});
    if(!r.ok)continue;
    const html=await r.text();
    // Look for the current value in the HTML
    // multpl.com displays it as "Current Shiller PE Ratio is XX.XX"
    const patterns=[
     /Current\s+Shiller\s+PE\s+Ratio[^0-9]*?([\d]{1,2}\.[\d]{1,2})/i,
     /id="current"[^>]*>([^<]*[\d]+\.[\d]+)/i,
     /<td[^>]*>(?:Apr|Mar|Feb|Jan|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d+,?\s*\d{4}<\/td>\s*<td[^>]*>([\d.]+)/i,
     /([\d]{2}\.[\d]{2})\s*<\/td>/,
    ];
    for(const pat of patterns){
     const m=html.match(pat);
     if(m&&m[1]){const v=parseFloat(m[1]);if(v>5&&v<100){st.cape=v;return}}}
   }catch{continue}}}
 // Fallback: try GuruFocus
 try{
  const r=await fetch(PX[st.px]("https://www.gurufocus.com/economic_indicators/56/sp-500-shiller-cape-ratio"),{signal:AbortSignal.timeout(10000)});
  if(r.ok){const html=await r.text();const m=html.match(/([\d]{2}\.[\d]{2})/);if(m){const v=parseFloat(m[1]);if(v>5&&v<100){st.cape=v;return}}}
 }catch{}
 st.cape=null;
}

function analyzeYC(d){if(!d||d.length<5)return{ycUD:null,ycInv:false};
 let ld=null,ud=null,inv=false;for(let i=0;i<d.length;i++){const v=parseFloat(d[i].value);if(isNaN(v))continue;if(v<0){inv=true;ld=d[i].date}else if(inv&&!ud)ud=d[i].date}
 return{ycUD:ud,ycInv:inv}}
function analyzeSahm(d){if(!d||d.length<3)return{sahmD:null,sahmPk:null};
 let td=null,pk=0;for(let i=0;i<d.length;i++){const v=parseFloat(d[i].value);if(isNaN(v))continue;if(v>pk)pk=v;if(v>=.5&&!td)td=d[i].date}
 return{sahmD:td,sahmPk:pk}}
function peakPct(d){if(!d||d.length<10)return null;const v=d.map(x=>parseFloat(x.value)).filter(x=>!isNaN(x));if(v.length<10)return null;
 return(((v[v.length-1]-Math.max(...v))/Math.max(...v))*100).toFixed(1)}

async function loadAll(){
 st.ld=true;st.err=null;render();let ok=0,fl=[];
 for(const s of S){
  if(s.isCape)continue; // handled separately
  try{const lim=s.k==="yc"?500:s.k==="sa"?60:s.k==="ic"?52:24;st.d[s.k]=await ff(s.f,st.key,lim);ok++}
  catch{st.d[s.k]=[];fl.push(s.n)}}
 for(const m of MK){try{st.mkF[m.f]=await ff(m.f,st.key,m.pk?260:10);st.mk[m.f]=st.mkF[m.f].slice(-5)}catch{st.mk[m.f]=[];st.mkF[m.f]=[]}}
 await fetchCAPE();
 // Set CAPE data for card display
 if(st.cape){st.d["cape"]=[{date:new Date().toISOString().split("T")[0],value:st.cape.toString()}];ok++}else{st.d["cape"]=[];fl.push("CAPE")}
 // Evaluate statuses
 for(const s of S){const obs=st.d[s.k]||[];
  if(s.isCape){st.ss[s.k]=s.ev(st.cape);continue}
  if(s.tr){const v=obs.slice(-3).map(x=>parseFloat(x.value)).filter(x=>!isNaN(x));st.ss[s.k]=s.ev(null,v.length>=2?v[v.length-1]-v[0]:null)}
  else{let l=obs.length?parseFloat(obs[obs.length-1].value):null;if(s.divK&&l)l=l/1000;st.ss[s.k]=s.ev(isNaN(l)?null:l)}}
 st.al={...analyzeYC(st.d.yc||[]),...analyzeSahm(st.d.sa||[])};st.upd=new Date();
 if(ok===0)st.err="No data. Check FRED API key: fred.stlouisfed.org/docs/api/api_key.html";
 else if(fl.length)st.err=`Loaded ${ok}/${S.length}. Missing: ${fl.join(", ")}`;
 st.ld=false;render()
}

function spark(d,c,w=180,h=42){if(!d||d.length<2)return"";const v=d.map(x=>parseFloat(x.value)).filter(x=>!isNaN(x));if(v.length<2)return"";
 const mn=Math.min(...v),mx=Math.max(...v),r=mx-mn||1;const pts=v.map((val,i)=>`${(i/(v.length-1))*w},${h-((val-mn)/r)*(h-6)-3}`).join(" ");
 const ly=h-((v[v.length-1]-mn)/r)*(h-6)-3;
 return`<svg width="${w}" height="${h}" style="display:block;margin-top:6px;opacity:.75"><defs><linearGradient id="g${c.slice(1)}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${c}" stop-opacity=".2"/><stop offset="100%" stop-color="${c}" stop-opacity="0"/></linearGradient></defs><polygon points="0,${h} ${pts} ${w},${h}" fill="url(#g${c.slice(1)})"/><polyline points="${pts}" fill="none" stroke="${c}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${w}" cy="${ly}" r="2.5" fill="${c}"/></svg>`}
function dot(s,sz=8){const c=(ST[s]||ST.unknown).c;return`<span class="dt" style="width:${sz}px;height:${sz}px;background:${c};box-shadow:0 0 ${sz+2}px ${c}40"></span>`}
function fD(d){if(!d)return"?";return new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",year:"numeric"})}
function mAgo(d){if(!d)return null;return Math.round((new Date()-new Date(d+"T00:00:00"))/(1000*60*60*24*30.44))}

function render(){const a=document.getElementById("app");
 if(!st.key){a.innerHTML=setup();bindSetup();return}
 if(st.ld&&!S.some(s=>(st.d[s.k]||[]).length)){a.innerHTML=`<div class="c" style="text-align:center;padding-top:100px"><div style="font-size:32px" class="lp">📡</div><p class="m" style="font-size:13px;color:#666;margin-top:16px">Fetching live data...</p><p class="m" style="font-size:10px;color:#444;margin-top:6px">Loading 9 indicators + 6 market series + CAPE</p></div>`;return}
 a.innerHTML=`<div class="c">${hdr()}${st.err?`<div class="err-box"><p class="m" style="font-size:11px;color:var(--st);line-height:1.5;white-space:pre-line">${st.err}</p></div>`:""}${gauge()}${dynAlert()}${mktB()}<div class="m" style="font-size:9px;color:var(--t4);letter-spacing:.1em;margin-bottom:10px">INDICATORS · TAP FOR DETAILS</div><div style="display:flex;flex-direction:column;gap:10px">${S.map(s=>card(s)).join("")}</div>${leg()}</div>`;
 document.querySelectorAll("[data-ck]").forEach(el=>el.addEventListener("click",()=>{st.ex[el.dataset.ck]=!st.ex[el.dataset.ck];render()}))}

function setup(){return`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px"><div style="max-width:420px;width:100%;text-align:center">
 <h1 class="h" style="font-size:24px;font-weight:800;margin-bottom:4px">📡 RECESSION RADAR</h1>
 <p class="m" style="font-size:9px;color:var(--t4);letter-spacing:.12em;margin-bottom:32px">LIVE ECONOMIC INDICATOR DASHBOARD</p>
 <div style="background:rgba(20,19,16,.95);border:1px solid #2A2825;border-radius:14px;padding:28px 24px;text-align:left">
 <p style="font-size:13px;color:#888;line-height:1.7;margin-bottom:16px">Tracks 9 recession indicators with live FRED data + Shiller CAPE. Free API key required.</p>
 <a href="https://fred.stlouisfed.org/docs/api/api_key.html" target="_blank" class="m" style="font-size:11px;margin-bottom:20px;display:inline-block;text-decoration:underline">Get free FRED API key →</a>
 <div style="margin-bottom:16px"><label class="m" style="font-size:9px;color:var(--t4);letter-spacing:.1em;display:block;margin-bottom:6px">FRED API KEY</label>
 <input type="password" id="ki" class="si" placeholder="Paste FRED API key"></div>
 <button id="lb" class="sb sd" disabled>LAUNCH DASHBOARD</button></div>
 <p class="m" style="font-size:8px;color:var(--t5);margin-top:14px">Add to home screen for app-like access on any device</p>
 </div></div>`}
function bindSetup(){setTimeout(()=>{const i=document.getElementById("ki"),b=document.getElementById("lb");if(!i||!b)return;
 i.addEventListener("input",()=>{const h=i.value.trim().length>10;b.disabled=!h;b.className=`sb ${h?"sa":"sd"}`});
 const go=()=>{const k=i.value.trim();if(k){st.key=k;localStorage.setItem("rr7",k);loadAll()}};
 b.addEventListener("click",go);i.addEventListener("keydown",e=>{if(e.key==="Enter")go()})},50)}

function hdr(){const t=st.upd?st.upd.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):"";const arOn=!!st.autoRef;
 return`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--bd);flex-wrap:wrap;gap:8px">
 <div><h1 class="h" style="font-size:20px;font-weight:800;letter-spacing:-.03em">📡 RECESSION RADAR</h1>
 <p class="m" style="font-size:9px;color:var(--t4);margin-top:2px;letter-spacing:.1em">LIVE · ${t} · 9 INDICATORS</p></div>
 <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
 <button onclick="toggleAR()" class="m ar-badge" style="background:${arOn?"rgba(0,230,118,.12)":"rgba(85,85,85,.1)"};border:1px solid ${arOn?"rgba(0,230,118,.3)":"#333"};color:${arOn?"var(--cl)":"var(--t4)"};cursor:pointer">${arOn?"⏱ AUTO":"⏱ OFF"}</button>
 <button onclick="loadAll()" class="m" style="padding:5px 12px;background:#1E1D1A;border:1px solid #2A2825;border-radius:6px;color:#AAA;font-size:10px;cursor:pointer">⟳</button>
 <button onclick="rst()" class="m" style="padding:5px 8px;background:transparent;border:1px solid #222;border-radius:6px;color:var(--t5);font-size:10px;cursor:pointer">✕</button>
 </div></div>`}

function gauge(){const ss=S.map(s=>st.ss[s.k]||"unknown");
 const sv=ss.filter(s=>s==="stress"||s==="warning").length,ca=ss.filter(s=>s==="caution").length,wa=ss.filter(s=>s==="watch").length,al=sv+ca;
 let lv=LV[0];for(const o of LV)if(al<=o.x){lv=o;break}if(al>=6)lv=LV[3];
 return`<div class="ga" style="border:1px solid ${lv.c}22"><div class="gb"></div>
 <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
 <div><div class="m" style="font-size:9px;color:var(--t4);letter-spacing:.14em;margin-bottom:6px">RECESSION RISK</div>
 <div style="display:flex;align-items:center;gap:12px"><span class="h" style="font-size:32px;font-weight:800;color:${lv.c};line-height:1">${lv.l}</span><span style="font-size:13px;color:var(--t3);border-left:1px solid #2A2825;padding-left:12px">${lv.s}</span></div></div>
 <div style="display:flex;gap:14px">${[{n:sv,l:"Alerts",c:"var(--st)"},{n:ca,l:"Cautions",c:"var(--ca)"},{n:wa,l:"Watch",c:"var(--wa)"}].map(x=>`<div style="text-align:center"><div class="m" style="font-size:20px;font-weight:800;color:${x.c}">${x.n}</div><div class="m" style="font-size:8px;color:var(--t4)">${x.l}</div></div>`).join("")}</div></div>
 <div style="margin-top:14px;padding:10px 12px;background:${lv.c}0C;border-radius:8px;border:1px solid ${lv.c}15">
 <span class="m" style="font-size:9px;color:${lv.c};letter-spacing:.06em">STRATEGY</span>
 <p style="font-size:12px;color:var(--t2);margin-top:4px;line-height:1.6">${lv.st}</p></div></div>`}

function dynAlert(){const ad=st.al;const sahmD=st.d.sa||[],ycD=st.d.yc||[];
 const sv=sahmD.length?parseFloat(sahmD[sahmD.length-1].value):null;
 const yv=ycD.length?parseFloat(ycD[ycD.length-1].value):null;
 const both=ad.ycUD&&ad.sahmD,either=ad.ycUD||ad.sahmD;
 let bdr="rgba(144,164,174,.15)",bgc="rgba(144,164,174,.04)",ic="var(--wa)",ttl="PATTERN ANALYSIS";
 if(both){bdr="rgba(255,145,0,.2)";bgc="rgba(255,145,0,.05)";ic="var(--wn)";ttl="⚡ DUAL INDICATOR ALERT"}
 else if(either){bdr="rgba(255,193,7,.2)";bgc="rgba(255,193,7,.05)";ic="var(--ca)";ttl="PATTERN ALERT"}
 let ms=[];
 if(ad.ycInv&&ad.ycUD){const mo=mAgo(ad.ycUD),rem=mo!=null?18-mo:null,inW=rem!=null&&rem>0;
  ms.push(`<strong style="color:var(--ca)">Yield curve un-inverted ${fD(ad.ycUD)}</strong> (${mo} mo ago). ${inW?`Within recession window (${rem} mo left).`:"18-mo window passed. Delayed effects possible."} Current: ${yv!=null?yv.toFixed(2)+"%":"N/A"}.`)}
 else if(yv!=null&&yv<0)ms.push(`<strong style="color:var(--st)">Yield curve inverted</strong> at ${yv.toFixed(2)}%. Recession follows 6–18 mo after un-inversion.`);
 else ms.push(`Yield curve positive at ${yv!=null?yv.toFixed(2)+"%":"N/A"}. No recent inversion in data.`);
 if(ad.sahmD)ms.push(`<strong style="color:var(--ca)">Sahm Rule triggered ${fD(ad.sahmD)}</strong> (peak: ${ad.sahmPk!=null?ad.sahmPk.toFixed(2):"?"}). Current: ${sv!=null?sv.toFixed(2):"N/A"}. ${sv!=null&&sv<.5?"Retreated — only 2 false positives since 1959.":"Signal active."}`);
 else ms.push(`Sahm Rule at ${sv!=null?sv.toFixed(2):"N/A"} — ${sv!=null&&sv>=.3?"approaching":"below"} 0.50 threshold.`);
 if(st.cape)ms.push(`Shiller CAPE at <strong style="color:${st.cape>30?"var(--wn)":st.cape>25?"var(--ca)":"var(--t2)"}">${st.cape.toFixed(1)}x</strong> (median: 16). ${st.cape>30?"Elevated valuations amplify downside risk in a recession.":"Valuations are a factor to monitor."}`);
 if(both)ms.push(`<span style="color:var(--wn)">Both yield curve and Sahm Rule fired — preceded every major recession since 1970.</span>`);
 return`<div class="ab" style="background:${bgc};border:1px solid ${bdr}">
 <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap"><span style="font-size:13px">⚠</span>
 <span class="m" style="font-size:10px;font-weight:700;color:${ic};letter-spacing:.08em">${ttl}</span>
 <span class="m" style="font-size:8px;color:var(--t5);margin-left:auto">LIVE</span></div>
 ${ms.map(m=>`<p style="font-size:12px;color:#999;line-height:1.7;margin-bottom:6px">${m}</p>`).join("")}</div>`}

function mktB(){return`<div class="mg">${MK.map(m=>{
 const d=st.mk[m.f],full=st.mkF[m.f];const v=d?.length?parseFloat(d[d.length-1].value):null;
 const p=d?.length>1?parseFloat(d[d.length-2].value):null;
 const ch=v&&p?((v-p)/p*100).toFixed(2):null;const up=ch?parseFloat(ch)>=0:true;
 let pp=null,ppC="var(--t4)";
 if(m.pk&&full?.length>10){pp=peakPct(full);if(pp!=null){const pv=parseFloat(pp);ppC=pv<=-15?"var(--st)":pv<=-10?"var(--wn)":pv<=-5?"var(--ca)":"var(--cl)"}}
 return`<div class="mc"><div class="m" style="font-size:8px;color:var(--t4);letter-spacing:.08em">${m.n}</div>
 <div class="m" style="font-size:14px;font-weight:700;margin-top:3px">${v!=null?`${m.p||""}${v.toFixed(m.d)}${m.x||""}`:"—"}</div>
 ${ch?`<div class="m" style="font-size:9px;color:${up?"var(--cl)":"var(--st)"};margin-top:2px">${up?"▲":"▼"} ${Math.abs(parseFloat(ch))}%</div>`:""}
 ${pp!=null?`<div class="m" style="font-size:8px;color:${ppC};margin-top:1px">${parseFloat(pp)>=0?"At peak":pp+"% from peak"}</div>`:""}
 </div>`}).join("")}</div>`}

function card(s){const d=st.d[s.k]||[],status=st.ss[s.k]||"unknown",cfg=ST[status]||ST.unknown;
 const show=d.slice(-24);const lat=d.length?d[d.length-1]:null;const val=lat?parseFloat(lat.value):null;const op=st.ex[s.k];
 let disp="—";
 if(s.isCape&&st.cape)disp=st.cape.toFixed(1);
 else if(s.tr&&d.length>=3){const r=d.slice(-3).map(x=>parseFloat(x.value)).filter(x=>!isNaN(x));if(r.length>=2){const c=((r[r.length-1]-r[0])/1000).toFixed(0);disp=`${c>0?"+":""}${c}K`}}
 else if(s.divK&&val!=null&&!isNaN(val))disp=(val/1000).toFixed(0);
 else if(val!=null&&!isNaN(val))disp=val.toFixed(2);
 let hcomp="";
 if(op&&(s.pre08!=null||s.pre20!=null)){
  hcomp=`<div class="db"><div class="m" style="font-size:9px;color:var(--t4);letter-spacing:.1em;margin-bottom:6px">PRE-RECESSION LEVELS</div><div class="hcomp">
  ${s.pre01!=null?`<div class="hcomp-cell"><div class="m" style="font-size:8px;color:var(--t4)">Pre-2001</div><div class="m" style="font-size:12px;color:var(--t2);margin-top:2px">${s.pre01}</div></div>`:""}
  ${s.pre08!=null?`<div class="hcomp-cell"><div class="m" style="font-size:8px;color:var(--t4)">Pre-2008</div><div class="m" style="font-size:12px;color:var(--t2);margin-top:2px">${s.pre08}</div></div>`:""}
  ${s.pre20!=null?`<div class="hcomp-cell"><div class="m" style="font-size:8px;color:var(--t4)">Pre-2020</div><div class="m" style="font-size:12px;color:var(--t2);margin-top:2px">${s.pre20}</div></div>`:""}
  </div></div>`}
 return`<div class="card" data-ck="${s.k}" style="background:${cfg.bg};border:1px solid ${cfg.b}">
 <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
 <div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">${dot(status)}<span class="m" style="font-size:10px;font-weight:700;letter-spacing:.1em;color:${cfg.c}">${cfg.l}</span></div>
 <h3 class="h" style="font-size:17px;font-weight:700;margin-bottom:2px">${s.n}</h3>
 <p class="m" style="font-size:10px;color:#666">${s.s}</p></div>
 <div style="text-align:right;flex-shrink:0"><div class="m" style="font-size:26px;font-weight:800;color:${cfg.c};line-height:1.1">${disp}<span style="font-size:11px;opacity:.5">${s.u}</span></div>
 <div class="m" style="font-size:9px;color:var(--t4);margin-top:4px">${lat?.date||""}</div></div></div>
 ${s.isCape?"":spark(show,cfg.c)}
 ${op?`<div style="margin-top:14px;padding-top:14px;border-top:1px solid ${cfg.b}">
 <div class="db"><div class="m" style="font-size:9px;color:var(--t4);letter-spacing:.1em">THRESHOLDS</div><p class="m" style="font-size:11px;color:#888;margin-top:4px;line-height:1.7">${s.th}</p></div>
 <div class="db"><div class="m" style="font-size:9px;color:var(--t4);letter-spacing:.1em">TRACK RECORD</div><p class="m" style="font-size:11px;color:#888;margin-top:4px;line-height:1.7">${s.hi}</p></div>
 ${hcomp}
 <p class="m" style="font-size:9px;color:var(--t5);margin-top:6px">${s.isCape?`Source: <a href="https://www.multpl.com/shiller-pe" target="_blank">multpl.com/shiller-pe →</a>`:`FRED: ${s.f} · <a href="https://fred.stlouisfed.org/series/${s.f}" target="_blank">View on FRED →</a>`}</p></div>`:""}
 <div class="m" style="font-size:9px;color:var(--t5);text-align:right;margin-top:6px">${op?"▲ collapse":"▼ details"}</div></div>`}

function leg(){return`<div class="lg"><div class="m" style="font-size:9px;color:var(--t4);letter-spacing:.1em;margin-bottom:10px">STATUS LEGEND</div>
 <div style="display:flex;flex-wrap:wrap;gap:8px 18px;margin-bottom:10px">${Object.entries(ST).filter(([k])=>k!=="unknown").map(([k,v])=>`<div style="display:flex;align-items:center;gap:5px">${dot(k,7)}<span class="m" style="font-size:10px;color:${v.c}">${v.l}</span></div>`).join("")}</div>
 <p class="m" style="font-size:8px;color:var(--t5);line-height:1.6">Live from FRED + multpl.com. ISM proxied via Mfg Employment. DXY = Trade Weighted USD Broad. CAPE = Shiller P/E 10.<br>
 <a href="https://fred.stlouisfed.org" target="_blank" style="color:var(--t4)">fred.stlouisfed.org</a> · Review monthly · Not financial advice.</p></div>`}

function toggleAR(){if(st.autoRef){clearInterval(st.autoRef);st.autoRef=null}else{st.autoRef=setInterval(()=>loadAll(),4*60*60*1000)}render()}
function rst(){st.key=null;st.d={};st.mk={};st.mkF={};st.ss={};st.ex={};if(st.autoRef)clearInterval(st.autoRef);st.autoRef=null;localStorage.removeItem("rr7");render()}
render();if(st.key)loadAll();
</script>
</body>
</html>
