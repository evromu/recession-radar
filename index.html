<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Recession Radar">
<meta name="theme-color" content="#0E0D0B">
<title>Recession Radar</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0E0D0B;--sf:rgba(14,13,11,.8);--bd:#1E1D1A;--tx:#E8E6E3;--t2:#AAA;--t3:#777;--t4:#555;--t5:#333;--cl:#00E676;--wa:#78909C;--ca:#FFC107;--wn:#FF9100;--st:#FF1744}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;-webkit-text-size-adjust:100%}
.m{font-family:'JetBrains Mono','Fira Code',monospace}.h{font-family:'Space Grotesk',sans-serif}.c{max-width:720px;margin:0 auto;padding:16px 16px 60px}
.card{border-radius:12px;padding:18px 20px;cursor:pointer;transition:border-color .25s;-webkit-tap-highlight-color:transparent}
.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.mc{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:10px 12px}
.ga{background:linear-gradient(135deg,rgba(14,13,11,.95),rgba(22,20,17,.95));border-radius:14px;padding:24px 20px;margin-bottom:20px;position:relative;overflow:hidden}
.gb{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--cl),var(--ca),var(--wn),var(--st));opacity:.45}
.ab{border-radius:10px;padding:14px 16px;margin-bottom:20px}.db{background:rgba(0,0,0,.3);border-radius:8px;padding:10px 12px;margin-bottom:7px}
.lg{margin-top:24px;padding:14px 16px;background:var(--sf);border:1px solid var(--bd);border-radius:10px}
.dt{display:inline-block;border-radius:50%;flex-shrink:0}
.si{width:100%;padding:12px 14px;background:var(--bg);border:1px solid #333;border-radius:8px;color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:14px;outline:none;-webkit-appearance:none}.si:focus{border-color:var(--ca)}
.sb{width:100%;padding:14px;border:none;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.06em;cursor:pointer;-webkit-appearance:none}
.sa{background:var(--ca);color:var(--bg)}.sd{background:#333;color:#666;cursor:default}
@keyframes p{0%,100%{opacity:.4}50%{opacity:1}}.lp{animation:p 1.5s ease-in-out infinite}
.err-box{background:rgba(255,23,68,.07);border:1px solid rgba(255,23,68,.18);border-radius:8px;padding:10px 14px;margin-bottom:16px}
a{color:var(--ca)}
.hcomp{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}.hcomp-cell{background:rgba(0,0,0,.2);border-radius:6px;padding:6px 8px;text-align:center}
.ar-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:9px;letter-spacing:.05em}
.bt-wrap{margin-top:20px;margin-bottom:4px;background:var(--sf);border:1px solid var(--bd);border-radius:14px;overflow:hidden}
.bt-hdr{padding:16px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;-webkit-tap-highlight-color:transparent}
.bt-body{padding:0 20px 20px}
.bt-scroll{position:relative;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:#333 transparent}
.bt-scroll::-webkit-scrollbar{height:6px}.bt-scroll::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
.desc{font-size:12px;color:#888;line-height:1.6;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.05)}
.mkt-sig{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.mkt-sig-card{border-radius:10px;padding:12px 14px}
/* Toggle buttons — always visible */
.tg{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:5px;font-size:9px;font-weight:600;cursor:pointer;border:1px solid;transition:all .15s;font-family:'JetBrains Mono',monospace;letter-spacing:.03em;-webkit-tap-highlight-color:transparent}
.tg-on{color:var(--bg)!important;font-weight:800}
.tg-off{opacity:.5}
@media(max-width:500px){.mg{grid-template-columns:repeat(2,1fr)}.card{padding:14px 16px}.ga{padding:18px 14px}.hcomp{grid-template-columns:repeat(2,1fr)}.mkt-sig{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div>
<!-- Tooltip: fixed position, outside all scroll containers -->
<div id="bt-tip" style="position:fixed;display:none;pointer-events:none;background:rgba(10,10,8,.97);border:1px solid #555;border-radius:7px;padding:8px 12px;z-index:999;max-width:260px">
 <div class="m" style="font-size:11px;font-weight:700" id="tip-sc"></div>
 <div class="m" style="font-size:9px;color:var(--t3);margin-top:2px" id="tip-dt"></div>
 <div class="m" style="font-size:9px;margin-top:1px" id="tip-sub"></div>
 <div class="m" style="font-size:8px;margin-top:1px" id="tip-rc"></div>
</div>
<script>
const PX=[u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,u=>u];
function clamp(v){return Math.max(0,Math.min(100,v))}

const S=[
 {k:"yc",f:"T10Y2Y",n:"Yield Curve",s:"10Y − 2Y Treasury Spread",u:"%",tier:"leading",btColor:"#42A5F5",
  desc:"Measures the gap between 10-year and 2-year Treasury yields. Inversion (short > long) signals markets expect weakness. Recession arrives 6–18 months after un-inversion — the earliest warning signal.",
  th:"< −0.3 Inverted (Stress) | 0–0.2 Flat (Caution) | > 0.5 Normal",
  hi:"Predicted 8/8 recessions since 1970. Leads by 6–18 months.",pre08:-0.19,pre20:0.04,pre01:-0.52,
  ev:v=>v==null?"unknown":v<-.3?"stress":v<0?"warning":v<.2?"caution":v<.5?"watch":"clear",
  sc:v=>v==null?null:clamp((1.5-v)/2*100)},
 {k:"cr",f:"BAMLH0A0HYM2",n:"Credit Spreads",s:"ICE BofA High Yield OAS",u:"%",tier:"leading",btColor:"#26C6DA",
  desc:"Yield premium on risky corporate bonds over Treasuries. Widening = bond market pricing higher default risk. Credit sees stress before stocks, often by weeks.",
  th:"< 3.5% Normal | 3.5–5% Elevated | 5–8% Stress | > 8% Crisis",
  hi:"10%+ in 2008 and Mar 2020. Credit leads equities.",pre08:7.96,pre20:3.57,pre01:6.45,
  ev:v=>v==null?"unknown":v>8?"stress":v>5?"warning":v>3.5?"caution":"clear",
  sc:v=>v==null?null:clamp((v-3)/7*100)},
 {k:"ic",f:"ICSA",n:"Jobless Claims",s:"Initial Claims + CLF Ratio",u:"",tier:"leading",btColor:"#66BB6A",
  desc:"Weekly first-time unemployment filings — fastest labor indicator. CLF ratio normalizes against workforce size. Rising claims = employers cutting, often before official recession.",
  th:"Raw: < 220K Healthy | > 300K Warning. Ratio: < 1.3 Healthy | > 2.0 Warning",
  hi:"Weekly leading indicator. CLF ratio removes workforce growth distortion.",pre08:346,pre20:282,pre01:305,
  ev:v=>v==null?"unknown":v>350?"stress":v>300?"warning":v>260?"caution":v>220?"watch":"clear",
  divK:true,hasCLF:true,sc:null},
 {k:"sa",f:"SAHMREALTIME",n:"Sahm Rule",s:"Unemployment Rate Momentum",u:" pp",tier:"confirming",btColor:"#AB47BC",
  desc:"3-month moving average of unemployment vs 12-month low. At 0.50pp, recession has begun or is imminent. Fires later than leading indicators but with much higher conviction — only 2 false positives since 1959.",
  th:"≥ 0.50 Recession signal | 0.30–0.50 Approaching | < 0.15 Clear",
  hi:"Triggered every recession since 1950.",pre08:0.53,pre20:0.5,pre01:0.3,
  ev:v=>v==null?"unknown":v>=.5?"stress":v>=.3?"warning":v>=.15?"caution":"clear",
  sc:v=>v==null?null:clamp(v/0.6*100)},
 {k:"mf",f:"MANEMP",n:"Mfg Employment",s:"Manufacturing Jobs (ISM proxy)",u:"K",tr:1,tier:"confirming",btColor:"#EC407A",
  desc:"Total U.S. manufacturing employment. Manufacturing contracts before the broader economy. 3-month change reveals trend. Proxy for proprietary ISM PMI. Sustained losses confirm contraction.",
  th:"3-mo change: losses > 50K = Stress | losses = Caution | gains = Clear",
  hi:"Mfg job losses preceded every recession since 1948.",
  ev:(v,t)=>t==null?"unknown":t<-50?"stress":t<-20?"warning":t<0?"caution":t<20?"watch":"clear",sc:null},
 {k:"co",f:"UMCSENT",n:"Consumer Sentiment",s:"Univ. of Michigan Index",u:"",tier:"confirming",btColor:"#FF7043",
  desc:"Monthly household survey on finances, business outlook, buying attitudes. Consumer spending = ~70% of GDP. Cratering sentiment → spending pullbacks → recession. Watch Expectations vs Present Situation gap.",
  th:"< 55 Stress | 55–60 Warning | 60–70 Caution | 70–80 Watch | > 80 Healthy",
  hi:"Sharp declines preceded spending pullbacks and recessions.",pre08:63.0,pre20:101.0,pre01:94.7,
  ev:v=>v==null?"unknown":v<55?"stress":v<60?"warning":v<70?"caution":v<80?"watch":"clear",
  sc:v=>v==null?null:clamp((95-v)/45*100)},
 {k:"li",f:"USSLIND",n:"Leading Index",s:"Philly Fed Leading Index",u:"%",tier:"confirming",btColor:"#FFCA28",
  desc:"Philly Fed composite of new orders, permits, rate spreads, employment. Some overlap with other indicators but adds breadth. Persistent negative = confirms recession trajectory.",
  th:"< −2 Stress | −0.5 to −2 Warning | 0 to −0.5 Caution | > 1 Strong",
  hi:"Negative readings preceded every recession in 50 years.",pre08:-1.21,pre20:0.28,pre01:-0.88,
  ev:v=>v==null?"unknown":v<-2?"stress":v<-.5?"warning":v<0?"caution":v<1?"watch":"clear",
  sc:v=>v==null?null:clamp((2-v)/5*100)},
 {k:"vx",f:"VIXCLS",n:"VIX",s:"CBOE Volatility Index",u:"",tier:"market",btColor:"#EF5350",
  desc:"Expected 30-day S&P 500 volatility from options. Doesn't predict recessions — signals panic and opportunity. VIX > 40 = capitulation (buy). VIX > 30 sustained = stress (reduce exposure).",
  th:"< 15 Complacent | 15–20 Normal | 20–25 Watch | 25–30 Caution | > 30 Sell | > 40 Buy (capitulation)",
  hi:"VIX > 40 marked buying opportunities (2008, 2020, 2022).",pre08:23.0,pre20:14.0,pre01:25.5,
  ev:v=>v==null?"unknown":v>35?"stress":v>30?"warning":v>25?"caution":v>20?"watch":"clear",
  sc:v=>v==null?null:clamp((v-12)/28*100)},
 {k:"cape",f:"_CAPE_",n:"Shiller CAPE",s:"Cyclically Adjusted P/E (P/E 10)",u:"x",isCape:true,tier:"market",btColor:"#FFA726",
  desc:"S&P 500 price ÷ 10-year inflation-adjusted earnings. Doesn't time crashes but measures how far markets could fall. High CAPE = more downside risk, lower forward returns. Use for position sizing.",
  th:"< 15 Undervalued (buy) | 15–20 Fair | 20–25 Elevated | > 30 Expensive (reduce) | > 38 Extreme",
  hi:"Median: 16 | Pre-2000: 44.2 | Pre-2008: 27.3 | Pre-2020: 31.3.",pre08:27.3,pre20:31.3,pre01:44.2,
  ev:v=>v==null?"unknown":v>38?"stress":v>30?"warning":v>25?"caution":v>20?"watch":"clear",
  sc:v=>v==null?null:clamp((v-15)/25*100)},
];

const TIERS={leading:{label:"LEADING",color:"#42A5F5",desc:"Early warning — fires before recession"},confirming:{label:"CONFIRMING",color:"#AB47BC",desc:"Validates recession underway"},market:{label:"MARKET",color:"#FFA726",desc:"Buy/sell timing signals"}};
const MK=[{f:"SP500",n:"S&P 500",p:"",d:0,pk:true},{f:"NASDAQCOM",n:"NASDAQ",p:"",d:0,pk:true},{f:"DCOILBRENTEU",n:"Brent Oil",p:"$",d:2},{f:"DGS10",n:"10Y Yield",p:"",x:"%",d:2},{f:"DFF",n:"Fed Funds",p:"",x:"%",d:2},{f:"DTWEXBGS",n:"DXY Dollar",p:"",d:1}];
const ST={clear:{c:"#00E676",bg:"rgba(0,230,118,.07)",b:"rgba(0,230,118,.22)",l:"CLEAR"},watch:{c:"#78909C",bg:"rgba(120,144,156,.06)",b:"rgba(120,144,156,.18)",l:"WATCH"},caution:{c:"#FFC107",bg:"rgba(255,193,7,.07)",b:"rgba(255,193,7,.22)",l:"CAUTION"},warning:{c:"#FF9100",bg:"rgba(255,145,0,.07)",b:"rgba(255,145,0,.22)",l:"WARNING"},stress:{c:"#FF1744",bg:"rgba(255,23,68,.07)",b:"rgba(255,23,68,.22)",l:"STRESS"},unknown:{c:"#555",bg:"rgba(85,85,85,.05)",b:"rgba(85,85,85,.15)",l:"—"}};
const LV=[{x:1,l:"GREEN",s:"Full Offense",c:"#00E676",st:"Buy pullbacks aggressively. Full equity exposure."},{x:3,l:"YELLOW",s:"Caution",c:"#FFC107",st:"Tighten stops. Reduce size. Build cash from profits."},{x:5,l:"ORANGE",s:"Defensive",c:"#FF9100",st:"Cash 20–30%. Sell speculative. Favor dividends."},{x:99,l:"RED",s:"Preservation",c:"#FF1744",st:"Cash 40–50%. Exit leverage. Hedge. Survive first."}];

// Default overlays: recession score + S&P
const defaultOv=()=>({score:true,leading:false,confirming:false,market:false,spx:true,yc:false,cr:false,ic:false,sa:false,mf:false,co:false,li:false,vx:false,cape:false});

let st={key:localStorage.getItem("rr11")||null,d:{},mk:{},mkF:{},ss:{},ex:{},ld:false,err:null,upd:null,px:0,
 al:{ycUD:null,ycInv:false,sahmD:null,sahmPk:null},cape:null,autoRef:null,clfRaw:null,claims4wk:null,clfRatio:null,
 bt:{open:false,loading:false,loaded:false,data:null,err:null,ov:defaultOv()}};

async function ff(sid,key,lim=24,freq=""){let base=`https://api.stlouisfed.org/fred/series/observations?series_id=${sid}&api_key=${key}&file_type=json&sort_order=desc&limit=${lim}`;
 if(freq)base+=`&frequency=${freq}&aggregation_method=eop`;const ord=[st.px,...[0,1,2].filter(i=>i!==st.px)];
 for(const i of ord){try{const r=await fetch(PX[i](base),{signal:AbortSignal.timeout(15000)});if(!r.ok)continue;const txt=await r.text();let j;try{j=JSON.parse(txt)}catch{continue}
  if(j.observations){st.px=i;return j.observations.filter(o=>o.value!==".").reverse()}if(j.contents){try{const p=JSON.parse(j.contents);if(p.observations){st.px=i;return p.observations.filter(o=>o.value!==".").reverse()}}catch{}}}catch{continue}}throw new Error(sid)}

async function fetchCAPE(){const urls=["https://www.multpl.com/shiller-pe","https://www.multpl.com/shiller-pe/table/by-month"];
 for(const url of urls){const ord=[st.px,...[0,1,2].filter(i=>i!==st.px)];for(const i of ord){try{const r=await fetch(PX[i](url),{signal:AbortSignal.timeout(12000)});if(!r.ok)continue;const html=await r.text();
  const pats=[/Current\s+Shiller\s+PE[^0-9]*([\d]{1,2}\.[\d]{1,2})/i,/<td[^>]*>(?:Apr|Mar|Feb|Jan|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[^<]*<\/td>\s*<td[^>]*>\s*([\d]+\.[\d]+)/i,/([\d]{2}\.[\d]{2})\s*<\/td>/];
  for(const pat of pats){const m=html.match(pat);if(m&&m[1]){const v=parseFloat(m[1]);if(v>5&&v<100){st.cape=v;return}}}}catch{continue}}}st.cape=null}

async function fetchCAPEHist(){try{const url="https://www.multpl.com/shiller-pe/table/by-month";const ord=[st.px,...[0,1,2].filter(i=>i!==st.px)];
 for(const i of ord){try{const r=await fetch(PX[i](url),{signal:AbortSignal.timeout(15000)});if(!r.ok)continue;const html=await r.text();const rows=[];
  const re=/<tr[^>]*>\s*<td[^>]*>([^<]+)<\/td>\s*<td[^>]*>([\d.]+)<\/td>/gi;let m;
  while((m=re.exec(html))!==null){const d=new Date(m[1].trim());const v=parseFloat(m[2]);if(!isNaN(d)&&v>3)rows.push({month:d.toISOString().substring(0,7),value:v})}
  if(rows.length>12)return rows}catch{continue}}}catch{}return[]}

async function fetchCLF(){try{const clf=await ff("CLF16OV",st.key,3);if(clf.length){st.clfRaw=parseFloat(clf[clf.length-1].value);const claims=st.d.ic||[];
 if(claims.length>=4&&st.clfRaw){const last4=claims.slice(-4).map(d=>parseFloat(d.value)).filter(x=>!isNaN(x));st.claims4wk=last4.reduce((a,b)=>a+b,0)/last4.length;st.clfRatio=st.claims4wk/st.clfRaw}}}catch{}}

function analyzeYC(d){if(!d||d.length<5)return{ycUD:null,ycInv:false};let ud=null,inv=false;for(let i=0;i<d.length;i++){const v=parseFloat(d[i].value);if(isNaN(v))continue;if(v<0)inv=true;else if(inv&&!ud)ud=d[i].date}return{ycUD:ud,ycInv:inv}}
function analyzeSahm(d){if(!d||d.length<3)return{sahmD:null,sahmPk:null};let td=null,pk=0;for(let i=0;i<d.length;i++){const v=parseFloat(d[i].value);if(isNaN(v))continue;if(v>pk)pk=v;if(v>=.5&&!td)td=d[i].date}return{sahmD:td,sahmPk:pk}}
function peakPct(d){if(!d||d.length<10)return null;const v=d.map(x=>parseFloat(x.value)).filter(x=>!isNaN(x));if(v.length<10)return null;return(((v[v.length-1]-Math.max(...v))/Math.max(...v))*100).toFixed(1)}

function calcComposite(){const leading=[],confirming=[],market=[];
 S.forEach(s=>{if(s.sc&&!s.isCape){const obs=st.d[s.k]||[];const lat=obs.length?parseFloat(obs[obs.length-1].value):null;const sc=s.sc(lat);if(sc!=null){if(s.tier==="leading")leading.push(sc);else if(s.tier==="confirming")confirming.push(sc);else market.push(sc)}}
  if(s.isCape&&st.cape){const sc=s.sc(st.cape);if(sc!=null)market.push(sc)}});
 if(st.clfRatio!=null)leading.push(clamp((st.clfRatio-0.8)/2.5*100));
 const avgL=leading.length?leading.reduce((a,b)=>a+b,0)/leading.length:null;
 const avgC=confirming.length?confirming.reduce((a,b)=>a+b,0)/confirming.length:null;
 const avgM=market.length?market.reduce((a,b)=>a+b,0)/market.length:null;
 let rec=null;if(avgL!=null&&avgC!=null)rec=avgL*.6+avgC*.4;else if(avgL!=null)rec=avgL;
 return{recession:rec,leading:avgL,confirming:avgC,market:avgM}}

async function loadAll(){st.ld=true;st.err=null;render();let ok=0,fl=[];
 for(const s of S){if(s.isCape)continue;try{const lim=s.k==="yc"?500:s.k==="sa"?60:s.k==="ic"?52:24;st.d[s.k]=await ff(s.f,st.key,lim);ok++}catch{st.d[s.k]=[];fl.push(s.n)}}
 for(const m of MK){try{st.mkF[m.f]=await ff(m.f,st.key,m.pk?260:10);st.mk[m.f]=st.mkF[m.f].slice(-5)}catch{st.mk[m.f]=[];st.mkF[m.f]=[]}}
 await fetchCAPE();await fetchCLF();
 if(st.cape){st.d.cape=[{date:new Date().toISOString().split("T")[0],value:st.cape.toString()}];ok++}else st.d.cape=[];
 for(const s of S){const obs=st.d[s.k]||[];if(s.isCape){st.ss[s.k]=s.ev(st.cape);continue}
  if(s.tr){const v=obs.slice(-3).map(x=>parseFloat(x.value)).filter(x=>!isNaN(x));st.ss[s.k]=s.ev(null,v.length>=2?v[v.length-1]-v[0]:null)}
  else{let l=obs.length?parseFloat(obs[obs.length-1].value):null;if(s.divK&&l)l=l/1000;st.ss[s.k]=s.ev(isNaN(l)?null:l)}}
 st.al={...analyzeYC(st.d.yc||[]),...analyzeSahm(st.d.sa||[])};st.upd=new Date();
 if(ok===0)st.err="No data. Check FRED key.";else if(fl.length)st.err=`Loaded ${ok}/${S.length}. Missing: ${fl.join(", ")}`;
 st.ld=false;render()}

/* ═══ BACKTEST ═══ */
async function loadBacktest(){st.bt.loading=true;st.bt.err=null;render();
 try{const ids={yc:"T10Y2Y",sa:"SAHMREALTIME",cr:"BAMLH0A0HYM2",li:"USSLIND",mf:"MANEMP",co:"UMCSENT",vx:"VIXCLS",ic:"ICSA",clf:"CLF16OV",rec:"USREC",spx:"SP500"};
  const raw={};for(const[k,id] of Object.entries(ids)){try{raw[k]=await ff(id,st.key,500,"m")}catch{raw[k]=[]}}
  const cH=await fetchCAPEHist();const cI={};cH.forEach(c=>{cI[c.month]=c.value});
  const allD=new Set();for(const obs of Object.values(raw))obs.forEach(o=>allD.add(o.date.substring(0,7)));Object.keys(cI).forEach(m=>allD.add(m));
  const months=[...allD].sort();const idx={};for(const[k,obs] of Object.entries(raw)){idx[k]={};obs.forEach(o=>{idx[k][o.date.substring(0,7)]=parseFloat(o.value)})}
  const comp=[];
  for(const m of months){const lead=[],conf=[],mkt=[],indScores={};
   if(idx.yc[m]!=null&&!isNaN(idx.yc[m])){const s=clamp((1.5-idx.yc[m])/2*100);lead.push(s);indScores.yc=s}
   if(idx.cr[m]!=null&&!isNaN(idx.cr[m])){const s=clamp((idx.cr[m]-3)/7*100);lead.push(s);indScores.cr=s}
   if(idx.ic[m]!=null&&idx.clf[m]!=null&&idx.clf[m]>0){const ratio=idx.ic[m]/idx.clf[m];const s=clamp((ratio-0.8)/2.5*100);lead.push(s);indScores.ic=s}
   if(idx.sa[m]!=null&&!isNaN(idx.sa[m])){const s=clamp(idx.sa[m]/0.6*100);conf.push(s);indScores.sa=s}
   const mfK=months.filter(x=>x<=m).slice(-4);
   if(mfK.length>=4){const v0=idx.mf[mfK[0]],v3=idx.mf[mfK[3]];if(v0!=null&&v3!=null){const s=clamp((50-(v3-v0))/150*100);conf.push(s);indScores.mf=s}}
   if(idx.co[m]!=null&&!isNaN(idx.co[m])){const s=clamp((95-idx.co[m])/45*100);conf.push(s);indScores.co=s}
   if(idx.li[m]!=null&&!isNaN(idx.li[m])){const s=clamp((2-idx.li[m])/5*100);conf.push(s);indScores.li=s}
   if(idx.vx[m]!=null&&!isNaN(idx.vx[m])){const s=clamp((idx.vx[m]-12)/28*100);mkt.push(s);indScores.vx=s}
   if(cI[m]!=null){const s=clamp((cI[m]-15)/25*100);mkt.push(s);indScores.cape=s}
   const aL=lead.length?lead.reduce((a,b)=>a+b,0)/lead.length:null;
   const aC=conf.length?conf.reduce((a,b)=>a+b,0)/conf.length:null;
   const aM=mkt.length?mkt.reduce((a,b)=>a+b,0)/mkt.length:null;
   let rec=null;if(aL!=null&&aC!=null)rec=aL*.6+aC*.4;else if(aL!=null)rec=aL;
   comp.push({month:m,score:rec,leading:aL,confirming:aC,market:aM,recession:idx.rec[m]===1,spx:idx.spx[m]||null,...indScores})}
  st.bt.data=comp.filter(c=>c.score!=null);st.bt.loaded=true;
 }catch(e){st.bt.err="Failed: "+e.message}st.bt.loading=false;render()}

const CHART_PAD={t:20,b:35,l:36,r:20};

function renderBTChart(){
 const data=st.bt.data;if(!data||data.length<12)return"";
 const W=Math.max(700,data.length*3),H=250;
 const{t:PT,b:PB,l:PL,r:PR}=CHART_PAD;
 const cw=W-PL-PR,ch=H-PT-PB;
 const ov=st.bt.ov;

 // Recession bands
 let rec="",inR=false,rs=0;
 for(let i=0;i<data.length;i++){const x=PL+(i/(data.length-1))*cw;
  if(data[i].recession&&!inR){inR=true;rs=x}if(!data[i].recession&&inR){inR=false;rec+=`<rect x="${rs}" y="${PT}" width="${x-rs}" height="${ch}" fill="rgba(255,255,255,.06)"/>`}}
 if(inR)rec+=`<rect x="${rs}" y="${PT}" width="${PL+cw-rs}" height="${ch}" fill="rgba(255,255,255,.06)"/>`;

 // Zones
 const zones=[{y0:0,y1:25,c:"rgba(0,230,118,.03)"},{y0:25,y1:50,c:"rgba(255,193,7,.025)"},{y0:50,y1:75,c:"rgba(255,145,0,.025)"},{y0:75,y1:100,c:"rgba(255,23,68,.035)"}];
 let zf="";for(const z of zones){zf+=`<rect x="${PL}" y="${PT+(1-z.y1/100)*ch}" width="${cw}" height="${(z.y1-z.y0)/100*ch}" fill="${z.c}"/>`}

 // Grid
 let grid="";for(const v of [0,25,50,75,100]){const y=PT+(1-v/100)*ch;
  grid+=`<line x1="${PL}" y1="${y}" x2="${PL+cw}" y2="${y}" stroke="rgba(255,255,255,.06)" stroke-width="0.5"/>`;
  grid+=`<text x="${PL-4}" y="${y+3}" text-anchor="end" fill="#444" font-size="8" font-family="JetBrains Mono,monospace">${v}</text>`}

 // Year labels
 let yl="",lastYr="";for(let i=0;i<data.length;i++){const yr=data[i].month.substring(0,4);
  if(yr!==lastYr&&parseInt(yr)%3===0){const x=PL+(i/(data.length-1))*cw;
   yl+=`<text x="${x}" y="${H-6}" text-anchor="middle" fill="#444" font-size="8" font-family="JetBrains Mono,monospace">'${yr.slice(2)}</text>`;lastYr=yr}}

 function mkLine(key,color,width=1.2,dash=""){
  const pts=data.map((d,i)=>{const v=d[key];if(v==null)return null;return`${PL+(i/(data.length-1))*cw},${PT+(1-v/100)*ch}`}).filter(Boolean).join(" ");
  return pts?`<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="${width}" stroke-linejoin="round" ${dash?`stroke-dasharray="${dash}"`:""}/>`:""}

 // S&P 500 (normalized to chart height)
 let spxLine="";
 if(ov.spx){const vals=data.map(d=>d.spx).filter(v=>v!=null);
  if(vals.length>10){const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
   const pts=data.map((d,i)=>{if(d.spx==null)return null;return`${PL+(i/(data.length-1))*cw},${PT+(1-(d.spx-mn)/rng)*ch}`}).filter(Boolean).join(" ");
   spxLine=`<polyline points="${pts}" fill="none" stroke="#64B5F6" stroke-width="1" stroke-opacity=".5"/>`}}

 // Individual indicator lines
 let indLines="";
 S.forEach(s=>{if(ov[s.k]){indLines+=mkLine(s.k,s.btColor,1,"3,2")}});

 // Main composite line + area
 const mainPts=data.map((d,i)=>`${PL+(i/(data.length-1))*cw},${PT+(1-(d.score||0)/100)*ch}`).join(" ");
 const areaPts=`${PL},${PT+ch} ${mainPts} ${PL+cw},${PT+ch}`;
 const last=data[data.length-1];const lsc=last.score;
 const lc=lsc>75?"#FF1744":lsc>50?"#FF9100":lsc>25?"#FFC107":"#00E676";
 const mainLine=ov.score?`<polygon points="${areaPts}" fill="${lc}" fill-opacity=".08"/>${mkLine("score",lc,2)}`:"";
 const subLines=[ov.leading?mkLine("leading","#42A5F5",1.2,"4,2"):"",ov.confirming?mkLine("confirming","#AB47BC",1.2,"4,2"):"",ov.market?mkLine("market","#FFA726",1.2,"4,2"):""].join("");

 // Current score endpoint
 const lastX=PL+cw,lastY=PT+(1-lsc/100)*ch;
 const endMark=ov.score?`<circle cx="${lastX}" cy="${lastY}" r="4" fill="${lc}" stroke="var(--bg)" stroke-width="2"/><text x="${lastX+8}" y="${lastY+4}" fill="${lc}" font-size="11" font-weight="700" font-family="JetBrains Mono,monospace">${lsc.toFixed(0)}</text>`:"";

 return`<div class="bt-scroll" id="bt-wrap"><svg id="bt-svg" width="${W}" height="${H}" style="display:block;touch-action:pan-x">${zf}${rec}${grid}${yl}${spxLine}${indLines}${mainLine}${subLines}${endMark}
  <rect id="bt-hit" x="${PL}" y="${PT}" width="${cw}" height="${ch}" fill="transparent" style="cursor:crosshair"/></svg>
  <div id="bt-cross" style="position:absolute;top:${PT}px;width:1px;height:${ch}px;background:rgba(255,255,255,.25);pointer-events:none;display:none"></div></div>`}

function bindBTChart(){
 const wrap=document.getElementById("bt-wrap");const svg=document.getElementById("bt-svg");
 const tip=document.getElementById("bt-tip");const cross=document.getElementById("bt-cross");
 if(!wrap||!svg||!tip||!st.bt.data)return;
 const data=st.bt.data;const W=parseFloat(svg.getAttribute("width"));
 const{t:PT,b:PB,l:PL,r:PR}=CHART_PAD;const cw=W-PL-PR,ch=250-PT-PB;

 // Scroll to end (most recent)
 requestAnimationFrame(()=>{wrap.scrollLeft=wrap.scrollWidth});

 function getIdx(clientX){
  const wrapRect=wrap.getBoundingClientRect();
  const svgX=(clientX-wrapRect.left)+wrap.scrollLeft;
  const dataX=svgX-PL;
  if(dataX<0||dataX>cw)return-1;
  return Math.max(0,Math.min(data.length-1,Math.round((dataX/cw)*(data.length-1))))}

 function showTip(ci,clientX,clientY){
  if(ci<0||ci>=data.length){tip.style.display="none";cross.style.display="none";return}
  const d=data[ci];const col=d.score>75?"#FF1744":d.score>50?"#FF9100":d.score>25?"#FFC107":"#00E676";

  document.getElementById("tip-sc").textContent=`Score: ${d.score.toFixed(1)}`;
  document.getElementById("tip-sc").style.color=col;
  document.getElementById("tip-dt").textContent=d.month+(d.spx!=null?" · S&P: "+d.spx.toFixed(0):"");

  // Sub-scores
  const parts=[];
  if(d.leading!=null)parts.push(`L:${d.leading.toFixed(0)}`);
  if(d.confirming!=null)parts.push(`C:${d.confirming.toFixed(0)}`);
  if(d.market!=null)parts.push(`M:${d.market.toFixed(0)}`);
  document.getElementById("tip-sub").textContent=parts.join(" · ");
  document.getElementById("tip-sub").style.color="#888";

  document.getElementById("tip-rc").textContent=d.recession?"⬤ RECESSION":"";
  document.getElementById("tip-rc").style.color="#FF1744";

  // Position tooltip near cursor but keep on screen
  let tx=clientX+14,ty=clientY-70;
  tip.style.display="block";
  tip.style.left=tx+"px";tip.style.top=ty+"px";
  requestAnimationFrame(()=>{const r=tip.getBoundingClientRect();
   if(r.right>window.innerWidth-8)tip.style.left=(clientX-r.width-14)+"px";
   if(r.top<8)tip.style.top=(clientY+20)+"px"});

  // Crosshair
  const xPos=PL+(ci/(data.length-1))*cw-wrap.scrollLeft;
  cross.style.display="block";cross.style.left=(xPos+PL-PL)+"px";
  // Recalc to be relative to wrapper visible area
  const wrapRect=wrap.getBoundingClientRect();
  cross.style.left=((clientX-wrapRect.left))+"px"}

 function hide(){tip.style.display="none";cross.style.display="none"}

 svg.addEventListener("mousemove",e=>{const ci=getIdx(e.clientX);showTip(ci,e.clientX,e.clientY)});
 svg.addEventListener("mouseleave",hide);

 let touching=false;
 wrap.addEventListener("touchstart",e=>{if(e.touches.length===1){touching=true;const t=e.touches[0];const ci=getIdx(t.clientX);showTip(ci,t.clientX,t.clientY)}},{passive:true});
 wrap.addEventListener("touchmove",e=>{if(touching&&e.touches.length===1){const t=e.touches[0];const ci=getIdx(t.clientX);showTip(ci,t.clientX,t.clientY)}},{passive:true});
 wrap.addEventListener("touchend",()=>{touching=false;hide()})}

 const mn=Math.min(...v),mx=Math.max(...v),r=mx-mn||1;const pts=v.map((val,i)=>`${(i/(v.length-1))*w},${h-((val-mn)/r)*(h-6)-3}`).join(" ");const ly=h-((v[v.length-1]-mn)/r)*(h-6)-3;

function mAgo(d){if(!d)return null;return Math.round((new Date()-new Date(d+"T00:00:00"))/(1000*60*60*24*30.44))}

 ${ms.map(m=>`<p style="font-size:12px;color:#999;line-height:1.6;margin-bottom:4px">${m}</p>`).join("")}</div>`}

function mktB(){return`<div class="mg">${MK.map(m=>{const d=st.mk[m.f],full=st.mkF[m.f];const v=d?.length?parseFloat(d[d.length-1].value):null;const p=d?.length>1?parseFloat(d[d.length-2].value):null;
 const ch=v&&p?((v-p)/p*100).toFixed(2):null;const up=ch?parseFloat(ch)>=0:true;let pp=null,ppC="var(--t4)";
 if(m.pk&&full?.length>10){pp=peakPct(full);if(pp!=null){const pv=parseFloat(pp);ppC=pv<=-15?"var(--st)":pv<=-10?"var(--wn)":pv<=-5?"var(--ca)":"var(--cl)"}}
 return`<div class="mc"><div class="m" style="font-size:8px;color:var(--t4)">${m.n}</div><div class="m" style="font-size:14px;font-weight:700;margin-top:3px">${v!=null?`${m.p||""}${v.toFixed(m.d)}${m.x||""}`:"—"}</div>
 ${ch?`<div class="m" style="font-size:9px;color:${up?"var(--cl)":"var(--st)"};margin-top:2px">${up?"▲":"▼"} ${Math.abs(parseFloat(ch))}%</div>`:""}
 ${pp!=null?`<div class="m" style="font-size:8px;color:${ppC};margin-top:1px">${parseFloat(pp)>=0?"At peak":pp+"% from peak"}</div>`:""}</div>`}).join("")}</div>`}

function renderTier(tier){const t=TIERS[tier];const items=S.filter(s=>s.tier===tier);
 return`<div style="margin-bottom:8px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
 <div style="width:3px;height:14px;border-radius:2px;background:${t.color}"></div>
 <span class="m" style="font-size:10px;font-weight:700;color:${t.color};letter-spacing:.08em">${t.label}</span>
 <span class="m" style="font-size:9px;color:var(--t4)">${t.desc}</span></div>
 <div style="display:flex;flex-direction:column;gap:10px">${items.map(s=>card(s)).join("")}</div></div>`}

function card(s){const d=st.d[s.k]||[],status=st.ss[s.k]||"unknown",cfg=ST[status]||ST.unknown;
 const show=d.slice(-24);const lat=d.length?d[d.length-1]:null;const val=lat?parseFloat(lat.value):null;const op=st.ex[s.k];
 let disp="—",sub="";
 if(s.isCape&&st.cape)disp=st.cape.toFixed(1);
 else if(s.tr&&d.length>=3){const r=d.slice(-3).map(x=>parseFloat(x.value)).filter(x=>!isNaN(x));if(r.length>=2){const c=((r[r.length-1]-r[0])/1000).toFixed(0);disp=`${c>0?"+":""}${c}K`}}
 else if(s.divK&&val!=null&&!isNaN(val))disp=(val/1000).toFixed(0);
 else if(val!=null&&!isNaN(val))disp=val.toFixed(2);
 if(s.hasCLF&&st.clfRatio!=null){const rc=st.clfRatio>2.0?"var(--st)":st.clfRatio>1.6?"var(--wn)":st.clfRatio>1.3?"var(--ca)":"var(--cl)";
  sub=`<div style="margin-top:8px;padding:8px 10px;background:rgba(0,0,0,.25);border-radius:6px">
   <div style="display:flex;justify-content:space-between"><div><div class="m" style="font-size:8px;color:var(--t4)">CLAIMS / CLF</div>
   <div class="m" style="font-size:18px;font-weight:800;color:${rc};margin-top:2px">${st.clfRatio.toFixed(2)}</div></div>
   <div style="text-align:right"><div class="m" style="font-size:8px;color:var(--t4)">4-WK MA</div><div class="m" style="font-size:12px;color:var(--t2);margin-top:2px">${st.claims4wk?Math.round(st.claims4wk).toLocaleString():"-"}</div>
   <div class="m" style="font-size:8px;color:var(--t4)">CLF: ${st.clfRaw?st.clfRaw.toLocaleString()+"K":"-"}</div></div></div>
   <div class="m" style="font-size:8px;color:var(--t5);margin-top:4px"><a href="https://fred.stlouisfed.org/series/CLF16OV" target="_blank">CLF16OV →</a> · <a href="https://fred.stlouisfed.org/series/ICSA" target="_blank">ICSA →</a></div></div>`}
 let hcomp="";
 if(op&&(s.pre08!=null||s.pre20!=null)){hcomp=`<div class="db"><div class="m" style="font-size:9px;color:var(--t4);margin-bottom:6px">PRE-RECESSION</div><div class="hcomp">
  ${s.pre01!=null?`<div class="hcomp-cell"><div class="m" style="font-size:8px;color:var(--t4)">2001</div><div class="m" style="font-size:12px;color:var(--t2);margin-top:2px">${s.pre01}</div></div>`:""}
  ${s.pre08!=null?`<div class="hcomp-cell"><div class="m" style="font-size:8px;color:var(--t4)">2008</div><div class="m" style="font-size:12px;color:var(--t2);margin-top:2px">${s.pre08}</div></div>`:""}
  ${s.pre20!=null?`<div class="hcomp-cell"><div class="m" style="font-size:8px;color:var(--t4)">2020</div><div class="m" style="font-size:12px;color:var(--t2);margin-top:2px">${s.pre20}</div></div>`:""}
  </div></div>`}
 return`<div class="card" data-ck="${s.k}" style="background:${cfg.bg};border:1px solid ${cfg.b}">
 <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
 <div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">${dot(status)}<span class="m" style="font-size:10px;font-weight:700;letter-spacing:.1em;color:${cfg.c}">${cfg.l}</span></div>
 <h3 class="h" style="font-size:17px;font-weight:700;margin-bottom:2px">${s.n}</h3><p class="m" style="font-size:10px;color:#666">${s.s}</p></div>
 <div style="text-align:right"><div class="m" style="font-size:26px;font-weight:800;color:${cfg.c};line-height:1.1">${disp}<span style="font-size:11px;opacity:.5">${s.u}</span></div>
 <div class="m" style="font-size:9px;color:var(--t4);margin-top:4px">${lat?.date||""}</div></div></div>
 ${s.isCape?"":spark(show,cfg.c)}${sub}
 ${op?`<div style="margin-top:14px;padding-top:14px;border-top:1px solid ${cfg.b}"><div class="desc">${s.desc}</div>
 <div class="db"><div class="m" style="font-size:9px;color:var(--t4)">THRESHOLDS</div><p class="m" style="font-size:11px;color:#888;margin-top:4px;line-height:1.7">${s.th}</p></div>
 <div class="db"><div class="m" style="font-size:9px;color:var(--t4)">TRACK RECORD</div><p class="m" style="font-size:11px;color:#888;margin-top:4px;line-height:1.7">${s.hi}</p></div>
 ${hcomp}<p class="m" style="font-size:9px;color:var(--t5);margin-top:6px">${s.isCape?`<a href="https://www.multpl.com/shiller-pe" target="_blank">multpl.com →</a>`:`FRED: ${s.f} · <a href="https://fred.stlouisfed.org/series/${s.f}" target="_blank">FRED →</a>`}</p></div>`:""}
 <div class="m" style="font-size:9px;color:var(--t5);text-align:right;margin-top:6px">${op?"▲":"▼"}</div></div>`}

function btSection(){const ov=st.bt.ov;
 return`<div class="bt-wrap"><div class="bt-hdr" onclick="toggleBT()"><div><div class="h" style="font-size:15px;font-weight:700">📊 Composite Backtest</div>
  <p class="m" style="font-size:9px;color:var(--t4);margin-top:2px">Score 0–100 vs NBER recessions · hover for values</p></div>
  <span class="m" style="font-size:12px;color:var(--t4)">${st.bt.open?"▲":"▼"}</span></div>
 ${st.bt.open?`<div class="bt-body">
  ${st.bt.loading?`<div style="text-align:center;padding:30px 0"><div class="lp" style="font-size:24px">📊</div><p class="m" style="font-size:11px;color:#666;margin-top:10px">Loading ~30 years + CAPE history...</p></div>`:
   st.bt.err?`<p class="m" style="color:var(--st)">${st.bt.err}</p>`:
   st.bt.loaded?`
    <div style="margin-bottom:10px">
     <div class="m" style="font-size:8px;color:var(--t4);margin-bottom:6px">OVERLAYS</div>
     <div style="display:flex;gap:5px;flex-wrap:wrap">
      ${tgBtn("score","Recession Score","#FFC107")}
      ${tgBtn("spx","S&P 500","#64B5F6")}
      ${tgBtn("leading","Leading","#42A5F5")}
      ${tgBtn("confirming","Confirming","#AB47BC")}
      ${tgBtn("market","Market","#FFA726")}
     </div>
     <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:6px">
      ${S.map(s=>tgBtn(s.k,s.n,s.btColor)).join("")}
     </div>
    </div>
    ${renderBTChart()}
    <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
     <div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:rgba(255,255,255,.08)"></div><span class="m" style="font-size:8px;color:var(--t4)">NBER Recession</span></div>
    </div>
    <p class="m" style="font-size:8px;color:var(--t5);margin-top:8px;line-height:1.5">Recession = 60% Leading + 40% Confirming. CAPE included. Scroll chart · hover/touch for date & score.</p>
   `:`<button onclick="loadBacktest()" class="m" style="width:100%;padding:12px;background:rgba(255,193,7,.1);border:1px solid rgba(255,193,7,.2);border-radius:8px;color:var(--ca);font-size:11px;font-weight:700;cursor:pointer">LOAD HISTORICAL BACKTEST</button>`}
 </div>`:""}</div>`}

function leg(){return`<div class="lg"><div class="m" style="font-size:9px;color:var(--t4);margin-bottom:10px">TIERS</div>
 <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:12px">${Object.entries(TIERS).map(([k,t])=>`<div style="display:flex;align-items:center;gap:8px"><div style="width:3px;height:12px;border-radius:2px;background:${t.color}"></div><span class="m" style="font-size:9px;color:${t.color}">${t.label}</span><span class="m" style="font-size:9px;color:var(--t4)">${t.desc}</span></div>`).join("")}</div>
 <div style="display:flex;flex-wrap:wrap;gap:8px 16px;margin-bottom:10px">${Object.entries(ST).filter(([k])=>k!=="unknown").map(([k,v])=>`<div style="display:flex;align-items:center;gap:5px">${dot(k,7)}<span class="m" style="font-size:10px;color:${v.c}">${v.l}</span></div>`).join("")}</div>
 <p class="m" style="font-size:8px;color:var(--t5);line-height:1.5">Live from FRED + multpl.com. Not financial advice. <a href="https://fred.stlouisfed.org" target="_blank" style="color:var(--t4)">fred.stlouisfed.org</a></p></div>`}

function toggleAR(){if(st.autoRef){clearInterval(st.autoRef);st.autoRef=null}else{st.autoRef=setInterval(()=>loadAll(),4*60*60*1000)}render()}
function toggleBT(){st.bt.open=!st.bt.open;render()}
function togOv(k){st.bt.ov[k]=!st.bt.ov[k];render()}
function rst(){st.key=null;st.d={};st.mk={};st.mkF={};st.ss={};st.ex={};st.bt={open:false,loading:false,loaded:false,data:null,err:null,ov:defaultOv()};if(st.autoRef)clearInterval(st.autoRef);st.autoRef=null;localStorage.removeItem("rr11");render()}
render();if(st.key)loadAll();
</script>
</body>
</html>
