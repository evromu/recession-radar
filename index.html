<script>
const PX=[u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,u=>u];
function clamp(v){return Math.max(0,Math.min(100,v))}

/* ═══ v16 METHODOLOGY ═══
   RECESSION SCORE: YC range 0.5/-0.3, PI=15/12 (backtested: F1 37, FP 39%)
     Thresholds: GREEN 0-35, YELLOW 35-60, ORANGE 60-80, RED 80+
   MARKET SIGNAL: VIX 40% (hybrid z-score, MA10-only momentum gate, OOS +4.9pp)
     + CAPE 25% (>35 STR SELL, 145yr validated, fallback+cache) + Sentiment 35%
   v16 ADDITIONS: CAPE fallback source + localStorage cache + stale warning
     AAII Investor Sentiment (contrarian, display), Market Breadth (% >200MA)
     Sell signal framing: expected return ranges, "reduced upside" language
═══════════════════════════════════════════════════════ */
const SIG_LEVELS=[{v:-3,label:"STRONG BUY",short:"STR BUY",color:"#00E676",bg:"rgba(0,230,118,.12)"},{v:-2,label:"BUY",short:"BUY",color:"#00C853",bg:"rgba(0,200,83,.10)"},{v:-1,label:"SOFT BUY",short:"SOFT BUY",color:"#66BB6A",bg:"rgba(102,187,106,.08)"},{v:0,label:"HOLD",short:"HOLD",color:"#78909C",bg:"rgba(120,144,156,.08)"},{v:1,label:"SOFT SELL",short:"SOFT SELL",color:"#FFC107",bg:"rgba(255,193,7,.10)"},{v:2,label:"SELL",short:"SELL",color:"#FF9100",bg:"rgba(255,145,0,.10)"},{v:3,label:"STRONG SELL",short:"STR SELL",color:"#FF1744",bg:"rgba(255,23,68,.12)"}];
function sigLevel(v){return SIG_LEVELS.find(l=>l.v===Math.max(-3,Math.min(3,Math.round(v))))||SIG_LEVELS[3]}

function vixSignalHybrid(v,z,abvMA){
 if(v==null)return{score:0,note:"",mom:null};
 if(v>50)return{score:-3,note:`VIX ${v.toFixed(0)} — Capitulation`,mom:"bypass"};
 if(v>40)return{score:-2,note:`VIX ${v.toFixed(0)} — Extreme fear`,mom:"bypass"};
 if(v>35)return{score:-1,note:`VIX ${v.toFixed(0)} — Panic`,mom:"bypass"};
 if(v<12)return{score:3,note:`VIX ${v.toFixed(0)} — Complacency`,mom:"bypass"};
 if(z==null)return{score:0,note:`VIX ${v.toFixed(0)}`,mom:null};
 if(z>1.0){
  if(abvMA){const s=z>2?-2:-1;return{score:s,note:`VIX ${v.toFixed(0)} (z=${z.toFixed(1)}) — Elevated + above MA ✓`,mom:true}}
  return{score:0,note:`VIX ${v.toFixed(0)} (z=${z.toFixed(1)}) — Elevated but below 10mo MA`,mom:false}}
 if(z>-0.5)return{score:0,note:`VIX ${v.toFixed(0)} (z=${z.toFixed(1)}) — Normal`,mom:null};
 if(z>-1.0)return{score:1,note:`VIX ${v.toFixed(0)} (z=${z.toFixed(1)}) — Low vs regime`,mom:null};
 if(z>-1.5)return{score:2,note:`VIX ${v.toFixed(0)} (z=${z.toFixed(1)}) — Very low`,mom:null};
 return{score:3,note:`VIX ${v.toFixed(0)} (z=${z.toFixed(1)}) — Extreme complacency`,mom:null}}

function capeSignal(v){if(v==null)return{score:0,note:""};if(v<12)return{score:-3,note:`CAPE ${v.toFixed(0)}x — Depression`};if(v<15)return{score:-2,note:`CAPE ${v.toFixed(0)}x — Generational`};if(v<20)return{score:-1,note:`CAPE ${v.toFixed(0)}x — Value`};if(v<25)return{score:0,note:`CAPE ${v.toFixed(0)}x — Moderate`};if(v<30)return{score:1,note:`CAPE ${v.toFixed(0)}x — Expensive`};if(v<35)return{score:2,note:`CAPE ${v.toFixed(0)}x — Very expensive`};return{score:3,note:`CAPE ${v.toFixed(0)}x — Extreme`}}
function sentSignal(v){if(v==null)return{score:0,note:""};if(v<55)return{score:-3,note:`Sent ${v.toFixed(0)} — Peak despair`};if(v<60)return{score:-2,note:`Sent ${v.toFixed(0)} — Deep pessimism`};if(v<65)return{score:-1,note:`Sent ${v.toFixed(0)} — Pessimistic`};if(v<95)return{score:0,note:`Sent ${v.toFixed(0)} — Normal`};if(v<100)return{score:1,note:`Sent ${v.toFixed(0)} — Optimistic`};if(v<105)return{score:2,note:`Sent ${v.toFixed(0)} — Euphoric`};return{score:3,note:`Sent ${v.toFixed(0)} — Mania`}}
function epuSignal(v){if(v==null)return{score:0,note:""};const z=((v-110)/50).toFixed(1);if(v>300)return{score:3,note:`EPU ${v.toFixed(0)} (${z}σ) — Crisis`};if(v>200)return{score:2,note:`EPU ${v.toFixed(0)} (${z}σ) — Major`};if(v>150)return{score:1,note:`EPU ${v.toFixed(0)} (${z}σ) — Elevated`};return{score:0,note:`EPU ${v.toFixed(0)} (${z}σ) — Normal`}}

function calcMomentum(){
 const spxData=st.mcFull.sp500||[];if(spxData.length<10)return{abvMA:null,ma:null,mom3:null,current:null,bearRegime:false,drawdown:null,high12:null};
 const vals=spxData.map(d=>parseFloat(d.value)).filter(x=>!isNaN(x));if(vals.length<10)return{abvMA:null,ma:null,mom3:null,current:null,bearRegime:false,drawdown:null,high12:null};
 const current=vals[vals.length-1];
 const ma10=vals.slice(-10).reduce((a,b)=>a+b,0)/Math.min(vals.length,10);
 const prev3=vals.length>=3?vals[vals.length-3]:current;
 const mom3=((current-prev3)/prev3)*100;
 const abvMA=current>ma10;
 /* Bear regime: below 10mo MA AND >7% drawdown from 12-month high */
 const high12=Math.max(...vals.slice(-Math.min(vals.length,252)));
 const drawdown=((current-high12)/high12)*100;
 const bearRegime=!abvMA&&drawdown<-7;
 return{abvMA,ma:ma10.toFixed(0),mom3:mom3.toFixed(1),current:current.toFixed(0),bearRegime,drawdown:drawdown.toFixed(1),high12:high12.toFixed(0)}}

function calcMarketSignal(){const vD=st.d.vx||[],coD=st.d.co||[],epuD=st.d.epu||[];
 const vix=vD.length?parseFloat(vD[vD.length-1].value):null;const sent=coD.length?parseFloat(coD[coD.length-1].value):null;const epu=epuD.length?parseFloat(epuD[epuD.length-1].value):null;
 const vZ=st.vixRolling?parseFloat(st.vixRolling.z):null;
 const mom=calcMomentum();st.momentum=mom;
 const vS=vixSignalHybrid(vix,vZ,mom.abvMA),cS=capeSignal(st.cape),eS=epuSignal(epu);
 /* Bear regime: dampen sentiment's contrarian buy signal.
    In 2022 Sent=50-67 pulled BUY (-1 to -3) while market fell 25%.
    Consumer pessimism during confirmed downtrend isn't contrarian — it's correct.
    Dampen: halve sentiment's buy score (negative values) in bear regime. */
 let sS=sentSignal(sent);
 let bearDamp=null;
 if(mom.bearRegime&&sS.score<0){
  const origScore=sS.score;
  const dampedScore=Math.round(sS.score*0.5);
  bearDamp={orig:origScore,damped:dampedScore,drawdown:mom.drawdown};
  sS={...sS,score:dampedScore,note:sS.note+` [dampened: bear regime ${mom.drawdown}%]`}}
 const w=[];
 if(vS.note)w.push({sig:vS,w:.40,name:"VIX",canOvr:true});
 if(cS.note)w.push({sig:cS,w:.25,name:"CAPE",canOvr:false});
 if(sS.note)w.push({sig:sS,w:.35,name:"Sentiment",canOvr:true});
 const tW=w.reduce((a,b)=>a+b.w,0);let bs=tW>0?w.reduce((a,b)=>a+b.w*b.sig.score,0)/tW:0;
 /* Bear regime tilt: add +0.3 (toward sell) when in confirmed downtrend.
    This is small enough not to overpower capitulation buys (VIX>40 = -2 or -3)
    but shifts HOLD → SOFT SELL in grinding bears like 2022. */
 if(mom.bearRegime)bs+=0.3;
 let ov=null;const ext=w.filter(x=>Math.abs(x.sig.score)===3&&x.canOvr);
 if(ext.length){const sb=ext.filter(x=>x.sig.score===-3),ss=ext.filter(x=>x.sig.score===3);
  if(sb.length&&ss.length)ov={type:"CONFLICTED",note:"VIX & Sentiment extremes conflict."};
  else if(sb.length&&bs<=0){ov={type:"OVERRIDE_BUY",note:sb.map(x=>x.name).join("+")+' capitulation'};bs=Math.min(bs,-2.5)}
  else if(ss.length&&bs>=0){ov={type:"OVERRIDE_SELL",note:ss.map(x=>x.name).join("+")+' extreme'};bs=Math.max(bs,2.5)}}
 return{score:bs,level:sigLevel(bs),override:ov,signals:{vix:vS,cape:cS,sentiment:sS,epu:eS},bearRegime:mom.bearRegime,bearDamp}}

function getStrategy(){const comp=calcComposite();const ms=calcMarketSignal();const r=comp.recession!=null?comp.recession:0;const m=ms.score;
 /* v15.1: thresholds 35/60/80 */
 const rl=r>80?"RED":r>60?"ORANGE":r>35?"YELLOW":"GREEN";const md=m<-0.5?"BUY":m>0.5?"SELL":"HOLD";
 if(rl==="GREEN"&&md==="BUY")return{color:"#00E676",label:"FULL OFFENSE",text:"Economy clear + stocks cheap. Buy pullbacks aggressively."};
 if(rl==="GREEN"&&md==="HOLD")return{color:"#00E676",label:"DEPLOYED",text:"Economy clear, fairly valued. Stay invested, normal sizing."};
 if(rl==="GREEN"&&md==="SELL"){const cTxt=st.cape?` (CAPE ${st.cape.toFixed(0)}x)`:"";return{color:"#FF9100",label:"OVERVALUED RALLY",text:`Economy healthy but reduced upside${cTxt}. Sell signals avg +5.3% vs +12.5% for buys (6mo). Keep 30-40% powder dry.`}}
 if(rl==="YELLOW"&&md==="BUY")return{color:"#FFC107",label:"SELECTIVE BUYING",text:"Early recession risk + discounted. Historical buy avg: +12.5% forward 6mo. Buy quality only."};
 if(rl==="YELLOW"&&md==="HOLD")return{color:"#FFC107",label:"CAUTION",text:"Recession risk rising. Tighten stops. Build cash 15-20%."};
 if(rl==="YELLOW"&&md==="SELL")return{color:"#FF9100",label:"DEFENSIVE",text:"Recession risk + reduced upside. Sell avg: +5.3% (6mo) vs +6.6% baseline. Cash 25-35%. Favor dividends."};
 if((rl==="ORANGE"||rl==="RED")&&md==="BUY")return{color:"#00E676",label:"MAX OPPORTUNITY",text:"Recession + capitulation pricing. Historical buy avg: +12.5% forward 6mo. Deploy aggressively."};
 if((rl==="ORANGE"||rl==="RED")&&md==="HOLD")return{color:"#FF9100",label:"WAIT FOR CAPITULATION",text:"Recession active but not yet cheap. Hold cash for better entry."};
 return{color:"#FF1744",label:"PRESERVATION",text:"Recession + reduced upside. Sell avg: +5.3% (6mo) but elevated drawdown risk. Cash 40-50%. Hedge."};}

   if(cI[m]!=null){const cv=cI[m];if(cv<12)capeSig=-3;else if(cv<15)capeSig=-2;else if(cv<20)capeSig=-1;else if(cv<25)capeSig=0;else if(cv<30)capeSig=1;else if(cv<35)capeSig=2;else capeSig=3;indS.cape=cv<25?0:cv<30?clamp((cv-25)/5*33):cv<35?clamp(33+(cv-30)/5*34):100}
   let sentSig=0;
   if(idx.co[m]!=null){const sv=idx.co[m];if(sv<55)sentSig=-3;else if(sv<60)sentSig=-2;else if(sv<65)sentSig=-1;else if(sv<95)sentSig=0;else if(sv<100)sentSig=1;else if(sv<105)sentSig=2;else sentSig=3;indS.co=clamp((95-sv)/45*100)}

   /* Bear regime detection for backtest */
   let btBear=false;

    const prev12=spxMos.filter(x=>x<=m).slice(-12).map(x=>idx.spx[x]).filter(v=>v!=null);

function calcBacktestStats(data){
 if(!data||data.length<24)return null;
 const stats={};
 /* 1. RECESSION SCORE — Detection analysis */
 const recPeriods=[];let inRec=false,rStart=0;
 for(let i=0;i<data.length;i++){if(data[i].recession&&!inRec){inRec=true;rStart=i}if(!data[i].recession&&inRec){inRec=false;recPeriods.push({start:rStart,end:i-1})}}
 if(inRec)recPeriods.push({start:rStart,end:data.length-1});
 /* For each recession, find score at start, peak, and earliest YELLOW crossing */
 const recDetails=recPeriods.map(rp=>{
  const startScore=data[rp.start].score;const peakScore=Math.max(...data.slice(rp.start,rp.end+1).map(d=>d.score||0));
  let leadMonths=0;for(let j=rp.start-1;j>=Math.max(0,rp.start-36);j--){if(data[j].score>=35){leadMonths=rp.start-j}else break}
  return{period:`${data[rp.start].month} → ${data[rp.end].month}`,startScore:startScore?.toFixed(0)||"?",peakScore:peakScore.toFixed(0),lead:leadMonths,caught:startScore>=35}});
 stats.recessions=recDetails;
 stats.caught=recDetails.filter(r=>r.caught).length;
 stats.total=recDetails.length;
 /* F1 score calculation */
 const thresholds=[25,30,35,40,45,50];
 stats.thresholdAnalysis=thresholds.map(th=>{
  let tp=0,fp=0,fn=0,tn=0;
  data.forEach(d=>{const above=d.score>=th;const isRec=d.recession;
   if(above&&isRec)tp++;else if(above&&!isRec)fp++;else if(!above&&isRec)fn++;else tn++});
  const precision=tp/(tp+fp)||0;const recall=tp/(tp+fn)||0;const f1=precision&&recall?2*precision*recall/(precision+recall):0;
  const fpRate=fp/(fp+tn)||0;
  return{threshold:th,tp,fp,fn,tn,precision:(precision*100).toFixed(0),recall:(recall*100).toFixed(0),f1:(f1*100).toFixed(0),fpRate:(fpRate*100).toFixed(0)}});
 /* 2. MARKET SIGNAL — Return analysis */
 const fwdReturns=[3,6,12];
 stats.signalReturns={};
 fwdReturns.forEach(mo=>{
  const buckets={buy:[],hold:[],sell:[]};
  for(let i=0;i<data.length-mo;i++){
   const d=data[i];if(d.mktSignal==null||d.spx==null)continue;
   const fwd=data[i+mo];if(!fwd||fwd.spx==null)continue;
   const ret=((fwd.spx-d.spx)/d.spx*100);
   if(d.mktSignal<=-0.5)buckets.buy.push(ret);
   else if(d.mktSignal>=0.5)buckets.sell.push(ret);
   else buckets.hold.push(ret)}
  const avg=arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:null;
  const med=arr=>{if(!arr.length)return null;const s=[...arr].sort((a,b)=>a-b);const m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2};
  const winRate=arr=>arr.length?(arr.filter(r=>r>0).length/arr.length*100):null;
  stats.signalReturns[mo]={
   buy:{n:buckets.buy.length,avg:avg(buckets.buy),med:med(buckets.buy),win:winRate(buckets.buy),min:buckets.buy.length?Math.min(...buckets.buy):null,max:buckets.buy.length?Math.max(...buckets.buy):null},
   hold:{n:buckets.hold.length,avg:avg(buckets.hold),med:med(buckets.hold),win:winRate(buckets.hold)},
   sell:{n:buckets.sell.length,avg:avg(buckets.sell),med:med(buckets.sell),win:winRate(buckets.sell),min:buckets.sell.length?Math.min(...buckets.sell):null,max:buckets.sell.length?Math.max(...buckets.sell):null},
   separation:avg(buckets.buy)!=null&&avg(buckets.sell)!=null?(avg(buckets.buy)-avg(buckets.sell)):null}});
 /* 3. SIGNAL TIMING — When did each signal level fire? */
 const sigHist=[];let prevSig=null;
 for(let i=0;i<data.length;i++){
  const d=data[i];if(d.mktSignal==null)continue;
  const lvl=d.mktSignal<=-2.5?"STR BUY":d.mktSignal<=-1.5?"BUY":d.mktSignal<=-0.5?"SOFT BUY":d.mktSignal>=2.5?"STR SELL":d.mktSignal>=1.5?"SELL":d.mktSignal>=0.5?"SOFT SELL":"HOLD";
  if(lvl!==prevSig){
   if(sigHist.length)sigHist[sigHist.length-1].duration=i-sigHist[sigHist.length-1].startIdx;
   sigHist.push({level:lvl,month:d.month,startIdx:i,score:d.mktSignal,spx:d.spx});prevSig=lvl}}
 if(sigHist.length)sigHist[sigHist.length-1].duration=data.length-sigHist[sigHist.length-1].startIdx;
 stats.signalHistory=sigHist.slice(-30);
 /* 4. PERIOD ANALYSIS — OOS vs Training */
 const periods=[{name:"OOS 1995-2015",filter:d=>d.month>="1995-01"&&d.month<="2015-12"},
  {name:"Training 2016-2026",filter:d=>d.month>="2016-01"},
  {name:"Full",filter:()=>true}];
 stats.periodAnalysis=periods.map(p=>{
  const pd=data.filter(p.filter);const buckets={buy:[],sell:[]};
  for(let i=0;i<pd.length;i++){
   const d=pd[i];if(d.mktSignal==null||d.spx==null)continue;
   const fi=data.indexOf(d);if(fi+6>=data.length)continue;
   const fwd=data[fi+6];if(!fwd||fwd.spx==null)continue;
   const ret=((fwd.spx-d.spx)/d.spx*100);
   if(d.mktSignal<=-0.5)buckets.buy.push(ret);
   else if(d.mktSignal>=0.5)buckets.sell.push(ret)}
  const avg=arr=>arr.length?(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1):"-";
  return{name:p.name,months:pd.length,buys:buckets.buy.length,buyAvg:avg(buckets.buy),sells:buckets.sell.length,sellAvg:avg(buckets.sell),
   sep:buckets.buy.length&&buckets.sell.length?((buckets.buy.reduce((a,b)=>a+b,0)/buckets.buy.length)-(buckets.sell.reduce((a,b)=>a+b,0)/buckets.sell.length)).toFixed(1):"-"}});
 /* 5. RECESSION ZONE RETURNS — Do zones predict returns? */
 stats.zoneReturns={};
 [{name:"GREEN",min:0,max:35},{name:"YELLOW",min:35,max:60},{name:"ORANGE",min:60,max:80},{name:"RED",min:80,max:101}].forEach(z=>{
  const rets=[];for(let i=0;i<data.length-12;i++){
   const d=data[i];if(d.score==null||d.score<z.min||d.score>=z.max)continue;
   const fwd=data[i+12];if(!fwd||fwd.spx==null||d.spx==null)continue;
   rets.push((fwd.spx-d.spx)/d.spx*100)}
  stats.zoneReturns[z.name]={n:rets.length,avg:rets.length?(rets.reduce((a,b)=>a+b,0)/rets.length).toFixed(1):"-",
   win:rets.length?(rets.filter(r=>r>0).length/rets.length*100).toFixed(0):"-"}});
 /* 6. BEAR REGIME ANALYSIS — validate the slow bear fix */
 const bearMo=data.filter(d=>d.bearRegime);const normalMo=data.filter(d=>!d.bearRegime&&d.mktSignal!=null);
 const bearRets6=[],normalRets6=[];
 for(let i=0;i<data.length-6;i++){
  const d=data[i];if(d.spx==null)continue;const fwd=data[i+6];if(!fwd||fwd.spx==null)continue;
  const ret=(fwd.spx-d.spx)/d.spx*100;
  if(d.bearRegime)bearRets6.push(ret);else normalRets6.push(ret)}
 const bearSellMo=bearMo.filter(d=>d.mktSignal!=null&&d.mktSignal>=0.5);
 const bearHoldMo=bearMo.filter(d=>d.mktSignal!=null&&d.mktSignal>-0.5&&d.mktSignal<0.5);
 const bearBuyMo=bearMo.filter(d=>d.mktSignal!=null&&d.mktSignal<=-0.5);
 const avg6=arr=>arr.length?(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1):"-";
 stats.bearRegime={
  totalMonths:bearMo.length,normalMonths:normalMo.length,
  bearAvg6:avg6(bearRets6),normalAvg6:avg6(normalRets6),
  bearSells:bearSellMo.length,bearHolds:bearHoldMo.length,bearBuys:bearBuyMo.length,
  periods:[]};
 /* Find bear regime periods */
 let inBear=false,bStart=0;
 for(let i=0;i<data.length;i++){if(data[i].bearRegime&&!inBear){inBear=true;bStart=i}
  if(!data[i].bearRegime&&inBear){inBear=false;
   const startSpx=data[bStart].spx,endSpx=data[i-1].spx;
   const drawdown=startSpx&&endSpx?((Math.min(...data.slice(bStart,i).map(d=>d.spx).filter(Boolean))-startSpx)/startSpx*100).toFixed(1):"-";
   stats.bearRegime.periods.push({start:data[bStart].month,end:data[i-1].month,months:i-bStart,drawdown,
    signals:{sell:data.slice(bStart,i).filter(d=>d.mktSignal>=0.5).length,hold:data.slice(bStart,i).filter(d=>d.mktSignal>-0.5&&d.mktSignal<0.5).length,buy:data.slice(bStart,i).filter(d=>d.mktSignal<=-0.5).length}})}}
 if(inBear){const startSpx=data[bStart].spx;
  stats.bearRegime.periods.push({start:data[bStart].month,end:data[data.length-1].month,months:data.length-bStart,drawdown:"-",
   signals:{sell:data.slice(bStart).filter(d=>d.mktSignal>=0.5).length,hold:data.slice(bStart).filter(d=>d.mktSignal>-0.5&&d.mktSignal<0.5).length,buy:data.slice(bStart).filter(d=>d.mktSignal<=-0.5).length}})}

/* CSV file loading for S&P backfill — handles FRED, Yahoo, Shiller, and generic formats */
function loadCSVFile(file){return new Promise((resolve)=>{const reader=new FileReader();reader.onload=e=>{
 const lines=e.target.result.split("\n");const rows=[];if(lines.length<2){resolve([]);return}
 const hdr=lines[0].toLowerCase().replace(/"/g,"");
 /* Detect format from header */
 let dateCol=0,valCol=1,fmt="generic";
 if(hdr.includes("observation_date")){/* FRED: observation_date,SP500 */
  fmt="fred";dateCol=0;valCol=1}
 else if(hdr.includes("high")&&hdr.includes("low")&&hdr.includes("close")){/* Yahoo: Date,High,Low,Open,Close,Vol,AdjClose */
  fmt="yahoo";dateCol=0;const cols=hdr.split(",");valCol=cols.indexOf("close");if(valCol<0)valCol=4}
 else if(hdr.includes("dividend")&&hdr.includes("earnings")){/* Shiller: Date,SP500,Dividend,Earnings,CPI... */
  fmt="shiller";dateCol=0;valCol=1}
 else if(hdr.includes("open")&&hdr.includes("close")){/* Generic OHLC: Date,Open,High,Low,Close */
  fmt="ohlc";dateCol=0;const cols=hdr.split(",");valCol=cols.indexOf("close");if(valCol<0)valCol=4}
 for(let i=1;i<lines.length;i++){
  const line=lines[i].replace(/"/g,"").trim();if(!line)continue;
  const cols=line.split(",");if(cols.length<=Math.max(dateCol,valCol))continue;
  let date=cols[dateCol].trim();
  /* Handle MM/DD/YYYY format */
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(date)){const p=date.split("/");date=`${p[2]}-${p[0]}-${p[1]}`}
  /* Parse value — remove commas from numbers like "6,839.24" */
  let raw=cols[valCol].trim().replace(/,/g,"");
  const val=parseFloat(raw);
  if(!date||isNaN(val)||val<=0)continue;
  /* Extract month — handle both YYYY-MM-DD and YYYY-MM formats */
  const m=date.substring(0,7);if(!/^\d{4}-\d{2}$/.test(m))continue;
  rows.push({month:m,value:val,date})}
 /* For daily data, keep last value per month (end-of-month close) */
 const byMonth={};rows.forEach(r=>{if(!byMonth[r.month]||r.date>byMonth[r.month].date)byMonth[r.month]={value:r.value,date:r.date}});
 resolve(Object.entries(byMonth).map(([month,d])=>({month,value:d.value})))
};reader.readAsText(file)})}
function handleCSVUpload(files){if(!files||!files.length)return;
 Promise.all([...files].map(f=>loadCSVFile(f))).then(results=>{
  const all=[];results.forEach(r=>all.push(...r));
  /* Deduplicate: keep latest value per month */
  const byMonth={};all.forEach(r=>{if(!byMonth[r.month]||r.value>0)byMonth[r.month]=r.value});
  st.bt.csvData=Object.entries(byMonth).map(([month,value])=>({month,value})).sort((a,b)=>a.month.localeCompare(b.month));
  st.bt.csvLoaded=true;render()})}
