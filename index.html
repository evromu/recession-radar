<style>
:root{--bg:#0E0D0B;--sf:rgba(14,13,11,.8);--bd:#1E1D1A;--tx:#E8E6E3;--t2:#AAA;--t3:#777;--t4:#555;--t5:#333;--cl:#00E676;--wa:#78909C;--ca:#FFC107;--wn:#FF9100;--st:#FF1744}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh}
.m{font-family:'JetBrains Mono','Fira Code',monospace}.h{font-family:'Space Grotesk',sans-serif}.c{max-width:720px;margin:0 auto;padding:16px 16px 60px}
.card{border-radius:12px;padding:18px 20px;cursor:pointer}.ga{background:linear-gradient(135deg,rgba(14,13,11,.95),rgba(22,20,17,.95));border-radius:14px;padding:24px 20px;margin-bottom:20px;position:relative;overflow:hidden}
.gb{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--cl),var(--ca),var(--wn),var(--st));opacity:.45}
.ab{border-radius:10px;padding:14px 16px;margin-bottom:20px}.db{background:rgba(0,0,0,.3);border-radius:8px;padding:10px 12px;margin-bottom:7px}
.lg{margin-top:24px;padding:14px 16px;background:var(--sf);border:1px solid var(--bd);border-radius:10px}.dt{display:inline-block;border-radius:50%}
.si{width:100%;padding:12px 14px;background:var(--bg);border:1px solid #333;border-radius:8px;color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:14px;outline:none}.si:focus{border-color:var(--ca)}
.sb{width:100%;padding:14px;border:none;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.06em;cursor:pointer}.sa{background:var(--ca);color:var(--bg)}.sd{background:#333;color:#666;cursor:default}
@keyframes p{0%,100%{opacity:.4}50%{opacity:1}}.lp{animation:p 1.5s ease-in-out infinite}
.err-box{background:rgba(255,23,68,.07);border:1px solid rgba(255,23,68,.18);border-radius:8px;padding:10px 14px;margin-bottom:16px}
a{color:var(--ca)}.hcomp{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}.hcomp-cell{background:rgba(0,0,0,.2);border-radius:6px;padding:6px 8px;text-align:center}
.ar-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:9px;letter-spacing:.05em}
.bt-wrap{margin-top:20px;margin-bottom:4px;background:var(--sf);border:1px solid var(--bd);border-radius:14px;overflow:hidden}
.bt-hdr{padding:16px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.bt-body{padding:0 20px 20px}.bt-scroll{position:relative;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:#333 transparent}
.bt-scroll::-webkit-scrollbar{height:6px}.bt-scroll::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
.desc{font-size:12px;color:#888;line-height:1.6;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.05)}
.tg{display:inline-flex;align-items:center;padding:4px 10px;border-radius:5px;font-size:9px;font-weight:600;cursor:pointer;border:1px solid;font-family:'JetBrains Mono',monospace}
.tg-on{color:var(--bg)!important;font-weight:800}.tg-off{opacity:.5}
.wt-bar{height:3px;border-radius:2px;margin-top:4px}
.bonus-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:3px;font-size:8px;font-weight:700;background:rgba(255,145,0,.12);color:var(--wn);border:1px solid rgba(255,145,0,.25)}
.msp{border-radius:14px;padding:20px;margin-bottom:20px;overflow:hidden}
.msp-gauge{height:8px;border-radius:4px;background:linear-gradient(90deg,#00E676,#00C853,#66BB6A,#78909C,#FFC107,#FF9100,#FF1744);position:relative;margin:12px 0}
.msp-needle{position:absolute;top:-4px;width:3px;height:16px;background:#fff;border-radius:2px;transform:translateX(-50%);box-shadow:0 0 6px rgba(255,255,255,.5)}
.msp-labels{display:flex;justify-content:space-between;font-size:7px;color:var(--t4);margin-bottom:8px}
.msp-ind{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:14px}
.msp-ind-card{background:rgba(0,0,0,.2);border-radius:8px;padding:10px 12px;border:1px solid transparent}
.mc-wrap{margin-bottom:20px}.mc-group{margin-bottom:14px}.mc-ghdr{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.mc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}
.mc-card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;cursor:pointer}.mc-card:hover{border-color:#444}
.mc-badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:8px;font-weight:700}

.tw-btn.active{background:var(--ca);color:var(--bg);border-color:var(--ca);font-weight:700}
@media(max-width:500px){.mc-grid{grid-template-columns:1fr 1fr}.card{padding:14px 16px}.ga{padding:18px 14px}.msp-ind{grid-template-columns:1fr}}

<script>
const PX=[u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,u=>u];
function clamp(v){return Math.max(0,Math.min(100,v))}

/* ═══ v15.1 METHODOLOGY ═══
   RECESSION SCORE: YC range 0.5/-0.3, PI=15/12 (backtested: F1 37, FP 39%)
     Thresholds: GREEN 0-35, YELLOW 35-60, ORANGE 60-80, RED 80+
   MARKET SIGNAL: VIX 40% (hybrid z-score, MA10-only momentum gate, OOS +4.9pp)
     + CAPE 25% (>35 STR SELL, 145yr validated) + Sentiment 35%
═══════════════════════════════════════════════════════ */
const SIG_LEVELS=[{v:-3,label:"STRONG BUY",short:"STR BUY",color:"#00E676",bg:"rgba(0,230,118,.12)"},{v:-2,label:"BUY",short:"BUY",color:"#00C853",bg:"rgba(0,200,83,.10)"},{v:-1,label:"SOFT BUY",short:"SOFT BUY",color:"#66BB6A",bg:"rgba(102,187,106,.08)"},{v:0,label:"HOLD",short:"HOLD",color:"#78909C",bg:"rgba(120,144,156,.08)"},{v:1,label:"SOFT SELL",short:"SOFT SELL",color:"#FFC107",bg:"rgba(255,193,7,.10)"},{v:2,label:"SELL",short:"SELL",color:"#FF9100",bg:"rgba(255,145,0,.10)"},{v:3,label:"STRONG SELL",short:"STR SELL",color:"#FF1744",bg:"rgba(255,23,68,.12)"}];
function sigLevel(v){return SIG_LEVELS.find(l=>l.v===Math.max(-3,Math.min(3,Math.round(v))))||SIG_LEVELS[3]}

function vixSignalHybrid(v,z,abvMA){
 if(v==null)return{score:0,note:"",mom:null};
 if(v>50)return{score:-3,note:`VIX ${v.toFixed(0)} — Capitulation`,mom:"bypass"};
 if(v>40)return{score:-2,note:`VIX ${v.toFixed(0)} — Extreme fear`,mom:"bypass"};
 if(v>35)return{score:-1,note:`VIX ${v.toFixed(0)} — Panic`,mom:"bypass"};
 if(v<12)return{score:3,note:`VIX ${v.toFixed(0)} — Complacency`,mom:"bypass"};
 if(z==null)return{score:0,note:`VIX ${v.toFixed(0)}`,mom:null};
 if(z>1.0){
  if(abvMA){const s=z>2?-2:-1;return{score:s,note:`VIX ${v.toFixed(0)} (z=${z.toFixed(1)}) — Elevated + above MA ✓`,mom:true}}
  return{score:0,note:`VIX ${v.toFixed(0)} (z=${z.toFixed(1)}) — Elevated but below 10mo MA`,mom:false}}
 if(z>-0.5)return{score:0,note:`VIX ${v.toFixed(0)} (z=${z.toFixed(1)}) — Normal`,mom:null};
 if(z>-1.0)return{score:1,note:`VIX ${v.toFixed(0)} (z=${z.toFixed(1)}) — Low vs regime`,mom:null};
 if(z>-1.5)return{score:2,note:`VIX ${v.toFixed(0)} (z=${z.toFixed(1)}) — Very low`,mom:null};
 return{score:3,note:`VIX ${v.toFixed(0)} (z=${z.toFixed(1)}) — Extreme complacency`,mom:null}}

function capeSignal(v){if(v==null)return{score:0,note:""};if(v<12)return{score:-3,note:`CAPE ${v.toFixed(0)}x — Depression`};if(v<15)return{score:-2,note:`CAPE ${v.toFixed(0)}x — Generational`};if(v<20)return{score:-1,note:`CAPE ${v.toFixed(0)}x — Value`};if(v<25)return{score:0,note:`CAPE ${v.toFixed(0)}x — Moderate`};if(v<30)return{score:1,note:`CAPE ${v.toFixed(0)}x — Expensive`};if(v<35)return{score:2,note:`CAPE ${v.toFixed(0)}x — Very expensive`};return{score:3,note:`CAPE ${v.toFixed(0)}x — Extreme`}}
function sentSignal(v){if(v==null)return{score:0,note:""};if(v<55)return{score:-3,note:`Sent ${v.toFixed(0)} — Peak despair`};if(v<60)return{score:-2,note:`Sent ${v.toFixed(0)} — Deep pessimism`};if(v<65)return{score:-1,note:`Sent ${v.toFixed(0)} — Pessimistic`};if(v<95)return{score:0,note:`Sent ${v.toFixed(0)} — Normal`};if(v<100)return{score:1,note:`Sent ${v.toFixed(0)} — Optimistic`};if(v<105)return{score:2,note:`Sent ${v.toFixed(0)} — Euphoric`};return{score:3,note:`Sent ${v.toFixed(0)} — Mania`}}
function epuSignal(v){if(v==null)return{score:0,note:""};const z=((v-110)/50).toFixed(1);if(v>300)return{score:3,note:`EPU ${v.toFixed(0)} (${z}σ) — Crisis`};if(v>200)return{score:2,note:`EPU ${v.toFixed(0)} (${z}σ) — Major`};if(v>150)return{score:1,note:`EPU ${v.toFixed(0)} (${z}σ) — Elevated`};return{score:0,note:`EPU ${v.toFixed(0)} (${z}σ) — Normal`}}

function calcMomentum(){
 const spxData=st.mcFull.sp500||[];if(spxData.length<10)return{abvMA:null,ma:null,mom3:null,current:null};
 const vals=spxData.map(d=>parseFloat(d.value)).filter(x=>!isNaN(x));if(vals.length<10)return{abvMA:null,ma:null,mom3:null,current:null};
 const current=vals[vals.length-1];
 const ma10=vals.slice(-10).reduce((a,b)=>a+b,0)/Math.min(vals.length,10);
 const prev3=vals.length>=3?vals[vals.length-3]:current;
 const mom3=((current-prev3)/prev3)*100;
 return{abvMA:current>ma10,ma:ma10.toFixed(0),mom3:mom3.toFixed(1),current:current.toFixed(0)}}

function calcMarketSignal(){const vD=st.d.vx||[],coD=st.d.co||[],epuD=st.d.epu||[];
 const vix=vD.length?parseFloat(vD[vD.length-1].value):null;const sent=coD.length?parseFloat(coD[coD.length-1].value):null;const epu=epuD.length?parseFloat(epuD[epuD.length-1].value):null;
 const vZ=st.vixRolling?parseFloat(st.vixRolling.z):null;
 const mom=calcMomentum();st.momentum=mom;
 const vS=vixSignalHybrid(vix,vZ,mom.abvMA),cS=capeSignal(st.cape),sS=sentSignal(sent),eS=epuSignal(epu);
 const w=[];
 if(vS.note)w.push({sig:vS,w:.40,name:"VIX",canOvr:true});
 if(cS.note)w.push({sig:cS,w:.25,name:"CAPE",canOvr:false});
 if(sS.note)w.push({sig:sS,w:.35,name:"Sentiment",canOvr:true});
 const tW=w.reduce((a,b)=>a+b.w,0);let bs=tW>0?w.reduce((a,b)=>a+b.w*b.sig.score,0)/tW:0;
 let ov=null;const ext=w.filter(x=>Math.abs(x.sig.score)===3&&x.canOvr);
 if(ext.length){const sb=ext.filter(x=>x.sig.score===-3),ss=ext.filter(x=>x.sig.score===3);
  if(sb.length&&ss.length)ov={type:"CONFLICTED",note:"VIX & Sentiment extremes conflict."};
  else if(sb.length&&bs<=0){ov={type:"OVERRIDE_BUY",note:sb.map(x=>x.name).join("+")+' capitulation'};bs=Math.min(bs,-2.5)}
  else if(ss.length&&bs>=0){ov={type:"OVERRIDE_SELL",note:ss.map(x=>x.name).join("+")+' extreme'};bs=Math.max(bs,2.5)}}
 return{score:bs,level:sigLevel(bs),override:ov,signals:{vix:vS,cape:cS,sentiment:sS,epu:eS}}}

function getStrategy(){const comp=calcComposite();const ms=calcMarketSignal();const r=comp.recession!=null?comp.recession:0;const m=ms.score;
 /* v15.1: thresholds 35/60/80 */
 const rl=r>80?"RED":r>60?"ORANGE":r>35?"YELLOW":"GREEN";const md=m<-0.5?"BUY":m>0.5?"SELL":"HOLD";
 if(rl==="GREEN"&&md==="BUY")return{color:"#00E676",label:"FULL OFFENSE",text:"Economy clear + stocks cheap. Buy pullbacks aggressively."};
 if(rl==="GREEN"&&md==="HOLD")return{color:"#00E676",label:"DEPLOYED",text:"Economy clear, fairly valued. Stay invested, normal sizing."};
 if(rl==="GREEN"&&md==="SELL")return{color:"#FF9100",label:"OVERVALUED RALLY",text:`Economy healthy but overpriced${st.cape?" (CAPE "+st.cape.toFixed(0)+"x)":""}. Keep 30-40% powder dry.`};
 if(rl==="YELLOW"&&md==="BUY")return{color:"#FFC107",label:"SELECTIVE BUYING",text:"Early recession risk + discounted. Buy quality only."};
 if(rl==="YELLOW"&&md==="HOLD")return{color:"#FFC107",label:"CAUTION",text:"Recession risk rising. Tighten stops. Build cash 15-20%."};
 if(rl==="YELLOW"&&md==="SELL")return{color:"#FF9100",label:"DEFENSIVE",text:"Recession risk + overvalued. Cash 25-35%. Favor dividends."};
 if((rl==="ORANGE"||rl==="RED")&&md==="BUY")return{color:"#00E676",label:"MAX OPPORTUNITY",text:"Recession + capitulation pricing. Deploy aggressively."};
 if((rl==="ORANGE"||rl==="RED")&&md==="HOLD")return{color:"#FF9100",label:"WAIT FOR CAPITULATION",text:"Recession active but not yet cheap. Hold cash."};
 return{color:"#FF1744",label:"PRESERVATION",text:"Recession + overvalued. Cash 40-50%. Hedge."};}

const S=[
 {k:"yc",f:"T10Y2Y",n:"Yield Curve",s:"10Y−2Y · Post-inversion bonus",u:"%",tier:"leading",w:.45,btColor:"#42A5F5",desc:"Best recession predictor. Scores spread <+0.5% as risk. +15pt post-inversion bonus for 12 months.",th:"+0.5%(0) to −0.3%(100). Post-inv: +15pts.",hi:"8/8 since 1970. 45% Leading.",pre08:-0.19,pre20:0.04,pre01:-0.52,ev:v=>v==null?"unknown":v<-.3?"stress":v<0?"warning":v<.2?"caution":v<.5?"watch":"clear"},
 {k:"cr",f:"BAMLH0A0HYM2",n:"Credit Spreads",s:"ICE BofA HY OAS",u:"%",tier:"leading",w:.35,btColor:"#26C6DA",desc:"Bond market leads stocks. +10pt YC interaction.",th:"<3% Normal | 5-8% Stress | >8% Crisis",hi:"35% Leading.",pre08:7.96,pre20:3.57,pre01:6.45,ev:v=>v==null?"unknown":v>8?"stress":v>5?"warning":v>3.5?"caution":"clear"},
 {k:"ic",f:"ICSA",n:"Jobless Claims",s:"Claims / CLF Ratio",u:"",tier:"leading",w:.20,btColor:"#66BB6A",desc:"Weekly filings / Civilian Labor Force.",th:"Ratio: <1.3 Healthy | >2.0 Warning",hi:"20% Leading.",pre08:346,pre20:282,pre01:305,ev:v=>v==null?"unknown":v>350?"stress":v>300?"warning":v>260?"caution":v>220?"watch":"clear",divK:true,hasCLF:true},
 {k:"sa",f:"SAHMREALTIME",n:"Sahm Rule",s:"Unemployment Momentum",u:" pp",tier:"confirming",w:.60,btColor:"#AB47BC",desc:"At 0.50pp = recession.",th:"≥0.50 Recession | 0.30 Approaching",hi:"60% Confirming.",pre08:0.53,pre20:0.5,pre01:0.3,ev:v=>v==null?"unknown":v>=.5?"stress":v>=.3?"warning":v>=.15?"caution":"clear"},
 {k:"mf",f:"MANEMP",n:"Mfg Employment",s:"Manufacturing Jobs",u:"K",tr:1,tier:"confirming",w:.40,btColor:"#EC407A",desc:"Manufacturing contracts before broader economy.",th:"3-mo losses >50K = Stress",hi:"40% Confirming.",ev:(v,t)=>t==null?"unknown":t<-50?"stress":t<-20?"warning":t<0?"caution":t<20?"watch":"clear"},
 {k:"vx",f:"VIXCLS",n:"VIX",s:"Hybrid + MA10 momentum gate",u:"",tier:"market",btColor:"#EF5350",isSigmoid:true,mktW:"40%",desc:"Hybrid: absolute extremes always fire. Z-score transition requires S&P above 10-month MA. Blocks buying into grinding bears. OOS validated +4.9pp on 1995-2015.",th:"Extremes: >50/40/35/<12. Z-score buy: only if S&P > 10mo MA.",hi:"VIX 40%. MA10-gated. OOS validated.",pre08:23.0,pre20:14.0,pre01:25.5,ev:v=>v==null?"unknown":v>35?"stress":v>30?"warning":v>25?"caution":v>20?"watch":"clear"},
 {k:"cape",f:"_CAPE_",n:"Shiller CAPE",s:"Valuation · No override",u:"x",isCape:true,tier:"market",btColor:"#FFA726",mktW:"25%",desc:">35 STR SELL. 145yr validated. Cannot override.",th:"<12 STR BUY | 15-20 SOFT BUY | 30-35 SELL | >35 STR SELL",hi:"CAPE 25%. 145yr validated.",pre08:27.3,pre20:31.3,pre01:44.2,ev:v=>v==null?"unknown":v>35?"stress":v>30?"warning":v>25?"caution":v>20?"watch":"clear"},
 {k:"co",f:"UMCSENT",n:"Consumer Sentiment",s:"Contrarian · Override-capable",u:"",tier:"market",btColor:"#FF7043",mktW:"35%",desc:"<55 STR BUY, >105 STR SELL. Override-capable contrarian.",th:"<55 STR BUY | 60-65 SOFT BUY | 95-100 SOFT SELL | >105 STR SELL",hi:"Sentiment 35%. Override-capable.",pre08:63.0,pre20:101.0,pre01:94.7,ev:v=>v==null?"unknown":v<55?"stress":v<60?"warning":v<70?"caution":v<80?"watch":"clear"},
 {k:"epu",f:"USEPUINDXD",n:"Policy Uncertainty",s:"Display only",u:"σ",tier:"market",btColor:"#7E57C2",isSD:true,mktW:"REF",desc:"Removed from composite. Backtest: every label change was wrong.",th:">300 Crisis | >200 Major | >150 Elevated",hi:"Display only. 0% weight.",pre08:137,pre20:186,pre01:134,ev:v=>v==null?"unknown":v>250?"stress":v>180?"warning":v>130?"caution":v>100?"watch":"clear"},
];

async function ff(sid,key,lim=24,freq=""){let base=`https://api.stlouisfed.org/fred/series/observations?series_id=${sid}&api_key=${key}&file_type=json&sort_order=desc&limit=${lim}`;if(freq)base+=`&frequency=${freq}&aggregation_method=eop`;const ord=[st.px,...[0,1,2].filter(i=>i!==st.px)];for(const i of ord){try{const r=await fetch(PX[i](base),{signal:AbortSignal.timeout(15000)});if(!r.ok)continue;const txt=await r.text();let j;try{j=JSON.parse(txt)}catch{continue}if(j.observations){st.px=i;return j.observations.filter(o=>o.value!==".").reverse()}if(j.contents){try{const p=JSON.parse(j.contents);if(p.observations){st.px=i;return p.observations.filter(o=>o.value!==".").reverse()}}catch{}}}catch{continue}}throw new Error(sid)}
async function fetchCAPE(){const urls=["https://www.multpl.com/shiller-pe","https://www.multpl.com/shiller-pe/table/by-month"];for(const url of urls){const ord=[st.px,...[0,1,2].filter(i=>i!==st.px)];for(const i of ord){try{const r=await fetch(PX[i](url),{signal:AbortSignal.timeout(12000)});if(!r.ok)continue;const h=await r.text();for(const p of[/Current\s+Shiller\s+PE[^0-9]*([\d]{1,2}\.[\d]{1,2})/i,/<td[^>]*>(?:Apr|Mar|Feb|Jan|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[^<]*<\/td>\s*<td[^>]*>\s*([\d]+\.[\d]+)/i,/([\d]{2}\.[\d]{2})\s*<\/td>/]){const m=h.match(p);if(m&&m[1]){const v=parseFloat(m[1]);if(v>5&&v<100){st.cape=v;return}}}}catch{continue}}}st.cape=null}
async function fetchCAPEHist(){try{const url="https://www.multpl.com/shiller-pe/table/by-month";const ord=[st.px,...[0,1,2].filter(i=>i!==st.px)];for(const i of ord){try{const r=await fetch(PX[i](url),{signal:AbortSignal.timeout(15000)});if(!r.ok)continue;const h=await r.text();const rows=[];const re=/<tr[^>]*>\s*<td[^>]*>([^<]+)<\/td>\s*<td[^>]*>([\d.]+)<\/td>/gi;let m;while((m=re.exec(h))!==null){const d=new Date(m[1].trim());const v=parseFloat(m[2]);if(!isNaN(d)&&v>3)rows.push({month:d.toISOString().substring(0,7),value:v})}if(rows.length>12)return rows}catch{continue}}}catch{}return[]}
async function fetchCLF(){try{const clf=await ff("CLF16OV",st.key,3);if(clf.length){st.clfRaw=parseFloat(clf[clf.length-1].value);const claims=st.d.ic||[];if(claims.length>=4&&st.clfRaw){const l4=claims.slice(-4).map(d=>parseFloat(d.value)).filter(x=>!isNaN(x));st.claims4wk=l4.reduce((a,b)=>a+b,0)/l4.length;st.clfRatio=st.claims4wk/st.clfRaw}}}catch{}}
function calcVixRolling(){const vd=st.d.vx||[];const vals=vd.map(d=>parseFloat(d.value)).filter(x=>!isNaN(x));if(vals.length<60)return;const mean=vals.reduce((a,b)=>a+b,0)/vals.length;const sd=Math.sqrt(vals.map(v=>(v-mean)**2).reduce((a,b)=>a+b,0)/vals.length);st.vixRolling={mean:mean.toFixed(1),sd:sd.toFixed(1),z:((vals[vals.length-1]-mean)/sd).toFixed(2)}}
function analyzeYC(d){if(!d||d.length<5)return{ycUD:null,ycInv:false};let ud=null,inv=false;for(let i=0;i<d.length;i++){const v=parseFloat(d[i].value);if(isNaN(v))continue;if(v<0)inv=true;else if(inv&&!ud)ud=d[i].date}return{ycUD:ud,ycInv:inv}}
function analyzeSahm(d){if(!d||d.length<3)return{sahmD:null,sahmPk:null};let td=null,pk=0;for(let i=0;i<d.length;i++){const v=parseFloat(d[i].value);if(isNaN(v))continue;if(v>pk)pk=v;if(v>=.5&&!td)td=d[i].date}return{sahmD:td,sahmPk:pk}}
function peakPct(d){if(!d||d.length<10)return null;const v=d.map(x=>parseFloat(x.value)).filter(x=>!isNaN(x));if(v.length<10)return null;return(((v[v.length-1]-Math.max(...v))/Math.max(...v))*100).toFixed(1)}
function checkPostInversion(){const ad=st.al;if(!ad.ycUD||!ad.ycInv)return false;const mo=Math.round((new Date()-new Date(ad.ycUD+"T00:00:00"))/(1000*60*60*24*30.44));return mo>=0&&mo<=12}

 const crObs=st.d.cr||[];const crLat=crObs.length?parseFloat(crObs[crObs.length-1].value):null;const crScore=crLat!=null?clamp((crLat-3)/7*100):null;let icScore=null;if(st.clfRatio!=null)icScore=clamp((st.clfRatio-0.8)/2.5*100);
 const lead=[];if(ycScore!=null)lead.push({w:.45,s:ycScore});if(crScore!=null)lead.push({w:.35,s:crScore});if(icScore!=null)lead.push({w:.20,s:icScore});

 let intB=false;if(ycScore!=null&&crScore!=null&&ycScore>50&&crScore>50){intB=true;if(avgL!=null)avgL=Math.min(100,avgL+10)}
 const saObs=st.d.sa||[];const saLat=saObs.length?parseFloat(saObs[saObs.length-1].value):null;const saScore=saLat!=null?clamp(saLat/0.6*100):null;
 let mfScore=null;const mfObs=st.d.mf||[];const mfV=mfObs.slice(-3).map(x=>parseFloat(x.value)).filter(x=>!isNaN(x));if(mfV.length>=2)mfScore=clamp((50-(mfV[mfV.length-1]-mfV[0]))/150*100);
 const conf=[];if(saScore!=null)conf.push({w:.60,s:saScore});if(mfScore!=null)conf.push({w:.40,s:mfScore});const cT=conf.reduce((a,b)=>a+b.w,0);const avgC=cT>0?conf.reduce((a,b)=>a+b.w*b.s,0)/cT:null;
 let rec=null;if(avgL!=null&&avgC!=null)rec=avgL*.75+avgC*.25;else if(avgL!=null)rec=avgL;
 return{recession:rec,leading:avgL,confirming:avgC,postInvBonus:st.postInvBonus,interactionBonus:intB}}
