/* ── FRED Fetch ── */
async function ff(sid,key,lim=24,freq=""){
 let base=`https://api.stlouisfed.org/fred/series/observations?series_id=${sid}&api_key=${key}&file_type=json&sort_order=desc&limit=${lim}`;
 if(freq)base+=`&frequency=${freq}&aggregation_method=eop`;
 const ord=[st.px,...[0,1,2].filter(i=>i!==st.px)];
 for(const i of ord){
  try{const r=await fetch(PX[i](base),{signal:AbortSignal.timeout(15000)});if(!r.ok)continue;
   const txt=await r.text();let j;try{j=JSON.parse(txt)}catch{continue}
   if(j.observations){st.px=i;return j.observations.filter(o=>o.value!==".").reverse()}
   if(j.contents){try{const p=JSON.parse(j.contents);if(p.observations){st.px=i;return p.observations.filter(o=>o.value!==".").reverse()}}catch{}}
  }catch{continue}}
 throw new Error(sid);
}

/* ── CAPE Fetch ── */
async function fetchCAPE(){
 const urls=["https://www.multpl.com/shiller-pe","https://www.multpl.com/shiller-pe/table/by-month"];
 for(const url of urls){
  const ord=[st.px,...[0,1,2].filter(i=>i!==st.px)];
  for(const i of ord){
   try{const r=await fetch(PX[i](url),{signal:AbortSignal.timeout(12000)});if(!r.ok)continue;
    const html=await r.text();
    const pats=[/Current\s+Shiller\s+PE[^0-9]*([\d]{1,2}\.[\d]{1,2})/i,
     /<td[^>]*>(?:Apr|Mar|Feb|Jan|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[^<]*<\/td>\s*<td[^>]*>\s*([\d]+\.[\d]+)/i,
     /([\d]{2}\.[\d]{2})\s*<\/td>/];
    for(const pat of pats){const m=html.match(pat);if(m&&m[1]){const v=parseFloat(m[1]);if(v>5&&v<100){st.cape=v;return}}}
   }catch{continue}}}
 st.cape=null;
}

/* ── CLF + 4-week MA ── */
async function fetchCLF(){
 try{
  const clf=await ff("CLF16OV",st.key,3);
  if(clf.length)st.clf=parseFloat(clf[clf.length-1].value)*1000; // CLF is in thousands
  const claims=st.d.ic||[];
  if(claims.length>=4&&st.clf){
   const last4=claims.slice(-4).map(d=>parseFloat(d.value)).filter(x=>!isNaN(x));
   st.claims4wk=last4.reduce((a,b)=>a+b,0)/last4.length;
   st.clfRatio=(st.claims4wk/st.clf*100); // percentage
  }
 }catch{st.clf=null;st.claims4wk=null;st.clfRatio=null}
}

function analyzeYC(d){if(!d||d.length<5)return{ycUD:null,ycInv:false};
 let ud=null,inv=false;for(let i=0;i<d.length;i++){const v=parseFloat(d[i].value);if(isNaN(v))continue;if(v<0){inv=true}else if(inv&&!ud)ud=d[i].date}
 return{ycUD:ud,ycInv:inv}}
function analyzeSahm(d){if(!d||d.length<3)return{sahmD:null,sahmPk:null};
 let td=null,pk=0;for(let i=0;i<d.length;i++){const v=parseFloat(d[i].value);if(isNaN(v))continue;if(v>pk)pk=v;if(v>=.5&&!td)td=d[i].date}
 return{sahmD:td,sahmPk:pk}}
function peakPct(d){if(!d||d.length<10)return null;const v=d.map(x=>parseFloat(x.value)).filter(x=>!isNaN(x));if(v.length<10)return null;
 return(((v[v.length-1]-Math.max(...v))/Math.max(...v))*100).toFixed(1)}

async function loadAll(){
 st.ld=true;st.err=null;render();let ok=0,fl=[];
 for(const s of S){if(s.isCape)continue;
  try{const lim=s.k==="yc"?500:s.k==="sa"?60:s.k==="ic"?52:24;st.d[s.k]=await ff(s.f,st.key,lim);ok++}
  catch{st.d[s.k]=[];fl.push(s.n)}}
 for(const m of MK){try{st.mkF[m.f]=await ff(m.f,st.key,m.pk?260:10);st.mk[m.f]=st.mkF[m.f].slice(-5)}catch{st.mk[m.f]=[];st.mkF[m.f]=[]}}
 await fetchCAPE();
 await fetchCLF();
 if(st.cape){st.d.cape=[{date:new Date().toISOString().split("T")[0],value:st.cape.toString()}];ok++}else{st.d.cape=[];fl.push("CAPE")}
 for(const s of S){const obs=st.d[s.k]||[];
  if(s.isCape){st.ss[s.k]=s.ev(st.cape);continue}
  if(s.tr){const v=obs.slice(-3).map(x=>parseFloat(x.value)).filter(x=>!isNaN(x));st.ss[s.k]=s.ev(null,v.length>=2?v[v.length-1]-v[0]:null)}
  else{let l=obs.length?parseFloat(obs[obs.length-1].value):null;if(s.divK&&l)l=l/1000;st.ss[s.k]=s.ev(isNaN(l)?null:l)}}
 st.al={...analyzeYC(st.d.yc||[]),...analyzeSahm(st.d.sa||[])};st.upd=new Date();
 if(ok===0)st.err="No data. Check FRED API key: fred.stlouisfed.org/docs/api/api_key.html";
 else if(fl.length)st.err=`Loaded ${ok}/${S.length}. Missing: ${fl.join(", ")}`;
 st.ld=false;render()
}

/* ═══ BACKTEST ENGINE ═══ */
async function loadBacktest(){
 st.bt.loading=true;st.bt.err=null;render();
 try{
  // Fetch ~30 years of monthly data for each FRED indicator + USREC + CLF
  const series={
   yc:{id:"T10Y2Y",sc:v=>v==null?null:clamp((1.5-v)/2*100)},
   sa:{id:"SAHMREALTIME",sc:v=>v==null?null:clamp(v/0.6*100)},
   cr:{id:"BAMLH0A0HYM2",sc:v=>v==null?null:clamp((v-3)/7*100)},
   li:{id:"USSLIND",sc:v=>v==null?null:clamp((2-v)/5*100)},
   mf:{id:"MANEMP",sc:null}, // trend-based
   co:{id:"UMCSENT",sc:v=>v==null?null:clamp((95-v)/45*100)},
   vx:{id:"VIXCLS",sc:v=>v==null?null:clamp((v-12)/28*100)},
   ic:{id:"ICSA",sc:null}, // ratio-based
   clf:{id:"CLF16OV",sc:null},
   rec:{id:"USREC",sc:null},
  };
  const raw={};
  for(const[k,s] of Object.entries(series)){
   try{raw[k]=await ff(s.id,st.key,500,"m")}catch{raw[k]=[]}
  }
  // Build monthly timeline
  const allDates=new Set();
  for(const k of Object.keys(raw)){raw[k].forEach(o=>allDates.add(o.date.substring(0,7)))}
  const months=[...allDates].sort();

  // Index data by year-month
  const idx={};
  for(const[k,obs] of Object.entries(raw)){
   idx[k]={};obs.forEach(o=>{idx[k][o.date.substring(0,7)]=parseFloat(o.value)})}

  // Calculate composite score per month
  const composite=[];
  for(const m of months){
   const scores=[];
   // Yield curve
   if(idx.yc[m]!=null&&!isNaN(idx.yc[m]))scores.push(clamp((1.5-idx.yc[m])/2*100));
   // Sahm
   if(idx.sa[m]!=null&&!isNaN(idx.sa[m]))scores.push(clamp(idx.sa[m]/0.6*100));
   // Credit
   if(idx.cr[m]!=null&&!isNaN(idx.cr[m]))scores.push(clamp((idx.cr[m]-3)/7*100));
   // Leading
   if(idx.li[m]!=null&&!isNaN(idx.li[m]))scores.push(clamp((2-idx.li[m])/5*100));
   // Mfg — 3 month trend
   const mfKeys=months.filter(x=>x<=m).slice(-4);
   if(mfKeys.length>=4){
    const v0=idx.mf[mfKeys[0]],v3=idx.mf[mfKeys[3]];
    if(v0!=null&&v3!=null){const trend=v3-v0;scores.push(clamp((50-trend)/150*100))}}
   // Consumer
   if(idx.co[m]!=null&&!isNaN(idx.co[m]))scores.push(clamp((95-idx.co[m])/45*100));
   // VIX
   if(idx.vx[m]!=null&&!isNaN(idx.vx[m]))scores.push(clamp((idx.vx[m]-12)/28*100));
   // Claims/CLF ratio
   if(idx.ic[m]!=null&&idx.clf[m]!=null&&idx.clf[m]>0){
    const ratio=idx.ic[m]/(idx.clf[m]*1000)*100; // CLF in thousands, ICSA in units
    scores.push(clamp((ratio-0.12)/0.23*100))}

   const avg=scores.length>=3?scores.reduce((a,b)=>a+b,0)/scores.length:null;
   const rec=idx.rec[m];
   composite.push({month:m,score:avg,recession:rec===1,count:scores.length});
  }
  st.bt.data=composite.filter(c=>c.score!=null);
  st.bt.loaded=true;
 }catch(e){st.bt.err="Backtest failed: "+e.message}
 st.bt.loading=false;render();
}

function renderBacktestChart(){
 const data=st.bt.data;if(!data||data.length<12)return`<p class="m" style="font-size:11px;color:var(--t4)">Not enough data for backtest.</p>`;
 const W=Math.max(660,data.length*2.5),H=220,PAD={t:20,b:40,l:40,r:10};
 const cw=W-PAD.l-PAD.r,ch=H-PAD.t-PAD.b;

 // Recession bands
 let recBands="";
 let inRec=false,recStart=0;
 for(let i=0;i<data.length;i++){
  const x=PAD.l+(i/data.length)*cw;
  if(data[i].recession&&!inRec){inRec=true;recStart=x}
  if(!data[i].recession&&inRec){inRec=false;recBands+=`<rect x="${recStart}" y="${PAD.t}" width="${x-recStart}" height="${ch}" fill="rgba(255,255,255,.06)" rx="2"/>`}
 }
 if(inRec)recBands+=`<rect x="${recStart}" y="${PAD.t}" width="${PAD.l+cw-recStart}" height="${ch}" fill="rgba(255,255,255,.06)" rx="2"/>`;

 // Zone fills
 const zones=[
  {y0:0,y1:25,color:"rgba(0,230,118,.06)"},   // Green zone
  {y0:25,y1:50,color:"rgba(255,193,7,.05)"},   // Yellow zone
  {y0:50,y1:75,color:"rgba(255,145,0,.05)"},   // Orange zone
  {y0:75,y1:100,color:"rgba(255,23,68,.06)"},  // Red zone
 ];
 let zoneFills="";
 for(const z of zones){
  const yt=PAD.t+(1-z.y1/100)*ch,yb=PAD.t+(1-z.y0/100)*ch;
  zoneFills+=`<rect x="${PAD.l}" y="${yt}" width="${cw}" height="${yb-yt}" fill="${z.color}"/>`}

 // Grid lines + labels
 let grid="";
 for(const v of [0,25,50,75,100]){
  const y=PAD.t+(1-v/100)*ch;
  grid+=`<line x1="${PAD.l}" y1="${y}" x2="${PAD.l+cw}" y2="${y}" stroke="rgba(255,255,255,.08)" stroke-width="0.5"/>`;
  grid+=`<text x="${PAD.l-4}" y="${y+3}" text-anchor="end" fill="#555" font-size="9" font-family="JetBrains Mono,monospace">${v}</text>`}

 // Year labels
 let yearLabels="";
 let lastYear="";
 for(let i=0;i<data.length;i++){
  const yr=data[i].month.substring(0,4);
  if(yr!==lastYear&&parseInt(yr)%2===0){
   const x=PAD.l+(i/data.length)*cw;
   yearLabels+=`<text x="${x}" y="${H-8}" text-anchor="middle" fill="#555" font-size="9" font-family="JetBrains Mono,monospace">${yr}</text>`;
   yearLabels+=`<line x1="${x}" y1="${PAD.t}" x2="${x}" y2="${PAD.t+ch}" stroke="rgba(255,255,255,.04)" stroke-width="0.5"/>`;
   lastYear=yr}}

 // Score line
 const pts=data.map((d,i)=>{
  const x=PAD.l+(i/data.length)*cw;
  const y=PAD.t+(1-d.score/100)*ch;

     </div>
     <p class="m" style="font-size:8px;color:var(--t5);margin-top:10px;line-height:1.5">Composite = average of 8 sub-scores (YC, Sahm, Credit, LEI, Mfg, Sentiment, VIX, Claims/CLF). CAPE excluded (not on FRED). Each sub-score normalized 0–100 using linear interpolation between safe and danger thresholds. USREC = NBER recession dates.</p>
    `:`<button onclick="loadBacktest()" class="m" style="width:100%;padding:12px;background:rgba(255,193,7,.1);border:1px solid rgba(255,193,7,.2);border-radius:8px;color:var(--ca);font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.06em">LOAD HISTORICAL BACKTEST</button>
     <p class="m" style="font-size:9px;color:var(--t5);margin-top:8px;text-align:center">Fetches 30 years of monthly FRED data for all indicators + NBER recession dates</p>`}
  </div>`:""}</div>`
}
