<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Recession Radar</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0E0D0B;--sf:rgba(14,13,11,0.8);--bd:#1E1D1A;--tx:#E8E6E3;--t2:#AAA;--t3:#777;--t4:#555;--t5:#333;
    --cl:#00E676;--wa:#90A4AE;--ca:#FFC107;--wn:#FF9100;--st:#FF1744}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;-webkit-text-size-adjust:100%}
  .m{font-family:'JetBrains Mono','Fira Code',monospace}.h{font-family:'Space Grotesk',sans-serif}
  .c{max-width:720px;margin:0 auto;padding:16px 16px 60px}
  .card{border-radius:12px;padding:18px 20px;cursor:pointer;transition:border-color .25s,box-shadow .25s;-webkit-tap-highlight-color:transparent}
  .card:hover{box-shadow:0 0 16px rgba(255,255,255,.03)}
  .mg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
  @media(max-width:480px){.mg{grid-template-columns:repeat(2,1fr)}.card{padding:14px 16px}.ga{padding:18px 14px}}
  .mc{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:10px 12px}
  .ga{background:linear-gradient(135deg,rgba(14,13,11,.95),rgba(22,20,17,.95));border-radius:14px;padding:24px 20px;margin-bottom:20px;position:relative;overflow:hidden}
  .gb{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--cl),var(--ca),var(--wn),var(--st));opacity:.45}
  .ab{border-radius:10px;padding:14px 16px;margin-bottom:20px}
  .db{background:rgba(0,0,0,.3);border-radius:8px;padding:10px 12px;margin-bottom:7px}
  .lg{margin-top:24px;padding:14px 16px;background:var(--sf);border:1px solid var(--bd);border-radius:10px}
  .dt{display:inline-block;border-radius:50%;flex-shrink:0}
  .si{width:100%;padding:12px 14px;background:var(--bg);border:1px solid #333;border-radius:8px;color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:14px;outline:none;-webkit-appearance:none}
  .si:focus{border-color:var(--ca)}
  .sb{width:100%;padding:14px;border:none;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:opacity .2s;-webkit-appearance:none}
  .sb:hover{opacity:.9}.sa{background:var(--ca);color:var(--bg)}.sd{background:#333;color:#666;cursor:default}
  @keyframes p{0%,100%{opacity:.4}50%{opacity:1}}.lp{animation:p 1.5s ease-in-out infinite}
  .err-box{background:rgba(255,23,68,.07);border:1px solid rgba(255,23,68,.18);border-radius:8px;padding:10px 14px;margin-bottom:16px}
  a{color:var(--ca)}
</style>
</head>
<body>
<div id="app"></div>
<script>
const PROXIES=[
  url=>`https://corsproxy.io/?${encodeURIComponent(url)}`,
  url=>`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url=>url,
];

const S=[
  {k:"yc",f:"T10Y2Y",n:"Yield Curve",s:"10Y − 2Y Treasury Spread",u:"%",
   th:"< −0.3 Inverted (Stress) | 0–0.2 Flat (Caution) | > 0.5 Normal",
   hi:"Predicted 8/8 recessions since 1970. Recession arrives after un-inversion. Two false positives: 1966, 1998.",
   ev:v=>v==null?"unknown":v<-.3?"stress":v<0?"warning":v<.2?"caution":v<.5?"watch":"clear"},
  {k:"sa",f:"SAHMREALTIME",n:"Sahm Rule",s:"Unemployment Rate Momentum",u:" pp",
   th:"≥ 0.50 Recession signal | 0.30–0.50 Approaching | < 0.15 Clear",
   hi:"Triggered every recession since 1950. Only 2 false positives since 1959.",
   ev:v=>v==null?"unknown":v>=.5?"stress":v>=.3?"warning":v>=.15?"caution":"clear"},
  {k:"cr",f:"BAMLH0A0HYM2",n:"Credit Spreads",s:"ICE BofA High Yield OAS",u:"%",
   th:"< 3.5% Normal | 3.5–5% Elevated | 5–8% Stress | > 8% Crisis",
   hi:"Hit 10%+ in 2008 and Mar 2020. Credit markets lead equities by weeks.",
   ev:v=>v==null?"unknown":v>8?"stress":v>5?"warning":v>3.5?"caution":"clear"},
  {k:"li",f:"USSLIND",n:"Leading Index",s:"Philly Fed Leading Index",u:"%",
   th:"< −2 Stress | −0.5 to −2 Warning | −0.5 to 0 Caution | > 1 Strong",
   hi:"Negative readings preceded every recession in 50 years.",
   ev:v=>v==null?"unknown":v<-2?"stress":v<-.5?"warning":v<0?"caution":v<1?"watch":"clear"},
  {k:"mf",f:"MANEMP",n:"Mfg Employment",s:"Manufacturing Jobs (ISM proxy)",u:"K",tr:1,
   th:"3-mo losses > 50K = Stress | losses = Caution | gains = Clear",
   hi:"Mfg job losses preceded every recession since 1948. Proxy for proprietary ISM PMI.",
   ev:(v,t)=>t==null?"unknown":t<-50?"stress":t<-20?"warning":t<0?"caution":t<20?"watch":"clear"},
  {k:"co",f:"UMCSENT",n:"Consumer Sentiment",s:"Univ. of Michigan Index",u:"",
   th:"< 55 Stress | 55–60 Warning | 60–70 Caution | 70–80 Watch | > 80 Healthy",
   hi:"Sharp declines preceded consumer spending pullbacks and recessions.",
   ev:v=>v==null?"unknown":v<55?"stress":v<60?"warning":v<70?"caution":v<80?"watch":"clear"},
  {k:"vx",f:"VIXCLS",n:"VIX",s:"CBOE Volatility Index",u:"",
   th:"< 15 Complacent | 15–20 Normal | 20–25 Watch | 25–30 Caution | > 30 Warning | > 35 Stress",
   hi:"VIX > 30 preceded every major selloff in 20 years.",
   ev:v=>v==null?"unknown":v>35?"stress":v>30?"warning":v>25?"caution":v>20?"watch":"clear"},
];

/* Market series — Gold uses fallback chain */
const MK=[
  {f:"SP500",n:"S&P 500",p:"",d:0,pk:true},
  {f:"NASDAQCOM",n:"NASDAQ",p:"",d:0,pk:true},
  {f:"DCOILBRENTEU",n:"Brent Oil",p:"$",d:2},
  {f:"DGS10",n:"10Y Yield",p:"",x:"%",d:2},
  {f:"GOLDPMGBD228NLBM",n:"Gold",p:"$",d:0,alt:["GOLDAMGBD228NLBM","GLDONTD228NLBM"]},
  {f:"DTWEXBGS",n:"DXY Dollar",p:"",d:1,alt:["DTWEXAFEGS"]},
];

const ST={
  clear:{c:"#00E676",bg:"rgba(0,230,118,.07)",b:"rgba(0,230,118,.22)",l:"CLEAR"},
  watch:{c:"#90A4AE",bg:"rgba(144,164,174,.06)",b:"rgba(144,164,174,.18)",l:"NORMAL"},
  caution:{c:"#FFC107",bg:"rgba(255,193,7,.07)",b:"rgba(255,193,7,.22)",l:"CAUTION"},
  warning:{c:"#FF9100",bg:"rgba(255,145,0,.07)",b:"rgba(255,145,0,.22)",l:"WARNING"},
  stress:{c:"#FF1744",bg:"rgba(255,23,68,.07)",b:"rgba(255,23,68,.22)",l:"STRESS"},
  unknown:{c:"#555",bg:"rgba(85,85,85,.05)",b:"rgba(85,85,85,.15)",l:"LOADING"},
};

const LV=[
  {x:1,l:"GREEN",s:"Full Offense",c:"#00E676",st:"Buy pullbacks aggressively. Full equity exposure. Lean into growth."},
  {x:3,l:"YELLOW",s:"Proceed with Caution",c:"#FFC107",st:"Tighten stops. Reduce position sizes. Build cash reserve from profits."},
  {x:5,l:"ORANGE",s:"Defensive Mode",c:"#FF9100",st:"Raise cash to 20–30%. Sell speculative positions. Favor quality & dividends."},
  {x:99,l:"RED",s:"Capital Preservation",c:"#FF1744",st:"Raise cash 40–50%. Exit leverage. Hedge. Survive first, profit later."},
];

let st={key:localStorage.getItem("rr-key5")||null,d:{},mk:{},mkF:{},ss:{},ex:{},ld:false,err:null,upd:null,proxy:0,
  al:{ycUD:null,ycInv:false,sahmD:null,sahmPk:null}};

async function ff(sid,key,lim=24){
  const base=`https://api.stlouisfed.org/fred/series/observations?series_id=${sid}&api_key=${key}&file_type=json&sort_order=desc&limit=${lim}`;
  const order=[st.proxy,...[0,1,2].filter(i=>i!==st.proxy)];
  for(const i of order){
    try{
      const r=await fetch(PROXIES[i](base),{signal:AbortSignal.timeout(15000)});
      if(!r.ok)continue;
      const txt=await r.text();let j;try{j=JSON.parse(txt)}catch{continue}
      if(j.observations){st.proxy=i;return j.observations.filter(o=>o.value!==".").reverse()}
      if(j.contents){try{const p=JSON.parse(j.contents);if(p.observations){st.proxy=i;return p.observations.filter(o=>o.value!==".").reverse()}}catch{}}
    }catch{continue}
  }
  throw new Error(`Failed: ${sid}`);
}

/* Fetch with fallback series IDs */
async function ffAlt(primary,alts,key,lim=24){
  try{return await ff(primary,key,lim)}catch{}
  if(alts){for(const a of alts){try{return await ff(a,key,lim)}catch{}}}
  return[];
}

function analyzeYC(data){
  if(!data||data.length<5)return{ycUD:null,ycInv:false};
  let lastInvD=null,unD=null,inv=false;
  for(let i=0;i<data.length;i++){
    const v=parseFloat(data[i].value);if(isNaN(v))continue;
    if(v<0){inv=true;lastInvD=data[i].date}
    else if(inv&&!unD){unD=data[i].date}
  }
  return{ycUD:unD,ycInv:inv};
}

function analyzeSahm(data){
  if(!data||data.length<3)return{sahmD:null,sahmPk:null};
  let td=null,pk=0;
  for(let i=0;i<data.length;i++){const v=parseFloat(data[i].value);if(isNaN(v))continue;if(v>pk)pk=v;if(v>=.5&&!td)td=data[i].date}
  return{sahmD:td,sahmPk:pk};
}

function peakPct(data){
  if(!data||data.length<10)return null;
  const v=data.map(d=>parseFloat(d.value)).filter(x=>!isNaN(x));
  if(v.length<10)return null;
  const pk=Math.max(...v),cur=v[v.length-1];
  return((cur-pk)/pk*100).toFixed(1);
}

async function loadAll(){
  st.ld=true;st.err=null;render();
  let ok=0,fails=[];

  for(const s of S){
    try{const lim=s.k==="yc"?500:s.k==="sa"?60:24;st.d[s.k]=await ff(s.f,st.key,lim);ok++}
    catch{st.d[s.k]=[];fails.push(s.f)}
  }

  for(const m of MK){
    try{
      const lim=m.pk?260:10;
      const data=await ffAlt(m.f,m.alt,st.key,lim);
      st.mkF[m.f]=data;
      st.mk[m.f]=data.slice(-5);
    }catch{st.mk[m.f]=[];st.mkF[m.f]=[]}
  }

  for(const s of S){
    const obs=st.d[s.k]||[];
    if(s.tr){const v=obs.slice(-3).map(d=>parseFloat(d.value)).filter(x=>!isNaN(x));st.ss[s.k]=s.ev(null,v.length>=2?v[v.length-1]-v[0]:null)}
    else{const l=obs.length?parseFloat(obs[obs.length-1].value):null;st.ss[s.k]=s.ev(isNaN(l)?null:l)}
  }

  const yca=analyzeYC(st.d["yc"]||[]);
  const sah=analyzeSahm(st.d["sa"]||[]);
  st.al={...yca,...sah};
  st.upd=new Date();
  if(ok===0)st.err=`No data returned. Check your FRED API key.\nGet one free: fred.stlouisfed.org/docs/api/api_key.html`;
  else if(fails.length)st.err=`Loaded ${ok}/${S.length} indicators. Failed: ${fails.join(", ")}`;
  st.ld=false;render();
}

function spark(data,color,w=180,h=42){
  if(!data||data.length<2)return"";
  const v=data.map(d=>parseFloat(d.value)).filter(x=>!isNaN(x));
  if(v.length<2)return"";
  const mn=Math.min(...v),mx=Math.max(...v),r=mx-mn||1;
  const pts=v.map((val,i)=>`${(i/(v.length-1))*w},${h-((val-mn)/r)*(h-6)-3}`).join(" ");
  const ly=h-((v[v.length-1]-mn)/r)*(h-6)-3;
  return`<svg width="${w}" height="${h}" style="display:block;margin-top:6px;opacity:.75"><defs><linearGradient id="g${color.slice(1)}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".2"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><polygon points="0,${h} ${pts} ${w},${h}" fill="url(#g${color.slice(1)})"/><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${w}" cy="${ly}" r="2.5" fill="${color}"/></svg>`;
}

function dot(s,sz=8){const c=(ST[s]||ST.unknown).c;return`<span class="dt" style="width:${sz}px;height:${sz}px;background:${c};box-shadow:0 0 ${sz+2}px ${c}40"></span>`}
function fD(d){if(!d)return"Unknown";const p=new Date(d+"T00:00:00");return p.toLocaleDateString("en-US",{month:"short",year:"numeric"})}
function mAgo(d){if(!d)return null;return Math.round((new Date()-new Date(d+"T00:00:00"))/(1000*60*60*24*30.44))}

function render(){
  const a=document.getElementById("app");
  if(!st.key){a.innerHTML=setupHTML();bindSetup();return}
  if(st.ld&&!S.some(s=>(st.d[s.k]||[]).length)){
    a.innerHTML=`<div class="c" style="text-align:center;padding-top:100px"><div style="font-size:32px" class="lp">📡</div><p class="m" style="font-size:13px;color:#666;margin-top:16px">Fetching live data from FRED...</p><p class="m" style="font-size:10px;color:#444;margin-top:6px">Loading 7 indicators + 6 market series</p><p class="m" style="font-size:10px;color:#333;margin-top:4px">First load may take 15-30 seconds</p></div>`;
    return;
  }
  a.innerHTML=`<div class="c">${hdr()}${st.err?`<div class="err-box"><p class="m" style="font-size:11px;color:var(--st);line-height:1.5;white-space:pre-line">${st.err}</p></div>`:""}${gauge()}${dynAlert()}${mktBar()}<div class="m" style="font-size:9px;color:var(--t4);letter-spacing:.1em;margin-bottom:10px">INDICATORS · TAP FOR DETAILS</div><div style="display:flex;flex-direction:column;gap:10px">${S.map(s=>card(s)).join("")}</div>${legend()}</div>`;
  document.querySelectorAll("[data-ck]").forEach(el=>el.addEventListener("click",()=>{st.ex[el.dataset.ck]=!st.ex[el.dataset.ck];render()}));
}

function setupHTML(){
  return`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px"><div style="max-width:420px;width:100%;text-align:center">
  <h1 class="h" style="font-size:24px;font-weight:800;margin-bottom:4px">RECESSION RADAR</h1>
  <p class="m" style="font-size:9px;color:var(--t4);letter-spacing:.12em;margin-bottom:32px">LIVE ECONOMIC INDICATOR DASHBOARD</p>
  <div style="background:rgba(20,19,16,.95);border:1px solid #2A2825;border-radius:14px;padding:28px 24px;text-align:left">
    <p style="font-size:13px;color:#888;line-height:1.7;margin-bottom:16px">Pulls live data from the Federal Reserve's FRED API. Get a free key to start.</p>
    <a href="https://fred.stlouisfed.org/docs/api/api_key.html" target="_blank" class="m" style="font-size:11px;margin-bottom:20px;display:inline-block;text-decoration:underline">Get free FRED API key →</a>
    <div style="margin-bottom:16px"><label class="m" style="font-size:9px;color:var(--t4);letter-spacing:.1em;display:block;margin-bottom:6px">FRED API KEY</label>
    <input type="password" id="ki" class="si" placeholder="Paste FRED API key"></div>
    <div id="se" class="m" style="font-size:10px;color:var(--st);margin-bottom:10px;display:none"></div>
    <button id="lb" class="sb sd" disabled>LAUNCH DASHBOARD</button>
  </div>
  <p class="m" style="font-size:8px;color:var(--t5);margin-top:14px">Stored in browser localStorage · Works on any device</p>
  </div></div>`;
}

function bindSetup(){
  setTimeout(()=>{
    const i=document.getElementById("ki"),b=document.getElementById("lb");if(!i||!b)return;
    i.addEventListener("input",()=>{const h=i.value.trim().length>10;b.disabled=!h;b.className=`sb ${h?"sa":"sd"}`});
    const go=()=>{const k=i.value.trim();if(k){st.key=k;localStorage.setItem("rr-key5",k);loadAll()}};
    b.addEventListener("click",go);i.addEventListener("keydown",e=>{if(e.key==="Enter")go()});
  },50);
}

function hdr(){
  const t=st.upd?st.upd.toLocaleTimeString():"";
  return`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--bd);flex-wrap:wrap;gap:8px">
  <div><h1 class="h" style="font-size:20px;font-weight:800;letter-spacing:-.03em">RECESSION RADAR</h1>
  <p class="m" style="font-size:9px;color:var(--t4);margin-top:2px;letter-spacing:.1em">LIVE FRED · ${t}</p></div>
  <div style="display:flex;gap:8px">
  <button onclick="loadAll()" class="m" style="padding:6px 14px;background:#1E1D1A;border:1px solid #2A2825;border-radius:6px;color:#AAA;font-size:10px;cursor:pointer">⟳ Refresh</button>
  <button onclick="rst()" class="m" style="padding:6px 10px;background:transparent;border:1px solid #222;border-radius:6px;color:#555;font-size:10px;cursor:pointer">✕</button>
  </div></div>`;
}

function gauge(){
  const ss=S.map(s=>st.ss[s.k]||"unknown");
  const sv=ss.filter(s=>s==="stress"||s==="warning").length;
  const ca=ss.filter(s=>s==="caution").length;
  const wa=ss.filter(s=>s==="watch").length;
  const al=sv+ca;let lv=LV[0];for(const o of LV)if(al<=o.x){lv=o;break}if(al>=6)lv=LV[3];
  return`<div class="ga" style="border:1px solid ${lv.c}22"><div class="gb"></div>
  <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
  <div><div class="m" style="font-size:9px;color:var(--t4);letter-spacing:.14em;margin-bottom:6px">RECESSION RISK ASSESSMENT</div>
  <div style="display:flex;align-items:center;gap:12px"><span class="h" style="font-size:32px;font-weight:800;color:${lv.c};line-height:1">${lv.l}</span><span style="font-size:13px;color:var(--t3);border-left:1px solid #2A2825;padding-left:12px">${lv.s}</span></div></div>
  <div style="display:flex;gap:14px">${[{n:sv,l:"Alerts",c:"var(--st)"},{n:ca,l:"Cautions",c:"var(--ca)"},{n:wa,l:"Watch",c:"var(--wa)"}].map(x=>`<div style="text-align:center"><div class="m" style="font-size:20px;font-weight:800;color:${x.c}">${x.n}</div><div class="m" style="font-size:8px;color:var(--t4)">${x.l}</div></div>`).join("")}</div></div>
  <div style="margin-top:14px;padding:10px 12px;background:${lv.c}0C;border-radius:8px;border:1px solid ${lv.c}15">
  <span class="m" style="font-size:9px;color:${lv.c};letter-spacing:.06em">STRATEGY</span>
  <p style="font-size:12px;color:var(--t2);margin-top:4px;line-height:1.6">${lv.st}</p></div></div>`;
}

function dynAlert(){
  const ad=st.al;
  const sahmD=st.d["sa"]||[],ycD=st.d["yc"]||[];
  const sahmV=sahmD.length?parseFloat(sahmD[sahmD.length-1].value):null;
  const ycV=ycD.length?parseFloat(ycD[ycD.length-1].value):null;
  const both=ad.ycUD&&ad.sahmD;
  const either=ad.ycUD||ad.sahmD;

  let bdr="rgba(144,164,174,0.15)",bgc="rgba(144,164,174,0.04)",ic="var(--wa)",ttl="PATTERN ANALYSIS";
  if(both){bdr="rgba(255,145,0,0.2)";bgc="rgba(255,145,0,0.05)";ic="var(--wn)";ttl="DUAL INDICATOR ALERT"}
  else if(either){bdr="rgba(255,193,7,0.2)";bgc="rgba(255,193,7,0.05)";ic="var(--ca)";ttl="PATTERN ALERT"}

  let msgs=[];

  if(ad.ycInv&&ad.ycUD){
    const mo=mAgo(ad.ycUD);const rem=mo!==null?18-mo:null;const inW=rem!==null&&rem>0;
    msgs.push(`<strong style="color:var(--ca)">Yield curve un-inverted ${fD(ad.ycUD)}</strong> (${mo} mo ago). ${inW?`Within 6–18 mo recession window (${rem} mo remaining).`:`18-month window has passed. Signal may have expired but delayed effects possible.`} Current spread: ${ycV!==null?ycV.toFixed(2)+"%":"N/A"}.`);
  }else if(ycV!==null&&ycV<0){
    msgs.push(`<strong style="color:var(--st)">Yield curve currently inverted</strong> at ${ycV.toFixed(2)}%. Recession typically follows 6–18 months after un-inversion.`);
  }else{
    msgs.push(`Yield curve positive at ${ycV!==null?ycV.toFixed(2)+"%":"N/A"}. No recent inversion detected in data window.`);
  }

  if(ad.sahmD){
    msgs.push(`<strong style="color:var(--ca)">Sahm Rule triggered ${fD(ad.sahmD)}</strong> (crossed ≥ 0.50). Peak: ${ad.sahmPk!==null?ad.sahmPk.toFixed(2):"N/A"}. Current: ${sahmV!==null?sahmV.toFixed(2):"N/A"}. ${sahmV!==null&&sahmV<.5?"Retreated below threshold — historically rare, only 2 false positives since 1959.":"Elevated — recession signal active."}`);
  }else{
    msgs.push(`Sahm Rule at ${sahmV!==null?sahmV.toFixed(2):"N/A"} — ${sahmV!==null&&sahmV>=.3?"approaching":"below"} the 0.50 threshold.`);
  }

  if(both)msgs.push(`<span style="color:var(--wn)">⚡ Both indicators fired — this dual signal has preceded every major recession since 1970. Monitor for catalyzing macro stress.</span>`);

  return`<div class="ab" style="background:${bgc};border:1px solid ${bdr}">
  <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap"><span style="font-size:14px">⚠</span>
  <span class="m" style="font-size:10px;font-weight:700;color:${ic};letter-spacing:.08em">${ttl}</span>
  <span class="m" style="font-size:8px;color:var(--t5);margin-left:auto">LIVE FROM FRED DATA</span></div>
  ${msgs.map(m=>`<p style="font-size:12px;color:#999;line-height:1.7;margin-bottom:8px">${m}</p>`).join("")}</div>`;
}

function mktBar(){
  return`<div class="mg">${MK.map(m=>{
    const d=st.mk[m.f],full=st.mkF[m.f];
    const v=d?.length?parseFloat(d[d.length-1].value):null;
    const p=d?.length>1?parseFloat(d[d.length-2].value):null;
    const ch=v&&p?((v-p)/p*100).toFixed(2):null;const up=ch?parseFloat(ch)>=0:true;
    const dt=d?.length?d[d.length-1].date:"";
    let pp=null,ppC="var(--t4)";
    if(m.pk&&full?.length>10){
      pp=peakPct(full);
      if(pp!==null){const pv=parseFloat(pp);ppC=pv<=-15?"var(--st)":pv<=-10?"var(--wn)":pv<=-5?"var(--ca)":"var(--cl)"}
    }
    return`<div class="mc">
    <div class="m" style="font-size:8px;color:var(--t4);letter-spacing:.08em">${m.n}</div>
    <div class="m" style="font-size:14px;font-weight:700;margin-top:3px">${v!=null?`${m.p||""}${v.toFixed(m.d)}${m.x||""}`:"—"}</div>
    ${ch?`<div class="m" style="font-size:9px;color:${up?"var(--cl)":"var(--st)"};margin-top:2px">${up?"▲":"▼"} ${Math.abs(parseFloat(ch))}%</div>`:""}
    ${pp!==null?`<div class="m" style="font-size:8px;color:${ppC};margin-top:1px">${parseFloat(pp)>=0?"At/near peak":pp+"% from peak"}</div>`:""}
    <div class="m" style="font-size:7px;color:var(--t5);margin-top:2px">${dt}</div></div>`;
  }).join("")}</div>`;
}

function card(s){
  const d=st.d[s.k]||[],status=st.ss[s.k]||"unknown",cfg=ST[status]||ST.unknown;
  const show=d.slice(-24);const lat=d.length?d[d.length-1]:null;const val=lat?parseFloat(lat.value):null;const op=st.ex[s.k];
  let disp="—";
  if(s.tr&&d.length>=3){const r=d.slice(-3).map(x=>parseFloat(x.value)).filter(x=>!isNaN(x));if(r.length>=2){const c=((r[r.length-1]-r[0])/1000).toFixed(0);disp=`${c>0?"+":""}${c}K`}}
  else if(val!=null&&!isNaN(val))disp=val.toFixed(2);
  return`<div class="card" data-ck="${s.k}" style="background:${cfg.bg};border:1px solid ${cfg.b}">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
  <div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">${dot(status)}<span class="m" style="font-size:10px;font-weight:700;letter-spacing:.1em;color:${cfg.c}">${cfg.l}</span></div>
  <h3 class="h" style="font-size:17px;font-weight:700;margin-bottom:2px">${s.n}</h3>
  <p class="m" style="font-size:10px;color:#666">${s.s}</p></div>
  <div style="text-align:right;flex-shrink:0"><div class="m" style="font-size:26px;font-weight:800;color:${cfg.c};line-height:1.1">${disp}<span style="font-size:11px;opacity:.5">${s.u}</span></div>
  <div class="m" style="font-size:9px;color:var(--t4);margin-top:4px">${lat?.date||""}</div></div></div>
  ${spark(show,cfg.c)}
  ${op?`<div style="margin-top:14px;padding-top:14px;border-top:1px solid ${cfg.b}">
  <div class="db"><div class="m" style="font-size:9px;color:var(--t4);letter-spacing:.1em">THRESHOLDS</div><p class="m" style="font-size:11px;color:#888;margin-top:4px;line-height:1.7">${s.th}</p></div>
  <div class="db"><div class="m" style="font-size:9px;color:var(--t4);letter-spacing:.1em">TRACK RECORD</div><p class="m" style="font-size:11px;color:#888;margin-top:4px;line-height:1.7">${s.hi}</p></div>
  <p class="m" style="font-size:9px;color:var(--t5);margin-top:6px">FRED: ${s.f} · <a href="https://fred.stlouisfed.org/series/${s.f}" target="_blank">View on FRED →</a></p></div>`:""}
  <div class="m" style="font-size:9px;color:var(--t5);text-align:right;margin-top:6px">${op?"▲ collapse":"▼ details"}</div></div>`;
}

function legend(){
  return`<div class="lg"><div class="m" style="font-size:9px;color:var(--t4);letter-spacing:.1em;margin-bottom:10px">STATUS LEGEND</div>
  <div style="display:flex;flex-wrap:wrap;gap:8px 18px;margin-bottom:10px">${Object.entries(ST).filter(([k])=>k!=="unknown").map(([k,v])=>`<div style="display:flex;align-items:center;gap:5px">${dot(k,7)}<span class="m" style="font-size:10px;color:${v.c}">${v.l}</span></div>`).join("")}</div>
  <p class="m" style="font-size:8px;color:var(--t5);line-height:1.6">Live from FRED. ISM PMI proxied via Mfg Employment. Gold = London PM Fix. DXY = Trade Weighted USD Broad.<br><a href="https://fred.stlouisfed.org" target="_blank" style="color:var(--t4)">fred.stlouisfed.org</a> · Not financial advice.</p></div>`;
}

function rst(){st.key=null;st.d={};st.mk={};st.mkF={};st.ss={};st.ex={};st.al={};localStorage.removeItem("rr-key5");render()}

render();if(st.key)loadAll();
</script>
</body>
</html>
